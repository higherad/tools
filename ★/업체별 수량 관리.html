<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIGHER AD | 스마트 운영 관리</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        input.tab-edit-input { background: transparent; border: none; outline: none; width: 80px; font-weight: 800; color: inherit; }
        input[type="checkbox"] { cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .grid-input { text-align: center; border: none; width: 100%; padding: 6px 4px; outline: none; font-size: 12px; }
        .grid-input:focus { background-color: #f0f4ff; box-shadow: inset 0 0 0 2px #6366f1; }

        /* 중복 행 배경 */
        .row-duplicate { background-color: #fff8f0 !important; }
        .row-duplicate:hover { background-color: #fff0e0 !important; }
        .row-duplicate td { border-bottom-color: #fcd9b0 !important; }

        /* 주의 뱃지 */
        .badge-warn {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #fff0e0;
            color: #b85000;
            border: 0.5px solid #f5a660;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 5px;
            margin-left: 4px;
            animation: pulse-warn 2s ease-in-out infinite;
            vertical-align: middle;
        }
        .warn-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #e05a00;
            display: inline-block;
            flex-shrink: 0;
        }
        @keyframes pulse-warn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans" x-data="managementApp()" x-init="init()" @keydown.f2="startEditing(activeTab)">

    <!-- ✅ 로딩 오버레이: body 최상단, Alpine x-show 밖에 독립 배치 -->
    <div id="loading-screen" class="fixed inset-0 z-[999] bg-indigo-700 flex items-center justify-center">
        <div class="text-center text-white">
            <i class="fas fa-layer-group text-4xl text-indigo-200 mb-3 block"></i>
            <p class="text-sm font-bold tracking-widest text-indigo-200">HIGHER AD</p>
            <div class="mt-4 flex gap-1.5 justify-center">
                <span class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay:0s"></span>
                <span class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay:.15s"></span>
                <span class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay:.3s"></span>
            </div>
        </div>
    </div>

    <!-- 메인 콘텐츠: 인증 완료 후 표시 -->
    <div x-show="isAuthorized" x-cloak>

        <!-- 헤더 -->
        <header class="bg-indigo-700 text-white px-4 py-3 shadow-md flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-layer-group text-xl text-indigo-200"></i>
                <h1 class="text-base font-extrabold tracking-tight">HIGHER AD | 스마트 운영 관리</h1>
            </div>
            <div class="flex gap-2">
                <button @click="showPasteModal = true" class="bg-white text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-50 transition shadow-sm">
                    <i class="fas fa-paste mr-1"></i> 리스트 등록
                </button>
                <label class="bg-indigo-500 hover:bg-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer transition shadow-sm text-white">
                    <i class="fas fa-file-excel mr-1"></i> CSV 업로드
                    <input type="file" accept=".csv" class="hidden" @change="handleFileUpload($event)">
                </label>
                <button @click="resetCurrentTab()" class="bg-indigo-800 hover:bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold transition" title="현재 탭 데이터 초기화">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <main class="p-4 max-w-7xl mx-auto">

            <!-- 탭 -->
            <div class="flex items-center gap-1 mb-4 bg-white px-1 py-1 rounded-xl shadow-sm border border-gray-200 overflow-x-auto whitespace-nowrap">
                <template x-for="(tab, index) in branches" :key="tab">
                    <div @dblclick="startEditing(tab)" class="relative group flex items-center rounded-lg transition-all"
                        :class="activeTab === tab ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-gray-500 hover:bg-gray-50'">
                        <button @click="activeTab = tab; selectedIds = []" class="px-5 py-2 flex items-center gap-1.5 text-sm">
                            <template x-if="editingTab !== tab"><span x-text="tab"></span></template>
                            <template x-if="editingTab === tab">
                                <input x-model="tempTabText"
                                    @blur="saveTabName(tab)"
                                    @keydown.enter="saveTabName(tab)"
                                    @keydown.escape="editingTab = null"
                                    class="tab-edit-input border-b-2 border-indigo-500"
                                    x-init="$el.focus()">
                            </template>
                            <span class="bg-indigo-100 text-indigo-600 text-[10px] px-1.5 py-0.5 rounded-full font-bold"
                                x-text="items.filter(i => i.branch === tab).length"></span>
                        </button>
                    </div>
                </template>
                <div class="flex items-center border-l ml-2 pl-2">
                    <button @click="addBranch()" class="p-1.5 text-gray-400 hover:text-indigo-500 transition"><i class="fas fa-plus-circle"></i></button>
                    <button @click="removeBranch()" class="p-1.5 text-gray-400 hover:text-red-500 transition"><i class="fas fa-minus-circle"></i></button>
                </div>
            </div>

            <!-- 요약 카드 -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4 text-center">
                <div class="bg-white px-3 py-3 rounded-xl shadow-sm border-b-4 border-gray-400">
                    <p class="text-[10px] text-gray-400 font-bold mb-0.5 uppercase tracking-tighter" x-text="activeTab + ' 전체'"></p>
                    <p class="text-xl font-black text-gray-800" x-text="filteredItems().length + '건'"></p>
                </div>
                <div class="bg-white px-3 py-3 rounded-xl shadow-sm border-b-4 border-blue-400">
                    <p class="text-[10px] text-gray-400 font-bold mb-0.5 uppercase tracking-tighter">접수</p>
                    <p class="text-xl font-black text-blue-600" x-text="filteredItems().filter(i => i.status === '접수').length"></p>
                </div>
                <div class="bg-white px-3 py-3 rounded-xl shadow-sm border-b-4 border-orange-400">
                    <p class="text-[10px] text-gray-400 font-bold mb-0.5 uppercase tracking-tighter">정산대기</p>
                    <p class="text-xl font-black text-orange-600" x-text="filteredItems().filter(i => i.status === '정산대기').length"></p>
                </div>
                <div class="bg-white px-3 py-3 rounded-xl shadow-sm border-b-4 border-green-500">
                    <p class="text-[10px] text-gray-400 font-bold mb-0.5 uppercase tracking-tighter">완료</p>
                    <p class="text-xl font-black text-green-600" x-text="filteredItems().filter(i => i.status === '완료').length"></p>
                </div>
                <div class="bg-white px-3 py-3 rounded-xl shadow-sm border-b-4 border-indigo-500">
                    <p class="text-[10px] text-gray-400 font-bold mb-0.5 uppercase tracking-tighter">총 주문 수량</p>
                    <p class="text-xl font-black text-indigo-600" x-text="calculateTotalQuantity().toLocaleString()"></p>
                </div>
            </div>

            <!-- 선택 일괄 처리 바 -->
            <div x-show="selectedIds.length > 0" x-cloak x-transition
                class="flex items-center justify-between bg-indigo-50 border border-indigo-200 px-4 py-2.5 rounded-xl mb-3 shadow-sm">
                <div class="flex items-center gap-3 flex-wrap">
                    <span class="text-xs font-bold text-indigo-700">
                        <i class="fas fa-check-square mr-1"></i><span x-text="selectedIds.length"></span>건 선택됨
                    </span>
                    <div class="h-4 w-[1px] bg-indigo-200 mx-1"></div>
                    <div class="flex gap-1.5 items-center">
                        <span class="text-[11px] text-indigo-500 font-black uppercase">상태 일괄 변경:</span>
                        <button @click="updateSelectedStatus('접수')" class="bg-blue-600 text-white px-2.5 py-1 rounded-lg text-[11px] font-bold hover:bg-blue-700 transition shadow-sm">접수</button>
                        <button @click="updateSelectedStatus('정산대기')" class="bg-orange-500 text-white px-2.5 py-1 rounded-lg text-[11px] font-bold hover:bg-orange-600 transition shadow-sm">정산대기</button>
                        <button @click="updateSelectedStatus('완료')" class="bg-green-600 text-white px-2.5 py-1 rounded-lg text-[11px] font-bold hover:bg-green-700 transition shadow-sm">완료</button>
                    </div>
                </div>
                <button @click="removeSelectedItems()" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1">
                    <i class="fas fa-trash-alt mr-1"></i> 선택 삭제
                </button>
            </div>

            <!-- 중복 경고 배너 -->
            <div x-show="getDuplicateCount() > 0" x-cloak x-transition
                class="flex items-center gap-2 bg-orange-50 border border-orange-200 px-4 py-2 rounded-xl mb-3 text-xs font-bold text-orange-700">
                <i class="fas fa-exclamation-triangle text-orange-400"></i>
                <span>
                    완전 중복 항목이
                    <span class="text-orange-600 underline underline-offset-2" x-text="getDuplicateCount() + '건'"></span>
                    감지되었습니다. (MID · 키워드 · 시작일 · 일수 · 일목표 모두 일치)
                </span>
            </div>

            <!-- 테이블 -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                <table class="w-full text-center text-xs">
                    <thead class="bg-gray-50 border-b text-gray-500 font-bold text-[11px]">
                        <tr>
                            <th class="px-3 py-2.5 w-10">
                                <input type="checkbox" @change="toggleAllSelection($event)" :checked="isAllSelected()" class="w-3.5 h-3.5 rounded border-gray-300">
                            </th>
                            <th class="px-3 py-2.5 text-left">업체 정보 (MID)</th>
                            <th class="px-3 py-2.5">순위 키워드</th>
                            <th class="px-3 py-2.5">기간 / 일수</th>
                            <th class="px-3 py-2.5">일목표</th>
                            <th class="px-3 py-2.5">상태</th>
                            <th class="px-3 py-2.5">삭제</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 font-medium">
                        <template x-for="(item, index) in filteredItems()" :key="item.id">
                            <tr class="hover:bg-indigo-50/30 transition duration-150"
                                :class="{
                                    'row-duplicate': isDuplicateItem(item),
                                    'bg-indigo-50/60': selectedIds.includes(String(item.id)) && !isDuplicateItem(item)
                                }">

                                <!-- 체크박스 -->
                                <td class="px-3 py-2 text-center">
                                    <input type="checkbox" :value="String(item.id)" x-model="selectedIds" class="w-3.5 h-3.5">
                                </td>

                                <!-- 업체 정보 -->
                                <td class="px-3 py-2 text-left">
                                    <div class="flex items-center gap-1 flex-wrap">
                                        <span class="font-bold text-gray-900 text-xs leading-tight" x-text="item.name"></span>
                                        <template x-if="isDuplicateItem(item)">
                                            <span class="badge-warn">
                                                <span class="warn-dot"></span>주의
                                            </span>
                                        </template>
                                        <template x-if="item.url">
                                            <a :href="item.url" target="_blank" class="text-gray-300 hover:text-indigo-600 ml-0.5">
                                                <i class="fas fa-external-link-alt text-[9px]"></i>
                                            </a>
                                        </template>
                                    </div>
                                    <div class="text-[10px] mt-0.5 font-mono"
                                         :class="isDuplicateMid(item.mid) ? 'text-red-500 font-black' : 'text-indigo-400'"
                                         x-text="item.mid"></div>
                                </td>

                                <!-- 키워드 -->
                                <td class="px-3 py-2">
                                    <a :href="'https://m.search.naver.com/search.naver?query=' + encodeURIComponent(item.keyword)"
                                       target="_blank"
                                       class="inline-flex items-center gap-1 bg-gray-100 border px-2.5 py-1 rounded text-gray-600 text-[11px] hover:bg-indigo-50 hover:text-indigo-700 transition">
                                        <i class="fab fa-neos text-[9px] text-green-500"></i>
                                        <span x-text="item.keyword"></span>
                                    </a>
                                </td>

                                <!-- 기간 -->
                                <td class="px-3 py-2">
                                    <div class="font-bold text-gray-700 text-xs" x-text="item.startDate"></div>
                                    <div class="text-[10px] text-gray-400 font-bold" x-text="item.days + ' Days'"></div>
                                </td>

                                <!-- 일목표 -->
                                <td class="px-3 py-2 font-mono font-black text-gray-800 text-sm" x-text="item.goal"></td>

                                <!-- 상태 -->
                                <td class="px-3 py-2">
                                    <select x-model="item.status" @change="saveData()"
                                        :class="{
                                            'bg-blue-600 text-white': item.status === '접수',
                                            'bg-orange-500 text-white': item.status === '정산대기',
                                            'bg-green-600 text-white': item.status === '완료'
                                        }"
                                        class="text-[11px] font-black p-1 rounded-lg border-none cursor-pointer min-w-[80px]">
                                        <option value="접수">접수</option>
                                        <option value="정산대기">정산대기</option>
                                        <option value="완료">완료</option>
                                    </select>
                                </td>

                                <!-- 삭제 -->
                                <td class="px-3 py-2 text-center">
                                    <button @click="removeItem(item)" class="text-gray-200 hover:text-red-500 transition px-1.5 py-0.5">
                                        <i class="fas fa-trash-alt text-sm"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>

                        <!-- 빈 상태 -->
                        <template x-if="filteredItems().length === 0">
                            <tr>
                                <td colspan="7" class="py-16 text-gray-400 text-sm">
                                    <i class="fas fa-inbox text-3xl mb-3 block"></i>
                                    등록된 데이터가 없습니다
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </main>

        <!-- 리스트 등록 모달 -->
        <div x-show="showPasteModal"
            class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
            x-cloak x-transition>
            <div class="bg-white rounded-2xl w-full max-w-6xl shadow-2xl overflow-hidden">
                <div class="px-5 py-4 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-800 text-sm">
                        <i class="fas fa-table mr-2 text-indigo-500"></i>
                        <span class="text-indigo-600" x-text="activeTab"></span> 스마트 시트 등록
                    </h3>
                    <button @click="showPasteModal = false" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times-circle text-lg"></i>
                    </button>
                </div>
                <div class="p-5">
                    <div class="mb-3 text-center">
                        <span class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full">
                            💡 시트의 데이터를 복사하여 첫 번째 칸에 붙여넣으세요.
                        </span>
                    </div>
                    <div class="overflow-auto border rounded-lg max-h-[460px] bg-gray-50">
                        <table class="w-full border-collapse table-fixed text-xs">
                            <thead class="sticky top-0 bg-gray-100 shadow-sm z-10">
                                <tr class="text-gray-600 font-bold">
                                    <th class="w-36 p-2 border">업체명</th>
                                    <th class="w-52 p-2 border">URL</th>
                                    <th class="w-28 p-2 border">MID</th>
                                    <th class="w-36 p-2 border">순위키워드</th>
                                    <th class="w-16 p-2 border">일수</th>
                                    <th class="w-28 p-2 border">시작일</th>
                                    <th class="w-16 p-2 border">일 목표</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(row, rIdx) in gridData" :key="rIdx">
                                    <tr class="bg-white">
                                        <template x-for="(val, cIdx) in row" :key="cIdx">
                                            <td class="border p-0">
                                                <input type="text"
                                                    x-model="gridData[rIdx][cIdx]"
                                                    @paste="handleGridPaste($event, rIdx, cIdx)"
                                                    class="grid-input">
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button @click="processGridRegistration()"
                            class="flex-grow bg-indigo-600 text-white font-black py-3 rounded-xl hover:bg-indigo-700 shadow-lg transition-all text-sm">
                            검증 및 일괄 등록 (<span x-text="countValidRows()"></span>건)
                        </button>
                        <button @click="clearGrid()"
                            class="px-5 bg-gray-100 text-gray-500 font-bold rounded-xl hover:bg-gray-200 transition text-sm">
                            비우기
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRnAMy3PyD0zracrwyo17hEZ-R40pAvt4",
            authDomain: "higherad-530c4.firebaseapp.com",
            databaseURL: "https://higherad-530c4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "higherad-530c4",
            storageBucket: "higherad-530c4.firebasestorage.app",
            messagingSenderId: "1028078651420",
            appId: "1:1028078651420:web:71c8b8c5e69f0772d637d9"
        };

        let isAlerted = false;

        function managementApp() {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            return {
                isAuthorized: false,
                items: [],
                branches: ['A영업점', 'B영업점', 'C영업점'],
                activeTab: 'A영업점',
                editingTab: null,
                tempTabText: '',
                showPasteModal: false,
                selectedIds: [],
                gridData: Array.from({ length: 30 }, () => Array(7).fill('')),
                userPath: null,

                async init() {
                    firebase.auth().onAuthStateChanged(async (user) => {
                        // ✅ 인증 완료 시점에 로딩 오버레이 제거
                        document.getElementById('loading-screen').style.display = 'none';

                        if (user) {
                            this.userPath = `users/${user.uid}/higher_ad_v2`;
                            db.ref(this.userPath).on('value', (snapshot) => {
                                const data = snapshot.val();
                                if (data) {
                                    this.items = data.items || [];
                                    this.branches = data.branches || ['A영업점', 'B영업점', 'C영업점'];
                                    if (!this.branches.includes(this.activeTab)) this.activeTab = this.branches[0];
                                }
                                this.isAuthorized = true;
                            });
                        } else {
                            this.isAuthorized = false;
                            if (!isAlerted) {
                                isAlerted = true;
                                alert("로그인이 필요합니다.");
                            }
                        }
                    });
                },

                // ────────────── 중복 감지 ──────────────

                // 완전 중복 키: MID + 키워드 + 시작일 + 일수 + 일목표 모두 일치
                _dupKey(item) {
                    return [
                        String(item.mid       || '').trim(),
                        String(item.keyword   || '').trim(),
                        String(item.startDate || '').trim(),
                        String(item.days      || ''),
                        String(item.goal      || '')
                    ].join('|');
                },

                // 전체 items 기준 키별 카운트 맵
                _dupMap() {
                    const map = {};
                    this.items.forEach(item => {
                        const k = this._dupKey(item);
                        map[k] = (map[k] || 0) + 1;
                    });
                    return map;
                },

                // 해당 item이 완전 중복인지
                isDuplicateItem(item) {
                    return this._dupMap()[this._dupKey(item)] > 1;
                },

                // 현재 탭에서 중복 건수 (배너용)
                getDuplicateCount() {
                    const map = this._dupMap();
                    return this.filteredItems().filter(item => map[this._dupKey(item)] > 1).length;
                },

                // MID 단독 중복 (MID 텍스트 색상용)
                isDuplicateMid(mid) {
                    if (!mid) return false;
                    return this.items.filter(item => String(item.mid) === String(mid)).length > 1;
                },

                // ────────────── 저장 ──────────────

                saveData() {
                    if (!this.userPath) return;
                    db.ref(this.userPath).set({
                        items: JSON.parse(JSON.stringify(this.items)),
                        branches: this.branches
                    });
                },

                // ────────────── 선택 일괄 ──────────────

                updateSelectedStatus(newStatus) {
                    if (this.selectedIds.length === 0) return;
                    this.items = this.items.map(item => {
                        if (this.selectedIds.includes(String(item.id))) return { ...item, status: newStatus };
                        return item;
                    });
                    this.saveData();
                    this.selectedIds = [];
                    alert(`상태가 [${newStatus}](으)로 변경되었습니다.`);
                },

                removeSelectedItems() {
                    if (this.selectedIds.length === 0) return;
                    if (confirm(`선택한 ${this.selectedIds.length}건을 삭제하시겠습니까?`)) {
                        this.items = this.items.filter(item => !this.selectedIds.includes(String(item.id)));
                        this.selectedIds = [];
                        this.saveData();
                    }
                },

                // ────────────── 그리드 붙여넣기 ──────────────

                handleGridPaste(e, rowIdx, colIdx) {
                    e.preventDefault();
                    const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                    const rows = pastedText.split(/\r\n|\n|\r/).filter(line => line !== '');
                    rows.forEach((rowText, rOffset) => {
                        const targetRowIdx = rowIdx + rOffset;
                        if (targetRowIdx < this.gridData.length) {
                            const cols = rowText.split('\t');
                            cols.forEach((colText, cOffset) => {
                                const targetColIdx = colIdx + cOffset;
                                if (targetColIdx < 7) this.gridData[targetRowIdx][targetColIdx] = colText.trim();
                            });
                        }
                    });
                },

                countValidRows() {
                    return this.gridData.filter(row => row[0] && row[0].trim() !== '').length;
                },

                processGridRegistration() {
                    const validItems = this.gridData
                        .filter(row => row[0] && row[0].trim() !== '')
                        .map(row => ({
                            id: String(Date.now() + Math.random()),
                            branch: this.activeTab,
                            name: row[0],
                            url: row[1],
                            mid: row[2],
                            keyword: row[3],
                            days: Number(row[4]) || 0,
                            startDate: row[5],
                            goal: Number(row[6]) || 0,
                            status: '접수'
                        }));
                    if (validItems.length === 0) return alert('데이터를 입력해주세요.');
                    this.items = [...this.items, ...validItems];
                    this.saveData();
                    this.showPasteModal = false;
                    this.clearGrid();
                    alert(`${validItems.length}건이 등록되었습니다.`);
                },

                clearGrid() {
                    this.gridData = Array.from({ length: 30 }, () => Array(7).fill(''));
                },

                // ────────────── 필터 / 계산 ──────────────

                filteredItems() {
                    return this.items.filter(item => item.branch === this.activeTab);
                },

                calculateTotalQuantity() {
                    return this.filteredItems().reduce((acc, i) => acc + (Number(i.goal) * Number(i.days)), 0);
                },

                // ────────────── 전체 선택 ──────────────

                toggleAllSelection(e) {
                    const currentIds = this.filteredItems().map(i => String(i.id));
                    this.selectedIds = e.target.checked
                        ? [...new Set([...this.selectedIds, ...currentIds])]
                        : this.selectedIds.filter(id => !currentIds.includes(id));
                },

                isAllSelected() {
                    const currentIds = this.filteredItems().map(i => String(i.id));
                    return currentIds.length > 0 && currentIds.every(id => this.selectedIds.includes(id));
                },

                // ────────────── 아이템 삭제 ──────────────

                removeItem(targetItem) {
                    if (confirm('삭제하시겠습니까?')) {
                        this.items = this.items.filter(i => String(i.id) !== String(targetItem.id));
                        this.saveData();
                    }
                },

                resetCurrentTab() {
                    if (confirm(`[${this.activeTab}] 탭의 데이터를 초기화하시겠습니까?`)) {
                        this.items = this.items.filter(item => item.branch !== this.activeTab);
                        this.saveData();
                    }
                },

                // ────────────── 탭 관리 ──────────────

                addBranch() {
                    const name = prompt('새 영업점 이름:');
                    if (name && !this.branches.includes(name)) {
                        this.branches.push(name);
                        this.activeTab = name;
                        this.saveData();
                    }
                },

                removeBranch() {
                    if (this.branches.length > 1 && prompt(`[${this.activeTab}] 삭제하려면 이름을 입력하세요.`) === this.activeTab) {
                        this.items = this.items.filter(item => item.branch !== this.activeTab);
                        this.branches = this.branches.filter(b => b !== this.activeTab);
                        this.activeTab = this.branches[0];
                        this.saveData();
                    }
                },

                startEditing(tab) {
                    this.editingTab = tab;
                    this.tempTabText = tab;
                },

                saveTabName(oldName) {
                    const newName = this.tempTabText.trim();
                    if (newName && newName !== oldName) {
                        const idx = this.branches.indexOf(oldName);
                        this.branches[idx] = newName;
                        this.items.forEach(item => { if (item.branch === oldName) item.branch = newName; });
                        this.activeTab = newName;
                        this.saveData();
                    }
                    this.editingTab = null;
                }
            };
        }
    </script>
</body>
</html>
