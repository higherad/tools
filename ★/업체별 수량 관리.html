<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIGHER AD | 스마트 운영 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        input.tab-edit-input { background: transparent; border: none; outline: none; width: 80px; font-weight: 800; color: inherit; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRnAMy3PyD0zracrwyo17hEZ-R40pAvt4",
            authDomain: "higherad-530c4.firebaseapp.com",
            databaseURL: "https://higherad-530c4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "higherad-530c4",
            storageBucket: "higherad-530c4.firebasestorage.app",
            messagingSenderId: "1028078651420",
            appId: "1:1028078651420:web:71c8b8c5e69f0772d637d9",
            measurementId: "G-R9LXEBT2SR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.fbDB = db;
        window.fbRef = ref;
        window.fbSet = set;
        window.fbOnValue = onValue;
    </script>
</head>
<body class="bg-gray-100 font-sans" x-data="managementApp()" x-init="init()" @keydown.f2="startEditing(activeTab)">

    <header class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-layer-group text-2xl text-indigo-200"></i>
            <h1 class="text-lg font-extrabold tracking-tight">HIGHER AD | 스마트 운영 관리</h1>
        </div>
        <div class="flex gap-2">
            <button @click="showPasteModal = true" class="bg-white text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-indigo-50 transition shadow-sm">
                <i class="fas fa-paste mr-1"></i> 엑셀 복붙 등록
            </button>
            <label class="bg-indigo-500 hover:bg-indigo-600 px-3 py-1.5 rounded-lg text-sm font-bold cursor-pointer transition shadow-sm">
                <i class="fas fa-file-excel mr-1"></i> CSV 업로드
                <input type="file" accept=".csv" class="hidden" @change="handleFileUpload($event)">
            </label>
            <button @click="resetCurrentTab()" class="bg-indigo-800 hover:bg-red-600 px-3 py-1.5 rounded-lg text-sm font-bold transition">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-1 mb-6 bg-white p-1 rounded-xl shadow-sm border border-gray-200 overflow-x-auto whitespace-nowrap">
            <template x-for="(tab, index) in branches" :key="tab">
                <div @dblclick="startEditing(tab)" 
                     class="relative group flex items-center rounded-lg transition-all"
                     :class="activeTab === tab ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm' : 'text-gray-500 hover:bg-gray-50'">
                    
                    <button @click="activeTab = tab; selectedIds = []" class="px-6 py-2.5 flex items-center gap-2 outline-none">
                        <template x-if="editingTab !== tab">
                            <span x-text="tab"></span>
                        </template>
                        <template x-if="editingTab === tab">
                            <input x-model="tempTabText" 
                                   @blur="saveTabName(tab)" 
                                   @keydown.enter="saveTabName(tab)"
                                   @keydown.escape="editingTab = null"
                                   class="tab-edit-input border-b-2 border-indigo-500"
                                   x-init="$el.focus()">
                        </template>
                        <span class="text-[10px] px-1.5 py-0.5 rounded-full transition-colors" 
                              :class="activeTab === tab ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-400'"
                              x-text="items.filter(i => i.branch === tab).length"></span>
                    </button>
                </div>
            </template>
            
            <div class="flex items-center border-l ml-2 pl-2">
                <button @click="addBranch()" class="p-2 text-gray-400 hover:text-indigo-500 transition"><i class="fas fa-plus-circle"></i></button>
                <button @click="removeBranch()" class="p-2 text-gray-400 hover:text-red-500 transition"><i class="fas fa-minus-circle"></i></button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-gray-400">
                <p class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">전체 업체수</p>
                <p class="text-2xl font-black text-gray-800" x-text="items.length + '건'"></p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-blue-400">
                <p class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">전체 접수</p>
                <p class="text-2xl font-black text-blue-600" x-text="items.filter(i => i.status === '접수').length"></p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-orange-400">
                <p class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">전체 정산대기</p>
                <p class="text-2xl font-black text-orange-600" x-text="items.filter(i => i.status === '정산대기').length"></p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-green-500">
                <p class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">전체 완료</p>
                <p class="text-2xl font-black text-green-600" x-text="items.filter(i => i.status === '완료').length"></p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-indigo-500">
                <p class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">전체 총 주문 수량</p>
                <p class="text-2xl font-black text-indigo-600" x-text="items.reduce((acc, i) => acc + (Number(i.goal) * Number(i.days)), 0).toLocaleString()"></p>
            </div>
        </div>

        </main>

    <div x-show="showPasteModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" x-cloak>
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-800"><i class="fas fa-paste mr-2 text-indigo-500"></i><span class="text-indigo-600" x-text="activeTab"></span> 탭 등록</h3>
                <button @click="showPasteModal = false" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times-circle text-xl"></i></button>
            </div>
            <div class="p-6">
                <textarea x-model="pasteData" rows="10" class="w-full border-2 border-gray-200 rounded-xl p-4 text-sm font-mono focus:border-indigo-500 outline-none transition bg-gray-50" placeholder="업체명 | URL | MID | 키워드 | 일수 | 시작일 | 일목표"></textarea>
                <div class="flex gap-3 mt-5">
                    <button @click="processPaste()" class="flex-grow bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg">일괄 등록</button>
                    <button @click="showPasteModal = false; pasteData = ''" class="px-6 bg-gray-100 text-gray-500 font-bold rounded-xl">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function managementApp() {
            return {
                items: [],
                branches: ['A영업점', 'B영업점', 'C영업점'],
                activeTab: '',
                editingTab: null,
                tempTabText: '',
                showPasteModal: false,
                pasteData: '',
                selectedIds: [],
                
                init() {
                    const loadInterval = setInterval(() => {
                        if (window.fbOnValue) {
                            clearInterval(loadInterval);
                            window.fbOnValue(window.fbRef(window.fbDB, 'higher_ad_v1'), (snapshot) => {
                                const data = snapshot.val();
                                if (data) {
                                    this.items = data.items || [];
                                    this.branches = data.branches || ['A영업점', 'B영업점', 'C영업점'];
                                    // 첫 페이지 이동 기능 제외함 (activeTab 유지)
                                }
                            });
                        }
                    }, 100);
                },

                async syncWithFirebase() {
                    if (!window.fbSet) return;
                    try {
                        await window.fbSet(window.fbRef(window.fbDB, 'higher_ad_v1'), {
                            items: JSON.parse(JSON.stringify(this.items)),
                            branches: this.branches
                        });
                    } catch (e) { console.error("Firebase Sync Error:", e); }
                },

                async resetCurrentTab() {
                    if(confirm(`[${this.activeTab}]의 모든 데이터를 초기화하시겠습니까?`)) {
                        this.items = this.items.filter(item => item.branch !== this.activeTab);
                        this.selectedIds = [];
                        await this.syncWithFirebase();
                    }
                },

                startEditing(tab) {
                    this.editingTab = tab;
                    this.tempTabText = tab;
                },

                async saveTabName(oldName) {
                    const newName = this.tempTabText.trim();
                    if (newName && newName !== oldName && !this.branches.includes(newName)) {
                        const idx = this.branches.indexOf(oldName);
                        this.branches[idx] = newName;
                        this.items.forEach(item => { if (item.branch === oldName) item.branch = newName; });
                        this.activeTab = newName;
                        await this.syncWithFirebase();
                    }
                    this.editingTab = null;
                },

                async addBranch() {
                    const name = prompt('새로운 영업점 이름을 입력하세요:');
                    if (name && !this.branches.includes(name)) {
                        this.branches.push(name);
                        this.activeTab = name;
                        await this.syncWithFirebase();
                    }
                },

                async removeBranch() {
                    const name = prompt(`현재 영업점 [${this.activeTab}]을 삭제하시겠습니까?`);
                    if (name === this.activeTab) {
                        if(confirm(`정말로 모든 데이터를 삭제하시겠습니까?`)) {
                            this.items = this.items.filter(item => item.branch !== this.activeTab);
                            this.branches = this.branches.filter(b => b !== this.activeTab);
                            this.activeTab = this.branches[0] || '';
                            await this.syncWithFirebase();
                        }
                    }
                },

                async processPaste() {
                    if(!this.pasteData.trim()) return;
                    const rows = this.pasteData.trim().split('\n');
                    const newItems = rows.map(row => {
                        const cols = row.split('\t');
                        return {
                            id: Date.now() + Math.random(),
                            branch: this.activeTab,
                            name: cols[0] || '미지정',
                            url: cols[1] || '',
                            mid: cols[2] || '-',
                            keyword: cols[3] || '-',
                            days: cols[4] || 0,
                            startDate: cols[5] || '2026-03-09',
                            goal: cols[6] || 0,
                            status: '접수'
                        };
                    });
                    this.items = [...this.items, ...newItems];
                    this.showPasteModal = false;
                    this.pasteData = '';
                    await this.syncWithFirebase();
                },

                async handleFileUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    Papa.parse(file, {
                        header: true, skipEmptyLines: true,
                        complete: async (res) => {
                            const mapped = res.data.map(r => ({
                                id: Date.now() + Math.random(),
                                branch: this.activeTab,
                                name: r['업체명'] || '미지정',
                                mid: r['업체MID번호'] || '-',
                                url: r['업체URL'] || '',
                                keyword: r['순위키워드'] || '-',
                                days: r['일수'] || 0,
                                startDate: r['시작일'] || '2026-03-09',
                                goal: r['일목표 개수'] || 0,
                                status: '접수'
                            }));
                            this.items = [...this.items, ...mapped];
                            await this.syncWithFirebase();
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
