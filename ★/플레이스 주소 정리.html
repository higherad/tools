<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>📊 플레이스 데이터 정밀 추출 도구</title>
    <style>
        :root {
            --primary: #2d7df4; --primary-light: #e3f2fd; --bg: #f8fafc;
            --white: #ffffff; --border: #e2e8f0; --text-main: #1e293b;
            --text-sub: #64748b; --error: #ef4444; --error-light: #fef2f2;
        }
        body {
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; padding: 40px 20px; line-height: 1.6; scroll-behavior: smooth;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 26px; font-weight: 800; color: var(--primary); margin: 0; }

        .card {
            background: var(--white); padding: 25px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); border: 1px solid var(--border); margin-bottom: 25px;
        }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 6px; }
        .section-title.err { color: var(--error); }

        .sheet-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        .sheet-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 1050px; }
        .sheet-table th { background: #f8f9fa; border: 1px solid var(--border); height: 36px; color: var(--text-sub); text-align: center; }
        .sheet-table td { border: 1px solid var(--border); height: 38px; padding: 0; background: #fff; text-align: center; position: relative; }

        .grid-input {
            width: 100%; height: 100%; border: none; padding: 0 8px; outline: none;
            font-size: 13px; box-sizing: border-box; background: transparent; text-align: center;
            overflow: hidden !important; white-space: nowrap; text-overflow: clip;
            pointer-events: none;
        }
        .sheet-table td:active .grid-input,
        .sheet-table td:focus-within .grid-input { pointer-events: auto; background: var(--primary-light); }

        .col-num { width: 25px !important; background: #f8f9fa; color: #94a3b8; font-size: 11px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main {
            flex: 1; height: 52px; background: var(--primary); color: white; border: none;
            border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(45, 125, 244, 0.15);
        }
        .btn-main:hover { background: #1e63c9; transform: translateY(-1px); }
        .btn-reset { width: 90px; background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; }

        .res-cell { padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 38px; text-align: center; }
        .error-text { color: var(--error); font-size: 11px; font-weight: 700; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>

<div class="container" x-data="extractorApp()">
    <header><h1>플레이스 데이터 추출 도구</h1></header>

    <div class="card" @keydown.enter="process()">
        <label class="section-title">📥 데이터 입력</label>
        <div class="sheet-wrapper">
            <table class="sheet-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th style="width:140px">업체명</th><th style="width:230px">URL</th><th style="width:115px">MID</th>
                        <th style="width:140px">키워드</th><th style="width:60px">일 수</th><th style="width:110px">시작일</th><th style="width:85px">일 목표</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, rIdx) in inputGrid" :key="rIdx">
                        <tr>
                            <td class="col-num" x-text="rIdx + 1"></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.name" @paste="handlePaste($event, rIdx, 'name')" @wheel.prevent></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.url" @paste="handlePaste($event, rIdx, 'url')" @input="autoExtractMid(rIdx)" @wheel.prevent></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.mid" @paste="handlePaste($event, rIdx, 'mid')" @wheel.prevent></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.keyword" @paste="handlePaste($event, rIdx, 'keyword')" @wheel.prevent></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.days" @paste="handlePaste($event, rIdx, 'days')" @wheel.prevent></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.startDate" @paste="handlePaste($event, rIdx, 'startDate')" @wheel.prevent></td>
                            <td @click="$el.querySelector('input').focus()"><input type="text" class="grid-input" x-model="row.goal" @paste="handlePaste($event, rIdx, 'goal')" @wheel.prevent></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <div class="btn-group">
            <button class="btn-main" @click="process()">✨ 데이터 정리 및 추출하기 (Enter)</button>
            <button class="btn-reset" @click="reset()">초기화</button>
        </div>
    </div>

    <div class="card" x-show="outputGrid.length > 0" x-cloak>
        <label class="section-title">✅ 정제 완료 리스트</label>
        <div class="sheet-wrapper">
            <table class="sheet-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th style="width:140px">업체명</th><th style="width:230px">URL</th><th style="width:115px">MID</th>
                        <th style="width:140px">키워드</th><th style="width:60px">일 수</th><th style="width:110px">시작일</th><th style="width:85px">일 목표</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, idx) in outputGrid" :key="idx">
                        <tr>
                            <td class="col-num" x-text="idx + 1"></td>
                            <td class="res-cell" x-text="row.name"></td>
                            <td class="res-cell" style="color:var(--primary)" x-text="row.url"></td>
                            <td class="res-cell" style="font-weight:700" x-text="row.mid"></td>
                            <td class="res-cell" x-text="row.keyword"></td>
                            <td class="res-cell" x-text="row.days"></td>
                            <td class="res-cell" x-text="row.startDate"></td>
                            <td class="res-cell" x-text="row.goal"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <button class="btn-main" style="width:100%; margin-top:15px; background:#fff; color:var(--primary); border:2px solid var(--primary);" @click="copy()">📋 결과 복사</button>
    </div>

    <div class="card" x-show="errorGrid.length > 0" x-cloak style="border-color: var(--error);">
        <label class="section-title err">⚠️ 확인이 필요한 리스트</label>
        <div class="sheet-wrapper">
            <table class="sheet-table">
                <thead>
                    <tr><th class="col-num">#</th><th style="width:140px">업체명</th><th style="width:230px">입력된 URL</th><th style="width:200px">제외 사유</th></tr>
                </thead>
                <tbody>
                    <template x-for="(row, idx) in errorGrid" :key="idx">
                        <tr style="background: var(--error-light);">
                            <td class="col-num" x-text="row.originIdx"></td>
                            <td class="res-cell" x-text="row.name || '미입력'"></td>
                            <td class="res-cell" x-text="row.url || '미입력'"></td>
                            <td class="res-cell error-text" x-text="row.reason"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
    function extractorApp() {
        // [규칙] 네이버 플레이스 표준 주소 형식을 엄격히 검사
        const MID_EXTRACT_REGEX = /(?:place\.naver\.com|m\.place\.naver\.com)\/(restaurant|hospital|place|hairshop|nailshop)\/([0-9]+)/;
        const createRow = () => ({ name: '', url: '', mid: '', keyword: '', days: '', startDate: '', goal: '' });

        return {
            inputGrid: [createRow(), createRow(), createRow(), createRow(), createRow()],
            outputGrid: [],
            errorGrid: [],

            formatDate(val) {
                if (!val) return '';
                const today = new Date();
                let nums = val.replace(/[^0-9]/g, '-').split('-').filter(v => v !== '');
                let y, m, d;
                if (nums.length === 2) { y = today.getFullYear(); m = nums[0]; d = nums[1]; }
                else if (nums.length === 3) { y = nums[0].length === 2 ? "20" + nums[0] : nums[0]; m = nums[1]; d = nums[2]; }
                else return val;
                return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            },

            autoExtractMid(idx) {
                let row = this.inputGrid[idx];
                if (!row.url) return;
                let cleanUrl = row.url.split('?')[0].trim();
                const match = cleanUrl.match(MID_EXTRACT_REGEX);
                if (match) {
                    row.mid = match[2];
                    if (!row.url.startsWith('https://m.place')) {
                        row.url = `https://m.place.naver.com/restaurant/${match[2]}`;
                    }
                }
            },

            process() {
                this.outputGrid = [];
                this.errorGrid = [];

                this.inputGrid.forEach((row, i) => {
                    if (!Object.values(row).some(v => v.trim() !== '')) return;

                    let reasons = [];
                    // [핵심 필터링 로직]
                    let cleanUrl = row.url.split('?')[0].trim();
                    const match = cleanUrl.match(MID_EXTRACT_REGEX);
                    let mid = "";
                    let finalUrl = cleanUrl;

                    // 1. URL 형식 검사 (매칭 안 되면 즉시 사유 추가)
                    if (!cleanUrl) {
                        reasons.push("URL 누락");
                    } else if (!match) {
                        reasons.push("유효하지 않은 플레이스 주소");
                    } else {
                        mid = match[2];
                        finalUrl = `https://m.place.naver.com/restaurant/${mid}`;
                    }

                    // 2. 나머지 필수 항목 검사
                    if (!row.name.trim()) reasons.push("업체명 누락");
                    if (!row.keyword.trim()) reasons.push("키워드 누락");
                    if (!row.days.trim()) reasons.push("일 수 누락");
                    if (!row.startDate.trim()) reasons.push("시작일 누락");
                    if (!row.goal.trim()) reasons.push("일 목표 누락");

                    // 3. 분류 (reasons가 하나라도 있으면 에러 리스트로)
                    if (reasons.length === 0) {
                        this.outputGrid.push({
                            ...row,
                            url: finalUrl,
                            mid: mid,
                            startDate: this.formatDate(row.startDate)
                        });
                    } else {
                        this.errorGrid.push({
                            ...row,
                            originIdx: i + 1,
                            reason: reasons.join(' / ')
                        });
                    }
                });
                this.$nextTick(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); });
            },

            handlePaste(e, rowIdx, field) {
                e.preventDefault();
                const data = (e.clipboardData || window.clipboardData).getData('text');
                const lines = data.split(/\r?\n/).filter(l => l.trim().length > 0 || l.includes('\t'));
                lines.forEach((line, i) => {
                    const targetIdx = rowIdx + i;
                    while (targetIdx >= this.inputGrid.length) this.inputGrid.push(createRow());
                    if (line.includes('\t')) {
                        const cols = line.split('\t').map(c => c.trim());
                        const fields = ['name', 'url', 'mid', 'keyword', 'days', 'startDate', 'goal'];
                        let di = 0;
                        for (let f = fields.indexOf(field); f < fields.length; f++) {
                            while (di < cols.length && cols[di] === "") di++;
                            if (di < cols.length) { this.inputGrid[targetIdx][fields[f]] = cols[di]; di++; }
                        }
                    } else { this.inputGrid[targetIdx][field] = line.trim(); }
                    this.autoExtractMid(targetIdx);
                });
            },

            copy() {
                const text = this.outputGrid.map(r => Object.values(r).join('\t')).join('\n');
                navigator.clipboard.writeText(text).then(() => alert('정리된 데이터가 복사되었습니다.'));
            },

            reset() {
                this.inputGrid = [createRow(), createRow(), createRow(), createRow(), createRow()];
                this.outputGrid = []; this.errorGrid = [];
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    }
</script>
</body>
</html>
