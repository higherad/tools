<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>📊 플레이스 데이터 추출 도구</title>
    <style>
        :root {
            --primary: #2d7df4;
            --primary-light: #e3f2fd;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --error: #ef4444;
        }

        body {
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; padding: 40px 20px; line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 26px; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -0.5px; }

        .card {
            background: var(--white); padding: 25px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); border: 1px solid var(--border); margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px; font-weight: 700; margin-bottom: 15px; color: var(--primary);
            display: flex; align-items: center; gap: 6px;
        }

        .sheet-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        .sheet-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 1050px; }
        .sheet-table th { background: #f8f9fa; border: 1px solid var(--border); height: 36px; color: var(--text-sub); font-weight: 600; text-align: center; }
        .sheet-table td { border: 1px solid var(--border); height: 38px; padding: 0; background: #fff; text-align: center; }

        /* 컬럼 사이즈 최적화 */
        .col-num { width: 40px; }
        .col-name { width: 140px; }
        .col-url { width: 230px; }
        .col-mid { width: 115px; }
        .col-kw { width: 140px; }
        .col-days { width: 60px; }
        .col-date { width: 105px; }
        .col-goal { width: 85px; }
        .col-err { width: 140px; }

        .grid-input {
            width: 100%; height: 100%; border: none; padding: 0 5px; outline: none;
            font-size: 13px; box-sizing: border-box; background: transparent; text-align: center;
        }
        .grid-input:focus { background: var(--primary-light); }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main {
            flex: 1; height: 52px; background: var(--primary); color: white; border: none;
            border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(45, 125, 244, 0.15);
        }
        .btn-main:hover { background: #1e63c9; transform: translateY(-1px); }
        .btn-reset { width: 90px; background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; }

        .res-cell { padding: 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 38px; text-align: center; }
        .error-text { color: var(--error); font-size: 11px; font-weight: 700; text-align: center; padding: 0 5px; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body>

<div class="container" x-data="extractorApp()">
    <header>
        <h1>플레이스 데이터 추출 도구</h1>
    </header>

    <div class="card">
        <label class="section-title">📥 데이터 입력 (URL 붙여넣기 시 MID 자동 추출)</label>
        <div class="sheet-wrapper">
            <table class="sheet-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th class="col-name">업체명</th>
                        <th class="col-url">URL</th>
                        <th class="col-mid">MID</th>
                        <th class="col-kw">키워드</th>
                        <th class="col-days">일 수</th>
                        <th class="col-date">시작일</th>
                        <th class="col-goal">일 목표</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, rIdx) in inputGrid" :key="rIdx">
                        <tr>
                            <td style="background:#f8f9fa; color:#94a3b8; font-size:11px" x-text="rIdx + 1"></td>
                            <td><input type="text" class="grid-input" x-model="row.name" @paste="handlePaste($event, rIdx, 'name')"></td>
                            <td><input type="text" class="grid-input" x-model="row.url" @paste="handlePaste($event, rIdx, 'url')" @input="autoExtractMid(rIdx)"></td>
                            <td><input type="text" class="grid-input" x-model="row.mid" @paste="handlePaste($event, rIdx, 'mid')"></td>
                            <td><input type="text" class="grid-input" x-model="row.keyword" @paste="handlePaste($event, rIdx, 'keyword')"></td>
                            <td><input type="text" class="grid-input" x-model="row.days" @paste="handlePaste($event, rIdx, 'days')"></td>
                            <td><input type="text" class="grid-input" x-model="row.startDate" @paste="handlePaste($event, rIdx, 'startDate')"></td>
                            <td><input type="text" class="grid-input" x-model="row.goal" @paste="handlePaste($event, rIdx, 'goal')"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <div class="btn-group">
            <button class="btn-main" @click="process()">✨ 데이터 분석 및 추출하기</button>
            <button class="btn-reset" @click="reset()">초기화</button>
        </div>
    </div>

    <!-- 결과 리스트 -->
    <div class="card" x-show="outputGrid.length > 0" x-cloak>
        <label class="section-title">📊 추출 완료 리스트</label>
        <div class="sheet-wrapper">
            <table class="sheet-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th class="col-name">업체명</th>
                        <th class="col-url">URL</th>
                        <th class="col-mid">MID</th>
                        <th class="col-kw">키워드</th>
                        <th class="col-days">일 수</th>
                        <th class="col-date">시작일</th>
                        <th class="col-goal">일 목표</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, idx) in outputGrid" :key="idx">
                        <tr>
                            <td style="background:#f8f9fa; color:#94a3b8" x-text="idx + 1"></td>
                            <td class="res-cell" x-text="row.name"></td>
                            <td class="res-cell" x-text="row.url" style="color:var(--primary)"></td>
                            <td class="res-cell" x-text="row.mid" style="font-weight:700"></td>
                            <td class="res-cell" x-text="row.keyword"></td>
                            <td class="res-cell" x-text="row.days"></td>
                            <td class="res-cell" x-text="row.startDate"></td>
                            <td class="res-cell" x-text="row.goal"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <button class="btn-main" style="width:100%; margin-top:15px; background:var(--white); color:var(--primary); border:2px solid var(--primary);" @click="copy()">📋 결과 복사</button>
    </div>

    <!-- 불일치 항목 -->
    <div class="card" style="border: 1px solid #ffcdd2; background: #fff8f8;" x-show="errorGrid.length > 0" x-cloak>
        <label class="section-title" style="color:var(--error)">⚠️ 불일치 및 누락 항목 (데이터 검토)</label>
        <div class="sheet-wrapper" style="border-color: #fecaca;">
            <table class="sheet-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th class="col-name">업체명</th>
                        <th class="col-url">URL</th>
                        <th class="col-mid">MID</th>
                        <th class="col-kw">키워드</th>
                        <th class="col-days">일수</th>
                        <th class="col-date">시작일</th>
                        <th class="col-goal">일목표</th>
                        <th class="col-err">오류 원인</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, idx) in errorGrid" :key="idx">
                        <tr>
                            <td style="background:#fee2e2; color:#b91c1c; font-weight:bold;" x-text="row.originIdx"></td>
                            <td class="res-cell" x-text="row.name"></td>
                            <td class="res-cell" x-text="row.url"></td>
                            <td class="res-cell" x-text="row.mid"></td>
                            <td class="res-cell" x-text="row.keyword"></td>
                            <td class="res-cell" x-text="row.days"></td>
                            <td class="res-cell" x-text="row.startDate"></td>
                            <td class="res-cell" x-text="row.goal"></td>
                            <td class="error-text" x-text="row.reason"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
    function extractorApp() {
        const MID_EXTRACT_REGEX = /(?:place\.naver\.com|m\.place\.naver\.com)\/(?:restaurant|hospital|place|hairshop|nailshop)\/([0-9]+)/;
        const createRow = () => ({ name: '', url: '', mid: '', keyword: '', days: '', startDate: '', goal: '' });

        return {
            inputGrid: [createRow(), createRow(), createRow()],
            outputGrid: [],
            errorGrid: [],

            // URL에서 MID 추출 및 URL 표준화 함수
            autoExtractMid(idx) {
                let row = this.inputGrid[idx];
                if (!row.url) return;
                
                const match = row.url.match(MID_EXTRACT_REGEX);
                if (match) {
                    const mid = match[1];
                    // MID가 비어있을 때만 자동 채우기
                    if (!row.mid) row.mid = mid;
                    // URL을 모바일 표준 형태로 변환 (restaurant 기준)
                    if (!row.url.startsWith('https://m.place')) {
                        row.url = `https://m.place.naver.com/restaurant/${mid}`;
                    }
                }
            },

            handlePaste(e, rowIdx, field) {
                e.preventDefault();
                const data = (e.clipboardData || window.clipboardData).getData('text');
                const lines = data.split(/\r?\n/).filter(line => line.trim().length > 0 || line.includes('\t'));

                lines.forEach((line, i) => {
                    const targetIdx = rowIdx + i;
                    while (targetIdx >= this.inputGrid.length) this.inputGrid.push(createRow());

                    if (line.includes('\t')) {
                        const cols = line.split('\t');
                        const fields = ['name', 'url', 'mid', 'keyword', 'days', 'startDate', 'skip', 'goal'];
                        const startPos = fields.indexOf(field);
                        
                        cols.forEach((val, c) => {
                            const currentField = fields[startPos + c];
                            if (currentField && currentField !== 'skip') {
                                this.inputGrid[targetIdx][currentField] = val.trim();
                            }
                        });
                    } else {
                        this.inputGrid[targetIdx][field] = line.trim();
                    }
                    // 붙여넣기 후 해당 행의 MID 자동 추출 실행
                    this.autoExtractMid(targetIdx);
                });
            },

            process() {
                this.outputGrid = [];
                this.errorGrid = [];
                this.inputGrid.forEach((row, i) => {
                    if (!Object.values(row).some(v => v !== '')) return;

                    let rowErrors = [];
                    // 분석 전 한 번 더 정규화 시도
                    const match = row.url.match(MID_EXTRACT_REGEX);
                    if (match) {
                        const mid = match[1];
                        row.url = `https://m.place.naver.com/restaurant/${mid}`;
                        if (!row.mid) row.mid = mid;
                    }

                    const fieldLabels = { name:'업체명', url:'URL', mid:'MID', keyword:'키워드', days:'일 수', startDate:'시작일', goal:'일 목표' };
                    Object.keys(fieldLabels).forEach(key => { if (!row[key]) rowErrors.push(fieldLabels[key]); });

                    if (row.url && !MID_EXTRACT_REGEX.test(row.url)) rowErrors.push("URL형식");
                    else if (match && row.mid && match[1] !== row.mid) rowErrors.push("MID불일치");

                    if (rowErrors.length > 0) {
                        this.errorGrid.push({ ...row, originIdx: i + 1, reason: rowErrors.join(', ') });
                    } else {
                        this.outputGrid.push({...row});
                    }
                });
            },

            copy() {
                const text = this.outputGrid.map(r => `${r.name}\t${r.url}\t${r.mid}\t${r.keyword}\t${r.days}\t${r.startDate}\t${r.goal}`).join('\n');
                navigator.clipboard.writeText(text).then(() => alert('정상 데이터가 복사되었습니다.'));
            },

            reset() {
                this.inputGrid = [createRow(), createRow(), createRow()];
                this.outputGrid = [];
                this.errorGrid = [];
            }
        }
    }
</script>
</body>
</html>
