<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>네이버 플레이스 URL 정리</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">

  <style>
    :root {
      --primary: #2d7df4;
      --primary-hover: #1e63c9;
      --success: #059669;
      --error: #ef4444;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px;
    }

    .main-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: vertical;
      height: 150px;
      background: #fdfdfd;
    }

    .btn-main {
      width: 100%;
      height: 48px;
      margin-top: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-main:hover { background: var(--primary-hover); }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .output-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 8px;
      display: block;
    }

    .output-area {
      height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      background: #fff;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #334155;
    }

    .copy-group {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    .btn-copy-all {
      flex: 2;
      height: 48px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-copy-all:hover { opacity: 0.9; transform: translateY(-1px); }

    .error-card {
      margin-top: 24px;
      border: 1px solid #fecaca;
      background: #fffafb;
      padding: 16px;
      border-radius: 12px;
    }

    .error-output {
      font-size: 12px;
      color: #991b1b;
      white-space: pre-wrap;
      max-height: 100px;
      overflow-y: auto;
    }

    #info-text {
      text-align: right;
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>네이버 플레이스 URL 정리</h1>
  </header>

  <div class="main-card">
    <label>플레이스 URL 입력</label>
    <textarea id="input" placeholder="여기에 주소를 붙여넣으세요" oninput="updateButtonCount()"></textarea>
    <button id="extractBtn" class="btn-main" onclick="extract()">추출하기</button>
    <div id="info-text"></div>
  </div>

  <div class="result-grid">
    <div>
      <span class="output-label">URL 리스트</span>
      <div id="urlOutput" class="output-area"></div>
    </div>
    <div>
      <span class="output-label">MID 리스트</span>
      <div id="midOutput" class="output-area"></div>
    </div>
  </div>

  <div class="copy-group">
    <button class="btn-copy-all" onclick="copyForExcel()">URL + MID 복사</button>
  </div>

  <div class="error-card">
    <label style="color:var(--error)">⚠️ 비정상 데이터</label>
    <div id="errorOutput" class="error-output"></div>
  </div>
</div>

<script>
  const VALID_URL_REGEX = /^https?:\/\/m\.place\.naver\.com\/(restaurant|hospital|place|hairshop|nailshop)\/[0-9]+/;
  let cachedPairs = [];

  function updateButtonCount() {
    const lines = document.getElementById("input").value.split(/\r?\n/);
    let count = 0;
    lines.forEach(v => { if (VALID_URL_REGEX.test(v.trim())) count++; });
    document.getElementById("extractBtn").textContent = count > 0 ? `${count}개 추출하기` : "추출하기";
  }

  function extract() {
    const lines = document.getElementById("input").value.split(/\r?\n/);
    let urlList = [];
    let midList = [];
    let wrongList = [];
    cachedPairs = [];

    lines.forEach(line => {
      const v = line.trim();
      if (!v) return;
      const match = v.match(/(https?:\/\/m\.place\.naver\.com\/(restaurant|hospital|place|hairshop|nailshop)\/([0-9]+))/);
      if (match) {
        urlList.push(match[1]);
        midList.push(match[3]);
        cachedPairs.push([match[1], match[3]]);
      } else {
        wrongList.push(v);
      }
    });

    document.getElementById("urlOutput").textContent = urlList.join("\n");
    document.getElementById("midOutput").textContent = midList.join("\n");
    document.getElementById("errorOutput").textContent = wrongList.join("\n");
    document.getElementById("info-text").textContent = urlList.length > 0 ? `추출 성공: ${urlList.length}건` : "";
  }

  function copyForExcel() {
    if (cachedPairs.length === 0) {
      alert("추출된 데이터가 없습니다.");
      return;
    }
    const text = cachedPairs.map(pair => `${pair[0]}\t${pair[1]}`).join("\n");
    const btn = document.querySelector('.btn-copy-all');
    
    navigator.clipboard.writeText(text).then(() => {
      const originalText = btn.textContent;
      btn.textContent = "완료 ✨";
      btn.style.background = "#047857";
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = "var(--success)";
      }, 1000);
    });
  }
</script>

</body>
</html>
