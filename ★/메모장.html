<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 업무 정리 메모</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
    :root {
      --primary: #2e7d32;
      --primary-hover: #1b5e20;
      --bg-sidebar: #f8f9fa;
      --bg-main: #ffffff;
      --border: #e0e0e0;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --danger: #e74c3c;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }

    body.dark-mode {
      --bg-sidebar: #1e1e1e;
      --bg-main: #252525;
      --border: #3d3d3d;
      --text-main: #e0e0e0;
      --text-muted: #a0a0a0;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    
    body {
      display: flex;
      margin: 0;
      height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-main);
      transition: background 0.3s;
      overflow: hidden;
    }

    /* 사이드바 스타일 */
    #sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }

    .top-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .icon-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-main);
      color: var(--text-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .icon-btn:hover { background: #eee; transform: translateY(-1px); }
    body.dark-mode .icon-btn:hover { background: #333; }

    #searchInput {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-main);
      color: var(--text-main);
      margin-bottom: 15px;
      font-size: 14px;
    }

    #dateList {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .date-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .date-item:hover { background: rgba(0,0,0,0.05); }
    body.dark-mode .date-item:hover { background: rgba(255,255,255,0.05); }

    .delete-icon {
      color: var(--text-muted);
      font-size: 16px;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }

    .date-item:hover .delete-icon { opacity: 1; }
    .delete-icon:hover { color: var(--danger); }

    /* 메인 콘텐츠 영역 */
    #main {
      flex: 1;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 40px;
      color: var(--primary);
    }

    .memo-container {
      width: 100%;
      max-width: 800px;
    }

    .memo-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    #todayDate { font-size: 18px; font-weight: 700; color: var(--text-main); }
    
    /* 🛠 수정된 부분: 기호 가독성 강화 */
    #schedule {
      width: 100%;
      height: 500px;
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-main);
      color: var(--text-main);
      /* 기호를 큼직하게 보이게 하는 핵심 설정 */
      font-size: 18px; 
      line-height: 1.85; 
      letter-spacing: -0.01em;
      resize: none;
      box-shadow: var(--shadow);
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    #schedule:focus { border-color: var(--primary); background: #fff; }
    body.dark-mode #schedule:focus { background: #2a2a2a; }

    .bottom-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    #saveBtn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #saveBtn:hover { background: var(--primary-hover); }
    #saveBtn:active { transform: scale(0.99); }

    #message {
      font-weight: 600;
      color: var(--primary);
      display: none;
      font-size: 14px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="top-btns">
      <button id="backupBtn" class="icon-btn">📤 백업</button>
      <button id="restoreBtn" class="icon-btn">📥 복원</button>
      <button id="toggleDarkMode" class="icon-btn">🌙</button>
    </div>
    <h3 style="margin: 10px 0 10px 4px; font-size: 15px; color: var(--text-muted);">📅 메모 히스토리</h3>
    <input id="searchInput" type="text" placeholder="날짜로 검색 (YYYY-MM-DD)">
    <input type="file" id="restoreInput" accept=".json" style="display:none;">
    <div id="dateList"></div>
  </div>

  <div id="main">
    <h1>🗓 업무 정리 메모</h1>

    <div class="memo-container">
      <div class="memo-header">
        <div id="todayDate"></div>
        <span style="font-size: 12px; color: var(--text-muted);">Ctrl+S: 저장</span>
      </div>
      <textarea id="schedule" placeholder="오늘 진행할 업무 리스트를 정리해 보세요."></textarea>
      
      <div class="bottom-area">
        <button id="saveBtn">안전하게 저장하기</button>
        <div id="message">💾 저장되었습니다!</div>
      </div>
    </div>
  </div>

<script>
  const schedule = document.getElementById("schedule");
  const saveBtn = document.getElementById("saveBtn");
  const message = document.getElementById("message");
  const dateList = document.getElementById("dateList");
  const todayDateEl = document.getElementById("todayDate");
  const searchInput = document.getElementById("searchInput");
  const toggleDarkModeBtn = document.getElementById("toggleDarkMode");
  const backupBtn = document.getElementById("backupBtn");
  const restoreBtn = document.getElementById("restoreBtn");
  const restoreInput = document.getElementById("restoreInput");

  const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
  const today = new Date();
  let currentDate = formatDate(today);

  function formatDate(date) { return date.toISOString().slice(0, 10); }

  function displayDate(dateStr) {
    const d = new Date(dateStr);
    return `📅 ${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;
  }

  function loadMemo(dateKey) {
    currentDate = dateKey;
    schedule.value = localStorage.getItem("memo_" + dateKey) || "";
    todayDateEl.textContent = displayDate(dateKey);
  }

  function saveMemo() {
    localStorage.setItem("memo_" + currentDate, schedule.value);
    showMessage("💾 저장되었습니다!");
    updateDateList();
  }

  function deleteMemo(dateKey) {
    if (confirm(`${dateKey} 메모를 삭제할까요?`)) {
      localStorage.removeItem("memo_" + dateKey);
      if (currentDate === dateKey) schedule.value = "";
      updateDateList();
    }
  }

  function showMessage(text) {
    message.innerText = text;
    message.style.display = "block";
    setTimeout(() => { message.style.display = "none"; }, 2000);
  }

  function updateDateList() {
    dateList.innerHTML = "";
    const keys = Object.keys(localStorage).filter(k => k.startsWith("memo_"));
    const query = searchInput.value.trim();
    const dates = keys.map(k => k.replace("memo_", "")).filter(d => d.includes(query)).sort().reverse();

    dates.forEach(date => {
      const container = document.createElement("div");
      container.className = "date-item";
      const dayName = dayNames[new Date(date).getDay()];
      container.innerHTML = `<span>${date} (${dayName})</span><span class="delete-icon">🗑</span>`;
      container.onclick = () => loadMemo(date);
      container.querySelector(".delete-icon").onclick = (e) => { e.stopPropagation(); deleteMemo(date); };
      dateList.appendChild(container);
    });
  }

  saveBtn.addEventListener("click", saveMemo);
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
      e.preventDefault();
      e.shiftKey ? backupBtn.click() : saveMemo();
    }
  });

  toggleDarkModeBtn.addEventListener("click", () => document.body.classList.toggle("dark-mode"));

  backupBtn.addEventListener("click", () => {
    const allMemos = {};
    Object.keys(localStorage).forEach(key => { if (key.startsWith("memo_")) allMemos[key] = localStorage.getItem(key); });
    const blob = new Blob([JSON.stringify(allMemos, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `memo_backup_${formatDate(new Date())}.json`;
    a.click();
  });

  restoreBtn.addEventListener("click", () => restoreInput.click());
  restoreInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        Object.keys(data).forEach(key => { if (key.startsWith("memo_")) localStorage.setItem(key, data[key]); });
        alert("✅ 메모 복원이 완료되었습니다!");
        updateDateList();
        loadMemo(currentDate);
      } catch (err) { alert("❌ 복원 실패: 잘못된 파일 형식입니다."); }
    };
    reader.readAsText(file);
  });

  // 노션 스타일 자동 변환 로직 (수정 버전)
  schedule.addEventListener("keydown", function (e) {
    const cursor = this.selectionStart;
    const value = this.value;
    const lineStart = value.lastIndexOf("\n", cursor - 1) + 1;
    const currentLine = value.substring(lineStart, cursor); // 현재 줄의 커서 앞까지의 텍스트

    // 1. 스페이스바 입력 시 기호 변환
    if (e.key === " ") {
      let replacement = "";
      
      // trim()을 써서 앞뒤 공백을 제거한 상태로 비교합니다.
      if (currentLine === "*" || currentLine === "-") {
        replacement = "• ";
      } else if (currentLine === ">") {
        replacement = "▶ ";
      } else if (currentLine === "->") {
        replacement = "→ ";
      }

      if (replacement) {
        e.preventDefault(); // 스페이스가 입력되는 기본 동작을 막고
        // 현재 줄의 시작부터 커서까지를 교체합니다.
        this.value = value.substring(0, lineStart) + replacement + value.substring(cursor);
        // 커서 위치를 바뀐 글자 바로 뒤로 이동시킵니다.
        this.selectionStart = this.selectionEnd = lineStart + replacement.length;
        return; // 변환 성공 시 종료
      }
    }

    // 2. 엔터 키 입력 시 이전 줄의 불렛 유지
    if (e.key === "Enter") {
      const bulletMatch = currentLine.match(/^(\s*[•◦▪▶→]\s*)/);
      if (bulletMatch) {
        // 만약 내용 없이 불렛만 있는 상태에서 엔터를 치면 불렛 삭제 (리스트 종료)
        if (currentLine.trim() === bulletMatch[0].trim()) {
          e.preventDefault();
          this.value = value.substring(0, lineStart) + "\n" + value.substring(cursor);
          this.selectionStart = this.selectionEnd = lineStart + 1;
        } else {
          // 내용이 있다면 다음 줄에 불렛 자동 생성
          e.preventDefault();
          const nextBullet = "\n" + bulletMatch[0];
          this.value = value.substring(0, cursor) + nextBullet + value.substring(cursor);
          this.selectionStart = this.selectionEnd = cursor + nextBullet.length;
        }
      }
    }

    // 3. 백스페이스로 불렛 한꺼번에 지우기
    if (e.key === "Backspace") {
      const bulletMatch = currentLine.match(/^(\s*[•◦▪▶→]\s*)$/);
      if (bulletMatch) {
        e.preventDefault();
        this.value = value.substring(0, lineStart) + value.substring(cursor);
        this.selectionStart = this.selectionEnd = lineStart;
      }
    }

    // 4. 기존 탭(Tab) 기능 유지 및 개선 (들여쓰기)
    if (e.key === "Tab") {
      e.preventDefault();
      const isBullet = currentLine.match(/^(\s*)([•◦▪])\s/);
      if (isBullet) {
        let nextSymbol = "•";
        if (isBullet[2] === "•") nextSymbol = "◦";
        else if (isBullet[2] === "◦") nextSymbol = "▪";
        
        const indent = isBullet[1] + "  ";
        const newLine = indent + nextSymbol + " ";
        this.value = value.substring(0, lineStart) + newLine + value.substring(cursor);
        this.selectionStart = this.selectionEnd = lineStart + newLine.length;
      } else {
        // 일반 텍스트에서 탭은 2칸 공백
        const start = this.selectionStart;
        this.value = value.substring(0, start) + "  " + value.substring(this.selectionEnd);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    }
  });

  searchInput.addEventListener("input", updateDateList);
  todayDateEl.textContent = displayDate(currentDate);
  schedule.value = localStorage.getItem("memo_" + currentDate) || "";
  updateDateList();
</script>
</body>
</html>
