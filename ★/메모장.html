<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📋 실시간 업무 메모</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --primary: #2e7d32;
      --primary-hover: #1b5e20;
      --bg-sidebar: #f8f9fa;
      --bg-main: #ffffff;
      --border: #e0e0e0;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    
    body {
      display: flex;
      margin: 0;
      height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-main);
      overflow: hidden;
    }

    /* [사이드바] */
    #sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      z-index: 100;
    }

    #searchInput {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-main); color: var(--text-main); margin-bottom: 12px; font-size: 14px;
    }

    #dateList { flex: 1; overflow-y: auto; }

    .date-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
      cursor: pointer; font-size: 14px; transition: background 0.2s;
      border: 1px solid transparent;
    }
    .date-item:hover { background: rgba(0,0,0,0.05); border-color: var(--border); }
    .date-item.active { background: #e8f5e9; border-color: var(--primary); color: var(--primary); font-weight: 600; }
    .delete-icon { color: var(--text-muted); font-size: 16px; padding: 4px; opacity: 0.6; }
    .delete-icon:hover { opacity: 1; color: #d32f2f; }

    /* [메인 콘텐츠] */
    #main {
      flex: 1; padding: 40px; display: flex; flex-direction: column;
      align-items: center; overflow-y: auto;
    }

    h1 { font-size: 22px; font-weight: 800; margin-bottom: 25px; color: var(--primary); text-align: center; }

    .memo-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; }

    .memo-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }

    #todayDate { font-size: 16px; font-weight: 700; color: var(--text-main); }
    
    #schedule {
      width: 100%; height: 60vh; padding: 20px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main);
      font-size: 16px; line-height: 1.7; resize: none; box-shadow: var(--shadow);
      outline: none; transition: border-color 0.2s;
    }

    .bottom-area { width: 100%; margin-top: 20px; text-align: center; }

    #saveBtn {
      width: 100%; padding: 16px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }

    #message { font-weight: 600; color: var(--primary); display: none; margin-top: 10px; }

    @media (max-width: 850px) {
      body { flex-direction: column; overflow-y: auto; }
      #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 20px 15px; order: 2; }
      #dateList { max-height: 200px; }
      #main { padding: 30px 15px; order: 1; }
      #schedule { height: 45vh; }
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h3 style="margin: 0 0 12px 4px; font-size: 14px; color: var(--text-muted); font-weight: 700;">📅 히스토리</h3>
    <input id="searchInput" type="text" placeholder="날짜 검색...">
    <div id="dateList"></div>
  </div>

  <div id="main">
    <h1>🗓 업무 정리 메모</h1>
    <div class="memo-container">
      <div class="memo-header">
        <div id="todayDate"></div>
      </div>
      <textarea id="schedule" placeholder="업무 내용을 입력하세요."></textarea>
      <div class="bottom-area">
        <button id="saveBtn">저장하기</button>
        <div id="message">💾 저장되었습니다!</div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
  import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRnAMy3PyD0zracrwyo17hEZ-R40pAvt4",
    authDomain: "higherad-530c4.firebaseapp.com",
    databaseURL: "https://higherad-530c4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "higherad-530c4",
    storageBucket: "higherad-530c4.firebasestorage.app",
    messagingSenderId: "1028078651420",
    appId: "1:1028078651420:web:71c8b8c5e69f0772d637d9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const schedule = document.getElementById("schedule");
  const saveBtn = document.getElementById("saveBtn");
  const message = document.getElementById("message");
  const dateList = document.getElementById("dateList");
  const todayDateEl = document.getElementById("todayDate");
  const searchInput = document.getElementById("searchInput");

  const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
  let currentDate = new Date().toISOString().slice(0, 10);
  let currentUser = null;
  let allMemoData = {};

  // [개인화 적용] 로그인 상태 감지 및 사용자별 데이터 경로 설정
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      // 사용자별 UID 경로로 데이터 참조
      const memosRef = ref(db, `users/${currentUser.uid}/memos`);
      onValue(memosRef, (snapshot) => {
        allMemoData = snapshot.val() || {};
        updateUI();
      });
    }
  });

  function displayDate(dateStr) {
    const d = new Date(dateStr);
    return `📅 ${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;
  }

  function updateUI() {
    todayDateEl.textContent = displayDate(currentDate);
    schedule.value = allMemoData[currentDate] || "";
    
    dateList.innerHTML = "";
    const query = searchInput.value.trim();
    
    const dates = Object.keys(allMemoData)
      .filter(d => d.includes(query))
      .sort().reverse();

    dates.forEach(date => {
      const container = document.createElement("div");
      container.className = `date-item ${date === currentDate ? 'active' : ''}`;
      const dayName = dayNames[new Date(date).getDay()];
      container.innerHTML = `<span>${date} (${dayName})</span><span class="delete-icon">🗑</span>`;
      
      container.onclick = () => {
        currentDate = date;
        updateUI();
        if(window.innerWidth <= 850) window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      container.querySelector(".delete-icon").onclick = (e) => {
        e.stopPropagation();
        if (confirm(`${date} 메모를 삭제할까요?`)) {
          // 사용자별 경로에서 삭제
          remove(ref(db, `users/${currentUser.uid}/memos/${date}`)).then(() => {
              if(currentDate === date) {
                  currentDate = new Date().toISOString().slice(0, 10);
              }
          });
        }
      };
      dateList.appendChild(container);
    });
  }

  async function saveMemo() {
    if (!currentUser) return;

    try {
      // 사용자별 UID 경로에 데이터 업데이트
      await update(ref(db, `users/${currentUser.uid}/memos`), {
        [currentDate]: schedule.value
      });
      message.style.display = "block";
      setTimeout(() => { message.style.display = "none"; }, 2000);
    } catch (e) { alert("저장 실패"); }
  }

  saveBtn.addEventListener("click", saveMemo);
  
  // 단축키 저장 (Ctrl+S / Cmd+S)
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
      e.preventDefault();
      saveMemo();
    }
  });

  searchInput.addEventListener("input", updateUI);

  // 특수 기호 변환 및 불렛포인트 로직
  schedule.addEventListener("keydown", function (e) {
    const cursor = this.selectionStart;
    const value = this.value;
    const lineStart = value.lastIndexOf("\n", cursor - 1) + 1;
    const currentLine = value.substring(lineStart, cursor);

    if (e.key === " ") {
      let replacement = "";
      if (currentLine === "*" || currentLine === "-") replacement = "• ";
      else if (currentLine === ">") replacement = "▶ ";
      else if (currentLine === "->") replacement = "→ ";

      if (replacement) {
        e.preventDefault();
        this.value = value.substring(0, lineStart) + replacement + value.substring(cursor);
        this.selectionStart = this.selectionEnd = lineStart + replacement.length;
      }
    }

    if (e.key === "Enter") {
      const bulletMatch = currentLine.match(/^(\s*[•◦▪▶→]\s*)/);
      if (bulletMatch) {
        if (currentLine.trim() === bulletMatch[0].trim()) {
          e.preventDefault();
          this.value = value.substring(0, lineStart) + "\n" + value.substring(cursor);
          this.selectionStart = this.selectionEnd = lineStart + 1;
        } else {
          e.preventDefault();
          const nextBullet = "\n" + bulletMatch[0];
          this.value = value.substring(0, cursor) + nextBullet + value.substring(cursor);
          this.selectionStart = this.selectionEnd = cursor + nextBullet.length;
        }
      }
    }
  });
</script>
</body>
</html>
