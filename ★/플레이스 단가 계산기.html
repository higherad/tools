<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>트래픽/길찾기 통합 계산기</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <text y='.9em' font-size='90'>💵</text>
</svg>">

<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280;
    --accent:#2563eb; --ok:#0e9f6e; --warn:#b45309; --error:#e11d48; --line:#e5e7eb;
    --shadow:0 10px 30px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  body{margin:0; padding:28px; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,Helvetica,sans-serif}
  .wrap{max-width:1000px;margin:0 auto;display:grid;gap:20px}
  .card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:22px}
  .header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px}
  h1{margin:0;font-size:22px}
  .hr{height:1px;background:var(--line);margin:14px 0 0}
  label{display:block;font-weight:600;margin-bottom:6px;font-size:14px}
  
  /* 입력창 크기 및 높이 고정 (흔들림 방지 핵심) */
  input[type="number"], input[type="date"], input[type="text"]{
    width:100%; height: 46px; padding:0 14px; border:1px solid var(--line);
    border-radius:12px; font-size:16px; background:#fff;
    box-sizing: border-box; 
  }
  input[readonly]{background:#f3f4f6; color:#6b7280; cursor:not-allowed;}
  input:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:12px;flex-wrap:wrap; align-items: flex-end;}
  .col{flex:1 1 150px; min-width: 0;}
  
  .pill{
    display:inline-flex;gap:8px;align-items:center;padding:8px 12px;
    border-radius:999px;border:1px solid var(--line);background:#fff
  }
  .btn{border:none;border-radius:12px;padding:10px 14px;font-weight:600;cursor:pointer; transition: 0.2s;}
  .btn.primary{background:#2563eb;color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--line)}
  .btn.ok{background:var(--ok);color:#fff}
  .btn.icon{padding:8px 10px}
  .btn.sm{padding:6px 10px; font-size:12px}
  .btn:active{transform:translateY(1px)}
  .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .section-title h2{margin:0;font-size:16px}
  
  .summary-row { display: flex; gap: 20px; align-items: flex-start; }
  .summary-row .card { flex: 1; min-width: 0; }
  .summary{
    background:#fcfcfd;border:1px dashed #c7cdd8;border-radius:14px;
    padding:16px;line-height:1.6;font-size:14px;white-space:pre-line;
    min-height: 280px;
  }
  
  .copy-btn{
    background:#2563eb;color:#fff;border:none;border-radius:8px;
    padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700
  }
  .copy-btn.success{background:#16a34a}

  .blk{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;flex:1 1 100%; margin-bottom:10px;}
  .blk .title{font-weight:800;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center}
  .subgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
  .sub-6{grid-column:span 6}
  .grp{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:12px}
  .grp h3{margin:0 0 8px;font-size:13px;color:#374151}
  .mini{font-size:13px;color:var(--muted);margin-top:10px}

  /* 안내 텍스트 영역 고정 */
  #ref_date_info {
    min-width: 90px;
    margin-bottom: 12px; 
    font-weight: bold; 
    color: var(--error); 
    font-size: 14px;
    text-align: right;
  }

  .filter-group { display: flex; gap: 10px; align-items: center; font-size: 12px; font-weight: 600; }

  .modal-overlay {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;
  }
  .modal {
    background: #fff; border-radius: 20px; width: 95%; max-width: 650px;
    min-height: 600px; display: flex; flex-direction: column;
    padding: 24px; box-shadow: var(--shadow);
  }
  .client-list { 
    margin-top: 15px; flex: 1; overflow-y: auto; 
    border: 1px solid var(--line); border-radius: 12px; max-height: 380px;
  }
  .client-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid var(--line);
  }
  .client-item:last-child { border-bottom: none; }
  .client-info { flex: 1; font-size: 14px; }
  .client-name { font-weight: 800; margin-bottom: 2px; }
  .client-meta { font-size: 12px; color: var(--muted); }

  @media (max-width:860px){
    .summary-row { flex-direction: column; }
    .sub-6{grid-column:span 12}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="card" style="border-top: 5px solid var(--accent);">
    <div class="header">
      <div><h1>트래픽/길찾기 통합 계산기</h1></div>
      <button class="btn ghost sm" id="openClientModal">📋 업체 List</button>
    </div>
    <div class="hr"></div>
    <div class="row" style="margin-top:14px">
      <div class="col"><label>트래픽 단가(원)</label><input id="trafficPrice" type="number" value="25" /></div>
      <div class="col"><label>길찾기 단가(원)</label><input id="routePrice" type="number" value="30" /></div>
      <div class="col"><label>부가세(%)</label><input id="vatRate" type="number" value="10" readonly /></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
      <div class="pill"><span style="font-weight:700">견적 블록</span><span id="blockCount">1</span>개</div>
      <div style="display:flex;gap:10px">
        <button class="btn ghost" id="resetAll">초기화</button>
        <button class="btn primary" id="addBlock">+ 항목 추가</button>
      </div>
    </div>
  </div>

  <div class="card"><div id="blocks" style="display: flex; flex-direction: column;"></div></div>

  <div class="summary-row">
    <div class="card">
      <div class="section-title">
        <div style="display:flex; flex-direction:column; gap:5px;">
          <h2>안내 문구 1</h2>
          <div class="filter-group">
            <label><input type="checkbox" id="showTraffic1" checked /> 트래픽</label>
            <label><input type="checkbox" id="showRoute1" checked /> 길찾기</label>
            <label style="color:var(--accent)"><input type="checkbox" id="combine1" /> 합산(+)</label>
          </div>
        </div>
        <button class="copy-btn" id="copy1">복사</button>
      </div>
      <div class="summary" id="summary1"></div>
    </div>

    <div class="card">
      <div class="section-title">
        <div style="display:flex; flex-direction:column; gap:5px;">
          <h2>안내 문구 2</h2>
          <div class="filter-group">
            <label><input type="checkbox" id="showTraffic2" checked /> 트래픽</label>
            <label><input type="checkbox" id="showRoute2" checked /> 길찾기</label>
            <label style="color:var(--accent)"><input type="checkbox" id="combine2" /> 합산(+)</label>
            <label style="margin-left:5px; border-left:1px solid #ddd; padding-left:10px;"><input type="checkbox" id="isNextDay" /> 익일 구동</label>
          </div>
        </div>
        <button class="copy-btn" id="copy2">복사</button>
      </div>
      <div class="summary" id="summary2"></div>
    </div>
  </div>

  <div class="card" style="border-top: 5px solid var(--error);">
    <div class="section-title">
      <h2 style="color:var(--error)">💰 환불 금액 계산기</h2>
      <div style="display:flex;gap:10px">
        <button class="btn ghost" id="resetRefund">초기화</button>
        <button class="btn primary" style="background:var(--error)" id="addRefundBlock">+ 환불 항목 추가</button>
      </div>
    </div>
    <div class="hr" style="margin-bottom:15px"></div>
    <div class="row" style="margin-bottom:20px;">
      <div class="col"><label>기준일(오늘)</label><input id="ref_today" type="date" /></div>
      <div class="col"><label>종료 예정일</label><input id="ref_endDate" type="date" /></div>
      <div class="col" style="flex:0 0 auto;"><div id="ref_date_info">(총 -일)</div></div>
    </div>
    <div id="refundBlocks" style="display: flex; flex-direction: column;"></div>
    <div class="card" style="background:#fff1f2; border:1px solid #fecdd3; padding:16px; margin-top:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="ref_info_label" style="font-size:14px; color:var(--error); font-weight:600;">데이터를 입력해주세요</span>
        <div id="ref_total_amt" style="font-size:24px; font-weight:800; color:var(--error)">-</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="section-title">
      <div style="display:flex; align-items:center; gap:10px; flex:1">
        <h3 style="white-space:nowrap; margin:0">단가 관리</h3>
        <input type="text" id="clientSearch" placeholder="🔍 업체명 또는 초성 검색" style="padding: 8px 12px; font-size: 13px;">
      </div>
      <button class="btn sm ghost" id="closeModal" style="margin-left:10px">닫기</button>
    </div>
    <div class="row" style="margin-top:10px; gap:8px; background:#f3f4f6; padding:12px; border-radius:12px; flex-shrink:0;">
      <input type="text" id="newClientName" placeholder="업체명" style="flex:1.5">
      <input type="number" id="newClientTraffic" placeholder="트래픽" style="flex:1">
      <input type="number" id="newClientRoute" placeholder="길찾기" style="flex:1">
      <button class="btn primary sm" id="addClientBtn">추가</button>
      <input type="file" id="csvFileInput" accept=".csv" style="display:none">
      <button class="btn ok sm" id="uploadCsvBtn">CSV 업로드</button>
    </div>
    <div class="client-list" id="clientListArea"></div>
  </div>
</div>

<script>
(() => {  
  const $  = (s, r=document)=>r.querySelector(s);
  const $$ = (s, r=document)=>Array.from(r.querySelectorAll(s));
  const num = v => Number((v??"").toString().replace(/[^0-9.-]/g,"")) || 0;
  const fmtInt = n => n.toLocaleString();
  const fmtWon = n => n.toLocaleString() + "원";

  let clients = JSON.parse(localStorage.getItem('higherad_clients') || '[]');
  let editIndex = -1;

  // 업체 관리 로직 (기존과 동일)
  $("#uploadCsvBtn").onclick = () => $("#csvFileInput").click();
  $("#csvFileInput").onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { processCsvData(ev.target.result); e.target.value = ""; };
    reader.readAsText(file, "EUC-KR");
  };

  function processCsvData(csvText) {
    const lines = csvText.split(/\r?\n/);
    let addedCount = 0;
    for (let i = 4; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line || line.replace(/,/g, '').trim() === "") continue;
      const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
      if (cols[0]) {
        const name = cols[0], p1 = num(cols[1]), p2 = num(cols[2]);
        const clientData = { name, tp: p1, rp: p2 };
        const existingIdx = clients.findIndex(c => c.name === name);
        if (existingIdx > -1) clients[existingIdx] = clientData;
        else { clients.push(clientData); addedCount++; }
      }
    }
    alert(`${addedCount}개 업체 등록 완료`);
    saveClients();
  }

  function getChosung(str) {
    const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    let result = "";
    for(let i=0; i<str.length; i++) {
      const code = str.charCodeAt(i) - 44032;
      if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
      else result += str.charAt(i);
    }
    return result;
  }

  function saveClients() {
    localStorage.setItem('higherad_clients', JSON.stringify(clients));
    renderClientList($("#clientSearch").value);
  }

  function renderClientList(filter = "") {
    const area = $("#clientListArea");
    area.innerHTML = "";
    const filtered = clients.filter(c => {
      const target = c.name.toLowerCase();
      const search = filter.toLowerCase();
      return target.includes(search) || getChosung(target).includes(search);
    });
    if(!filtered.length) {
      area.innerHTML = "<div style='padding:40px; text-align:center; color:#999; font-size:13px;'>결과가 없습니다.</div>";
      return;
    }
    filtered.forEach((c) => {
      const originalIdx = clients.findIndex(oc => oc === c);
      const item = document.createElement("div");
      item.className = "client-item";
      item.innerHTML = `
        <div class="client-info"><div class="client-name">${c.name}</div><div class="client-meta">${c.tp}원 / ${c.rp}원</div></div>
        <div style="display:flex; gap:6px;">
          <button class="btn ghost sm" onclick="editClient(${originalIdx})">수정</button>
          <button class="btn primary sm" onclick="applyClient(${originalIdx})">적용</button>
          <button class="btn ghost sm" style="color:var(--error); border-color:#fee2e2" onclick="deleteClient(${originalIdx})">삭제</button>
        </div>`;
      area.appendChild(item);
    });
  }

  window.applyClient = (idx) => {
    const c = clients[idx]; $("#trafficPrice").value = c.tp; $("#routePrice").value = c.rp;
    recalc(); recalcRefund(); $("#modalOverlay").style.display = "none";
  };
  window.editClient = (idx) => {
    const c = clients[idx]; editIndex = idx;
    $("#newClientName").value = c.name; $("#newClientTraffic").value = c.tp; $("#newClientRoute").value = c.rp;
    $("#addClientBtn").textContent = "저장"; $("#addClientBtn").style.background = "var(--ok)";
  };
  window.deleteClient = (idx) => { if(confirm("삭제할까요?")) { clients.splice(idx, 1); saveClients(); } };

  $("#addClientBtn").onclick = () => {
    const name = $("#newClientName").value.trim(), tp = num($("#newClientTraffic").value), rp = num($("#newClientRoute").value);
    if(!name) return alert("업체명을 입력해주세요.");
    if(editIndex > -1) { clients[editIndex] = {name, tp, rp}; editIndex = -1; $("#addClientBtn").textContent = "추가"; $("#addClientBtn").style.background = "var(--accent)"; }
    else { clients.push({name, tp, rp}); }
    $("#newClientName").value = ""; saveClients();
  };

  $("#clientSearch").oninput = (e) => renderClientList(e.target.value);
  $("#openClientModal").onclick = () => { $("#modalOverlay").style.display = "flex"; $("#clientSearch").value=""; renderClientList(); };
  $("#closeModal").onclick = () => { $("#modalOverlay").style.display = "none"; };

  // 날짜 계산 함수
  function getDiffDays() {
    const d1 = $("#ref_today").value;
    const d2 = $("#ref_endDate").value;
    if(!d1 || !d2) return 0;
    const start = new Date(d1); start.setHours(0,0,0,0);
    const end = new Date(d2); end.setHours(0,0,0,0);
    const diff = Math.round((end - start) / (1000 * 60 * 60 * 24));
    return diff < 0 ? 0 : diff;
  }

  function updateDateLabelOnly() {
    const diff = getDiffDays();
    $("#ref_date_info").textContent = `(총 ${diff}일)`;
  }

  function todayFormat(){
    const d = new Date();
    return `${d.getMonth()+1}/${d.getDate()}(${["일","월","화","수","목","금","토"][d.getDay()]})`;
  }

  function createBlock(isRefund = false) {
    const el = document.createElement("div");
    el.className = "blk";
    el.innerHTML = `
      <div class="title"><span>${isRefund ? "환불" : "견적"} 항목</span><button class="btn icon ${isRefund ? "refund-del" : "del"}">🗑️</button></div>
      <div class="subgrid">
        <div class="grp sub-6"><h3>트래픽</h3><div class="row">
          <div class="col"><label>일 목표</label><input type="number" class="t-per"></div>
          <div class="col"><label>기간(일)</label><input type="number" class="t-days"></div>
        </div></div>
        <div class="grp sub-6"><h3>길찾기</h3><div class="row">
          <div class="col"><label>일 목표</label><input type="number" class="r-per"></div>
          <div class="col"><label>기간(일)</label><input type="number" class="r-days"></div>
        </div></div>
      </div>
      <div class="mini" data-mini>결과: -</div>`;
    return el;
  }

  function recalc(){
    const tp = num($("#trafficPrice").value), rp = num($("#routePrice").value), vat = num($("#vatRate").value);
    let T=0, R=0;
    $$("#blocks .blk").forEach(b=>{
      const t = num($(".t-per",b).value) * num($(".t-days",b).value);
      const r = num($(".r-per",b).value) * num($(".r-days",b).value);
      T += t; R += r;
      $("[data-mini]",b).textContent = `트래픽 ${fmtInt(t)}건 · 길찾기 ${fmtInt(r)}건`;
    });
    const getCountSection = (sT, sR, comb) => {
      if (comb) return `- 트래픽+길찾기 : ${fmtInt((sT?T:0)+(sR?R:0))}건 (건당 ${fmtInt((sT?tp:0)+(sR?rp:0))}원)`;
      let p = [];
      if(sT) p.push(`- 트래픽 : ${fmtInt(T)}건 (건당 ${fmtInt(tp)}원)`);
      if(sR) p.push(`- 길찾기 : ${fmtInt(R)}건 (건당 ${fmtInt(rp)}원)`);
      return p.join('\n');
    };
    const sT1=$("#showTraffic1").checked, sR1=$("#showRoute1").checked, c1=$("#combine1").checked, st1=(sT1?T*tp:0)+(sR1?R*rp:0);
    $("#summary1").textContent=`${getCountSection(sT1,sR1,c1)}\n\n합계 금액 : ${fmtWon(st1)}\n\n입금액 : ${fmtWon(Math.ceil(st1*(100+vat)/100))} (VAT포함)\n\n주식회사 하이어애드\n318-085637-04-018\nIBK기업은행\n\n확인 후 입금 부탁드립니다.`;
    const sT2=$("#showTraffic2").checked, sR2=$("#showRoute2").checked, c2=$("#combine2").checked, st2=(sT2?T*tp:0)+(sR2?R*rp:0), dep2=Math.ceil(st2*(100+vat)/100);
    $("#summary2").textContent=`※ ${todayFormat()} 접수건, ${$("#isNextDay").checked?"(익일 구동)":"(당일 구동)"}\n\n${getCountSection(sT2,sR2,c2)}\n\n- 입금액(vat별도) : ${fmtWon(st2)}\n- 입금액(vat포함) : ${fmtWon(dep2)}\nㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ\n- 은행명: 기업은행\n- 계좌번호: 318-085637-04-018\n- 예금주: 주식회사 하이어애드\n- 입금액: ${fmtWon(dep2)}`;
    $("#blockCount").textContent = $$("#blocks .blk").length;
  }

  // 환불 금액 실시간 재계산 함수
  function recalcRefund() {
    const tp=num($("#trafficPrice").value), rp=num($("#routePrice").value);
    let T=0, R=0, A=0;
    $$("#refundBlocks .blk").forEach(b=>{
      const t=num($(".t-per",b).value)*num($(".t-days",b).value), r=num($(".r-per",b).value)*num($(".r-days",b).value);
      T+=t; R+=r; A+=(t*tp)+(r*rp);
      $("[data-mini]",b).textContent=`환불: 트래픽 ${fmtInt(t)}건 · 길찾기 ${fmtInt(r)}건`;
    });
    $("#ref_info_label").textContent=`총 트래픽 ${fmtInt(T)}건 + 길찾기 ${fmtInt(R)}건 환불`;
    $("#ref_total_amt").textContent=fmtWon(A);
  }

  function bindBlock(el, isRefund=false) {
    el.oninput=isRefund?recalcRefund:recalc;
    const btn=isRefund?$(".refund-del",el):$(".del",el);
    btn.onclick=()=>{
      el.remove();
      if($$( (isRefund?"#refundBlocks":"#blocks") +" .blk").length===0 && !isRefund) {
        const b=createBlock(false); $("#blocks").prepend(b); bindBlock(b,false);
      }
      isRefund?recalcRefund():recalc();
    };
  }

  $("#addBlock").onclick=()=>{ const b=createBlock(false); $("#blocks").prepend(b); bindBlock(b,false); recalc(); };
  $("#resetAll").onclick=()=>{ $("#blocks").innerHTML=""; const b=createBlock(false); $("#blocks").prepend(b); bindBlock(b,false); recalc(); };
  
  // 환불 항목 추가
  $("#addRefundBlock").onclick=()=>{ 
    const b=createBlock(true); 
    const diff = getDiffDays();
    $(".t-days", b).value = diff;
    $(".r-days", b).value = diff;
    $("#refundBlocks").prepend(b); 
    bindBlock(b,true); 
    recalcRefund();
  };

  $("#resetRefund").onclick=()=>{ $("#refundBlocks").innerHTML=""; recalcRefund(); };
  
  // 초기 세팅
  const todayStr = new Date().toISOString().split('T')[0];
  $("#ref_today").value = todayStr;
  $("#ref_endDate").value = todayStr;

  // 날짜 변경 시 '일수 문구'만 업데이트하고 리스트 수치는 안 건드림
  $("#ref_today").onchange = updateDateLabelOnly;
  $("#ref_endDate").onchange = updateDateLabelOnly;

  // [수정] 단가가 바뀌면 상단 견적서와 하단 환불액 모두 실시간 반영
  ["trafficPrice","routePrice"].forEach(id => {
    const el = $("#" + id);
    el.oninput = () => {
      recalc();
      recalcRefund();
    };
  });

  // 기타 옵션 변경 시 재계산
  ["showTraffic1","showRoute1","combine1","showTraffic2","showRoute2","combine2","isNextDay"].forEach(id=>{
    if($( "#"+id )) { $( "#"+id ).onchange=recalc; }
  });

  const copy=(t,b)=>{ $(b).onclick=()=>{ navigator.clipboard.writeText($(t).innerText.trim()).then(()=>{ 
    $(b).classList.add("success"); $(b).textContent="복사됨"; setTimeout(()=>{ $(b).classList.remove("success"); $(b).textContent="복사"; },1500); 
  }); }; };
  copy("#summary1","#copy1"); copy("#summary2","#copy2");

  const f1=createBlock(false); $("#blocks").prepend(f1); bindBlock(f1,false);
  updateDateLabelOnly();
  recalc(); recalcRefund();
})();
</script>
</body>
</html>
