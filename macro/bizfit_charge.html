<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizFit 영업점 캐시충전</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0d0d0d;
    color: #c9d1d9;
    min-height: 100vh;
  }

  /* ── 레이아웃 ── */
  .container {
    max-width: 1400px;
    margin: 20px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 240px 1fr 480px;
    gap: 16px;
    align-items: start;
  }

  /* ── 카드 ── */
  .card {
    background: #111;
    border-radius: 10px;
    border: 1px solid #1e1e1e;
    overflow: hidden;
  }
  .card-header {
    background: #161616;
    padding: 12px 18px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: #8b949e;
    display: flex;
    align-items: center;
    gap: 7px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-body { padding: 18px; }

  /* ── 입력 폼 ── */
  .form-group { margin-bottom: 11px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  input[type="text"], input[type="password"], input[type="number"] {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid #2a2a2a;
    border-radius: 7px;
    font-size: 13px;
    color: #c9d1d9;
    background: #0d0d0d;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #00e676; }
  input::placeholder { color: #333; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: #00e676; color: #000; width: 100%; }
  .btn-primary:hover { background: #00c853; }
  .btn-danger  { background: transparent; color: #fc8181; border: 1px solid #3a1a1a; padding: 4px 10px; font-size: 12px; border-radius: 6px; white-space: nowrap; }
  .btn-danger:hover { background: #2a0a0a; }
  .btn-success { background: #00e676; color: #000; font-size: 14px; font-weight: 800; padding: 12px 24px; border-radius: 8px; width: 100%; letter-spacing: 0.3px; }
  .btn-success:hover { background: #00c853; }
  .btn-success:disabled { background: #1e1e1e; color: #444; cursor: not-allowed; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── 계정+금액 테이블 ── */
  .account-table-wrap { overflow-x: auto; }

  .account-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .account-table thead th {
    background: #0d0d0d;
    padding: 8px 10px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1e1e1e;
    white-space: nowrap;
  }
  .account-table thead th:first-child { padding-left: 12px; }

  .account-table tbody tr {
    border-bottom: 1px solid #161616;
    transition: background 0.1s;
  }
  .account-table tbody tr:last-child { border-bottom: none; }
  .account-table tbody tr:hover { background: #161616; }
  .account-table tbody tr.checked { background: #0a1a0a; }
  .account-table tbody tr.checked:hover { background: #0f220f; }

  .account-table td {
    padding: 7px 10px;
    vertical-align: middle;
  }
  .account-table td:first-child { padding-left: 12px; }

  .td-info { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; overflow: hidden; }
  .td-alias { font-weight: 700; color: #c9d1d9; font-size: 12.5px; flex-shrink: 0; }
  .td-sep   { color: #2a2a2a; font-size: 11px; flex-shrink: 0; }
  .td-id    { color: #555; font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; min-width: 0; }

  .amount-cell { display: flex; align-items: center; gap: 6px; }
  .amount-cell input[type="number"] { width: 100px; padding: 5px 8px; font-size: 12px; border-radius: 6px; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .s-ready   { background: #1a1a1a; color: #555; }
  .s-running { background: #2a2000; color: #f6e05e; }
  .s-success { background: #001a0a; color: #00e676; }
  .s-fail    { background: #2a0a0a; color: #fc8181; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #333;
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  .right-panel { display: flex; flex-direction: column; gap: 16px; }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .summary-item {
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
  }
  .summary-label { font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.4px; }
  .summary-value { font-size: 22px; font-weight: 800; color: #8b949e; margin-top: 4px; }
  .summary-value.blue  { color: #00e676; }
  .summary-value.green { color: #00e676; }

  .log-area {
    background: #080808;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 12px 14px;
    height: 340px;
    overflow-y: auto;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    line-height: 1.7;
    scrollbar-width: thin;
    scrollbar-color: #1e1e1e transparent;
  }
  .log-area::-webkit-scrollbar { width: 4px; }
  .log-area::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 4px; }
  .log-line    { display: flex; gap: 10px; }
  .log-time    { color: #2a2a2a; flex-shrink: 0; }
  .log-msg     { color: #555; }
  .log-success .log-msg { color: #00e676; }
  .log-fail    .log-msg { color: #fc8181; }
  .log-info    .log-msg { color: #58a6ff; }
  .log-warn    .log-msg { color: #f6e05e; }

  .progress-wrap { background: #1e1e1e; border-radius: 100px; height: 4px; overflow: hidden; display: none; margin-top: 2px; }
  .progress-bar  { height: 100%; background: linear-gradient(90deg, #00e676, #00bcd4); border-radius: 100px; width: 0%; transition: width 0.4s ease; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .badge-blue { background: #0a1a0a; color: #00e676; border: 1px solid #1a3a1a; }

  .select-all-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: #0d0d0d;
    border-bottom: 1px solid #1e1e1e;
    font-size: 12px;
    font-weight: 600;
    color: #444;
  }
  .select-all-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #00e676; cursor: pointer; }

  .divider { border: none; border-top: 1px solid #1e1e1e; margin: 16px 0; }

  .search-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 7px;
    padding: 5px 10px;
    transition: border-color 0.2s;
  }
  .search-wrap:focus-within { border-color: #00e676; }
  .search-icon { font-size: 12px; color: #444; }
  .search-wrap input {
    border: none;
    background: transparent;
    outline: none;
    font-size: 12px;
    color: #c9d1d9;
    width: 160px;
    padding: 0;
  }
  .search-wrap input::placeholder { color: #333; }

  .excel-upload-area {
    border: 1px dashed #2a2a2a;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #0d0d0d;
    margin-top: 10px;
  }
  .excel-upload-area:hover, .excel-upload-area.drag-over {
    border-color: #00e676;
    background: #001a0a;
  }
  .excel-upload-area .upload-icon { font-size: 24px; margin-bottom: 5px; }
  .excel-upload-area .upload-text { font-size: 12px; font-weight: 600; color: #555; }
  .excel-upload-area .upload-hint { font-size: 11px; color: #333; margin-top: 3px; }
  #excel-file-input { display: none; }

  @media (max-width: 1000px) {
    .container { grid-template-columns: 240px 1fr; }
    .charge-panel { grid-column: 1 / -1; }
  }
  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
    .summary-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ── 좌측: 계정 추가 폼 ── -->
  <div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">➕ 계정 추가</span>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>별칭 (영업점명)</label>
          <input type="text" id="inp-alias" placeholder="예: 하이어애드" />
        </div>
        <div class="form-group">
          <label>아이디 (ID)</label>
          <input type="text" id="inp-id" placeholder="Higherad 로그인 아이디" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>패스워드 (PW)</label>
          <input type="password" id="inp-pw" placeholder="패스워드" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" onclick="addAccount()">➕ 계정 추가</button>

        <hr style="border:none;border-top:1px solid #e8eaf0;margin:16px 0;">

        <div style="font-size:12px;font-weight:600;color:#4a5568;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">엑셀로 일괄 추가</div>
        <div class="excel-upload-area" id="excel-drop-zone" onclick="document.getElementById('excel-file-input').click()">
          <div class="upload-icon">📊</div>
          <div class="upload-text">엑셀 파일을 클릭하거나 드래그</div>
          <div class="upload-hint">영업점 / ID / PW 열 순서 (.xlsx)</div>
        </div>
        <input type="file" id="excel-file-input" accept=".xlsx,.xls" onchange="handleExcelFile(this.files[0])">
      </div>
    </div>
  </div>

  <!-- ── 우측 ── -->
  <div class="right-panel">

    <!-- 계정+금액 목록 -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">👥 계정 목록 <span class="badge badge-blue" id="account-count">0</span></span>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="inp-search" placeholder="영업점 / 아이디 검색" oninput="filterList(this.value)" />
        </div>
      </div>

      <!-- 전체선택 -->
      <div class="select-all-row">
        <input type="checkbox" id="chk-all" onchange="toggleAll(this)">
        <span>전체 선택</span>
        <span style="color:#718096;font-weight:400;" id="selected-count-small">0개 선택됨</span>
        <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="removeChecked()">선택 삭제</button>
      </div>

      <!-- 테이블 -->
      <div class="account-table-wrap">
        <table class="account-table" id="account-table">
          <thead>
            <tr>
              <th style="width:36px;"></th>
              <th>영업점 / 아이디</th>
              <th>충전 금액</th>
              <th style="width:64px;">상태</th>
            </tr>
          </thead>
          <tbody id="account-tbody">
            <tr><td colspan="4">
              <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div>등록된 계정이 없습니다.<br>좌측에서 계정을 추가해주세요.</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /right-panel -->

  <!-- ── 3번째 컬럼: 충전 실행 ── -->
  <div class="charge-panel">

    <!-- 충전 실행 카드 -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">⚡ 캐시 충전</span>
      </div>
      <div class="card-body">

        <!-- 요약 -->
        <div class="summary-row" style="grid-template-columns: repeat(2, 1fr);">
          <div class="summary-item">
            <div class="summary-label">선택 계정</div>
            <div class="summary-value blue" id="sum-count">0</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">미입력 계정</div>
            <div class="summary-value" id="sum-noamt" style="color:#e53e3e;">0</div>
          </div>
        </div>

        <hr class="divider">

        <button class="btn btn-success" id="btn-charge" onclick="startCharge()" disabled>
          ⚡ 캐시충전 시작
        </button>

        <div style="height:12px;"></div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div style="text-align:center;font-size:13px;color:#718096;margin-top:6px;" id="progress-text"></div>

        <div class="log-area" id="log-area" style="margin-top:16px;">
          <div class="log-line log-info">
            <span class="log-time">--:--:--</span>
            <span class="log-msg">시스템 준비 완료. 계정을 추가하고 충전을 시작하세요.</span>
          </div>
        </div>

      </div>
    </div>

  </div><!-- /charge-panel -->

</div><!-- /container -->


<script>
// ── 데이터 ──
let accounts = [];

function save() {
  if (window.fbSave) window.fbSave(accounts);
}

// ── 계정 추가 ──
function addAccount() {
  const alias = document.getElementById('inp-alias').value.trim();
  const id    = document.getElementById('inp-id').value.trim();
  const pw    = document.getElementById('inp-pw').value;
  if (!id || !pw) { alert('아이디와 패스워드를 입력해주세요.'); return; }

  accounts.push({ id, pw, alias: alias || id, amount: '', status: 'ready', result: '' });
  save();

  document.getElementById('inp-alias').value = '';
  document.getElementById('inp-id').value    = '';
  document.getElementById('inp-pw').value    = '';

  renderList();
  addLog(`계정 추가됨: ${alias || id} (${id})`, 'info');
}

// ── 전체삭제 ──
function clearAll() {
  if (!confirm('모든 계정을 삭제하시겠습니까?')) return;
  accounts = [];
  save();
  renderList();
}

// ── 계정 삭제 ──
function removeAccount(i) {
  if (!confirm(`'${accounts[i].alias}' 계정을 삭제하시겠습니까?`)) return;
  accounts.splice(i, 1);
  save();
  renderList();
}

// ── 체크박스 ──
function toggleItem(i, el) {
  accounts[i].checked = el.checked;
  save();
  const row = document.getElementById(`row-${i}`);
  if (row) row.classList.toggle('checked', el.checked);
  syncAll();
}

function toggleAll(el) {
  accounts.forEach(a => a.checked = el.checked);
  save();
  renderList();
}

function syncAll() {
  const total   = accounts.length;
  const checked = accounts.filter(a => a.checked).length;
  const allChk  = document.getElementById('chk-all');
  allChk.checked       = total > 0 && checked === total;
  allChk.indeterminate = checked > 0 && checked < total;
  document.getElementById('selected-count-small').textContent = `${checked}개 선택됨`;
  updateSummary();
}

// ── 개별 금액 변경 ──
function onAmountChange(i, val) {
  accounts[i].amount = val;
  save();
  updateSummary();
  updateChargeBtn();
}

// ── 요약 업데이트 ──
function updateSummary() {
  const selected = accounts.filter(a => a.checked);
  const noAmt    = selected.filter(a => !a.amount || parseInt(a.amount) <= 0).length;

  document.getElementById('sum-count').textContent = selected.length;
  document.getElementById('sum-noamt').textContent = noAmt;
  updateChargeBtn();
}

function updateChargeBtn() {
  const selected = accounts.filter(a => a.checked);
  const noAmt    = selected.filter(a => !a.amount || parseInt(a.amount) <= 0).length;
  document.getElementById('btn-charge').disabled = selected.length === 0 || noAmt > 0;
}

// ── 초성 검색 ──
const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(str) {
  return Array.from(str).map(ch => {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return ch;
    return CHOSUNG[Math.floor(code / 588)];
  }).join('');
}
function matchChosung(text, query) {
  // 쿼리가 모두 초성인 경우에만 초성 매칭
  const isAllChosung = [...query].every(c => CHOSUNG.includes(c));
  if (!isAllChosung) return false;
  return getChosung(text).includes(query);
}

// ── 선택 삭제 ──
function removeChecked() {
  const checked = accounts.filter(a => a.checked);
  if (checked.length === 0) { alert('삭제할 계정을 선택해주세요.'); return; }
  if (!confirm(`선택한 ${checked.length}개 계정을 삭제하시겠습니까?`)) return;
  accounts = accounts.filter(a => !a.checked);
  save();
  renderList();
  addLog(`🗑️ ${checked.length}개 계정 삭제됨`, 'warn');
}

// ── 검색 필터 ──
let searchQuery = '';
function filterList(val) {
  searchQuery = val.trim().toLowerCase();
  renderList();
}

// ── 렌더링 ──
function renderList() {
  const tbody = document.getElementById('account-tbody');
  document.getElementById('account-count').textContent = accounts.length;

  if (accounts.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>등록된 계정이 없습니다.<br>좌측에서 계정을 추가해주세요.</div>
      </div>
    </td></tr>`;
    syncAll();
    return;
  }

  const filtered = searchQuery
    ? accounts.filter(a =>
        matchChosung(a.alias, searchQuery) ||
        a.alias.toLowerCase().includes(searchQuery) ||
        a.id.toLowerCase().includes(searchQuery))
    : accounts;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div>검색 결과가 없습니다.</div>
      </div>
    </td></tr>`;
    syncAll();
    return;
  }

  tbody.innerHTML = filtered.map(acc => {
    const i  = accounts.indexOf(acc);
    const sc = { ready:'s-ready', running:'s-running', success:'s-success', fail:'s-fail' }[acc.status] || 's-ready';
    const st = { ready:'대기', running:'⏳ 진행중', success:'✅ 완료', fail:'❌ 실패' }[acc.status] || '대기';
    const amtV = acc.amount ? parseInt(acc.amount) : '';

    // 검색어 하이라이트
    function highlight(text) {
      return esc(text);
    }

    return `
    <tr id="row-${i}" class="${acc.checked ? 'checked' : ''}">
      <td><input type="checkbox" ${acc.checked ? 'checked' : ''} onchange="toggleItem(${i}, this)"
            style="width:17px;height:17px;accent-color:#2d6a9f;cursor:pointer;" /></td>
      <td>
        <div class="td-info">
          <span class="td-alias">${highlight(acc.alias)}</span>
          <span class="td-sep">/</span>
          <span class="td-id">${highlight(acc.id)}</span>
        </div>
        ${acc.result ? `<div style="font-size:10.5px;color:#718096;margin-top:2px;">${esc(acc.result)}</div>` : ''}
      </td>
      <td>
        <div class="amount-cell">
          <input type="number" id="amt-${i}"
            value="${amtV || ''}"
            placeholder="금액 입력"
            min="1000" step="1000"
            style="width:100px;padding:5px 8px;font-size:12px;border-radius:7px;-moz-appearance:textfield;"
            oninput="onAmountChange(${i}, this.value)"
          />
        </div>
      </td>
      <td><span class="status-badge ${sc}">${st}</span></td>
    </tr>`;
  }).join('');

  syncAll();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 로그 ──
function addLog(msg, type = '') {
  const area = document.getElementById('log-area');
  const now  = new Date().toLocaleTimeString('ko-KR', { hour12: false });
  const div  = document.createElement('div');
  div.className = `log-line ${type ? 'log-'+type : ''}`;
  div.innerHTML = `<span class="log-time">${now}</span><span class="log-msg">${esc(msg)}</span>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ── 충전 시작 (데모 시뮬레이션) ──
async function startCharge() {
  const selected = accounts.filter(a => a.checked);
  const noAmt    = selected.filter(a => !a.amount || parseInt(a.amount) <= 0);

  if (selected.length === 0) { alert('계정을 선택해주세요.'); return; }
  if (noAmt.length > 0) {
    alert(`금액이 입력되지 않은 계정이 ${noAmt.length}개 있습니다.\n모든 선택 계정에 금액을 입력해주세요.`);
    return;
  }

  const summary = selected.map(a => `  · ${a.alias}: ${parseInt(a.amount).toLocaleString()}캐시`).join('\n');
  if (!confirm(`아래 계정을 충전하시겠습니까?\n\n${summary}\n\n총 ${selected.length}건`)) return;

  document.getElementById('btn-charge').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';

  const total = selected.length;
  let done = 0;

  addLog(`▶ 충전 시작 — ${total}개 계정`, 'info');

  for (const acc of selected) {
    const amount = parseInt(acc.amount);
    acc.status = 'running';
    acc.result = '';
    renderList();

    addLog(`[${done+1}/${total}] ${acc.alias} (${acc.id}) — ${amount.toLocaleString()}캐시 처리 중...`);

    let ok = false, resultMsg = '';
    try {
      const res  = await fetch('https://macro-1-bizfit-938928195180.asia-northeast3.run.app/charge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: acc.id, pw: acc.pw, amount })
      });
      if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`);
      const data = await res.json();
      ok        = data.success;
      resultMsg = data.message || (ok ? '충전 완료' : '실패');
    } catch(e) {
      ok        = false;
      resultMsg = `서버 연결 실패: ${e.message}`;
    }

    if (ok) {
      acc.status = 'success';
      acc.result = `${amount.toLocaleString()}캐시 완료`;
      addLog(`  ✅ ${acc.alias} — ${resultMsg}`, 'success');
    } else {
      acc.status = 'fail';
      acc.result = resultMsg;
      addLog(`  ❌ ${acc.alias} — ${resultMsg}`, 'fail');
    }

    done++;
    const pct = Math.round((done / total) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${done} / ${total} 완료 (${pct}%)`;

    save();
    renderList();
    if (done < total) await delay(800);
  }

  const successCnt = selected.filter(a => a.status === 'success').length;
  const failCnt    = total - successCnt;
  addLog(`━━ 완료 — 성공: ${successCnt}  실패: ${failCnt}  (총 ${total}건)`,
         successCnt === total ? 'success' : 'warn');

  document.getElementById('btn-charge').disabled = false;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── 엑셀 업로드 ──
(function setupExcelDrop() {
  const zone = document.getElementById('excel-drop-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleExcelFile(file);
  });
})();

function handleExcelFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data  = new Uint8Array(e.target.result);
      const wb    = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows  = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

      // 헤더 행 자동 감지 (첫 행이 숫자가 아닌 텍스트면 헤더로 간주해 스킵)
      const startRow = (rows.length > 0 && isNaN(rows[0][1])) ? 1 : 0;
      let added = 0, skipped = 0;

      for (let r = startRow; r < rows.length; r++) {
        const [aliasRaw, idRaw, pwRaw] = rows[r];
        const alias = String(aliasRaw || '').trim();
        const id    = String(idRaw   || '').trim();
        const pw    = String(pwRaw   || '').trim();
        if (!id || !pw) { skipped++; continue; }

        // 중복 체크 (같은 ID 이미 있으면 스킵)
        if (accounts.some(a => a.id === id)) { skipped++; continue; }

        accounts.push({ id, pw, alias: alias || id, amount: '', status: 'ready', result: '' });
        added++;
      }

      save();
      renderList();
      // 파일 input 초기화 (같은 파일 재업로드 허용)
      document.getElementById('excel-file-input').value = '';

      if (added > 0) addLog(`📊 엑셀 가져오기 완료: ${added}개 추가${skipped > 0 ? `, ${skipped}개 건너뜀(중복/빈값)` : ''}`, 'info');
      else           addLog(`⚠️ 추가된 계정 없음 — 이미 등록된 계정이거나 ID/PW가 비어있습니다.`, 'warn');
    } catch(err) {
      addLog(`❌ 엑셀 읽기 실패: ${err.message}`, 'fail');
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── 초기화 ──
renderList();

// 서버 연결 상태 확인
(async function checkServer() {
  try {
    const res = await fetch('https://macro-1-bizfit-938928195180.asia-northeast3.run.app/ping', { signal: AbortSignal.timeout(3000) });
    if (res.ok) {
      addLog('✅ 서버 연결됨 — 충전 준비 완료', 'success');
      return;
    }
  } catch(_) {}
  addLog('⚠️  서버 연결 실패 — 잠시 후 다시 시도해주세요.', 'warn');
})();
</script>

<script type="module">
  import { db } from "../ha-tools.js";
  import { ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

  const userId = localStorage.getItem('ha_user');
  if (!userId) { location.replace("../login.html"); }

  const accountsRef = ref(db, `users/${userId}/bizfit_accounts`);

  // Firebase에서 계정 목록 로드 (최초 1회)
  onValue(accountsRef, (snap) => {
    const data = snap.val();
    if (Array.isArray(data) && data.length > 0) {
      accounts = data.map(a => ({
        ...a,
        amount: a.amount ?? '',
        status: 'ready',
        result: '',
        checked: a.checked ?? false,
      }));
      renderList();
      addLog(`📂 계정 목록 불러옴 (${accounts.length}개)`, 'info');
    }
  }, { onlyOnce: true });

  // Firebase 저장 함수 노출
  window.fbSave = function(data) {
    set(accountsRef, data).catch(e => console.error('Firebase 저장 실패:', e));
  };
</script>
