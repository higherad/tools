<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://higheradtool.kro.kr/">
  <meta property="og:title" content="하이어애드 통합 도구 모음">
  <meta property="og:description" content="업무 데이터 관리를 위한 스마트 보조 도구">
  <meta property="og:image" content="https://raw.githubusercontent.com/goo-sle/tools/main/%ED%95%98%EC%9D%B4%EC%96%B4%EC%95%A0%EB%93%9C_%EB%A1%9C%EA%B3%A0_1.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://raw.githubusercontent.com/goo-sle/tools/main/%ED%95%98%EC%9D%B4%EC%96%B4%EC%95%A0%EB%93%9C_%EB%A1%9C%EA%B3%A0_1.png">

  <title>HigherAd 도구 모음</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <style>
    :root {
      --primary-color: #2e7d32;
      --green-mid: #43a047;
      --green-light: #e8f5e9;
      --green-border: #c8e6c9;
      --accent: #00c853;
      --hover-color: #e8f5e9;
      --active-bg: #c8e6c9;
      --sidebar-bg: #ffffff;
      --border-color: #dde8dd;
      --text-main: #1a2e1a;
      --text-sub: #5a7a5a;
      --bg: #f4f6f4;
      --shadow: 0 2px 12px rgba(46,125,50,0.07);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Pretendard', Arial, sans-serif;
      margin: 0; padding: 0;
      display: flex; height: 100vh; overflow: hidden;
      color: var(--text-main); background: var(--bg);
    }

    #authOverlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(20,40,20,0.82);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .auth-card {
      background: white; padding: 35px; border-radius: 16px; width: 340px;
      text-align: center; box-shadow: 0 10px 30px rgba(46,125,50,0.18);
      border-top: 4px solid var(--primary-color);
    }
    .auth-card h3 { margin-top: 0; color: var(--primary-color); font-size: 17px; }
    .auth-card input {
      width: 100%; padding: 11px 14px; margin: 7px 0;
      border: 1px solid var(--green-border); border-radius: 8px; outline: none;
      font-size: 14px; transition: border-color 0.2s;
    }
    .auth-card input:focus { border-color: var(--primary-color); }
    .auth-btn {
      width: 100%; padding: 12px; background: var(--primary-color); color: white;
      border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
      font-weight: bold; font-size: 14px; transition: background 0.2s;
    }
    .auth-btn:hover { background: var(--green-mid); }
    .auth-footer { font-size: 13px; color: #888; margin-top: 18px; cursor: pointer; text-decoration: underline; }

    #sidebar {
      width: 220px; min-width: 220px;
      background: #fff;
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
    }
    #sidebar.collapsed { width: 60px; min-width: 60px; }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; gap: 8px;
      height: 44px; overflow: hidden;
      background: var(--green-light);
    }
    #sidebar.collapsed .sidebar-header { justify-content: center; padding: 12px 0; }

    .home-btn {
      display: flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px;
      border-radius: 50%; border: 1px solid var(--green-border);
      background: var(--green-light); color: var(--primary-color); cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .home-btn:hover { background: var(--primary-color); color: #fff; }

    #toolSearch {
      flex-grow: 1; width: 0; min-width: 0;
      padding: 7px 12px; border: 1px solid var(--green-border);
      border-radius: 20px; outline: none; font-size: 12.5px;
      transition: border-color 0.2s; background: #fafcfa;
    }
    #toolSearch:focus { border-color: var(--primary-color); background: #fff; }
    #sidebar.collapsed #toolSearch, #sidebar.collapsed .home-btn { display: none; }

    .pc-toggle-btn {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub); padding: 4px; border-radius: 4px; flex-shrink: 0;
    }
    .pc-toggle-btn:hover { background: var(--green-light); color: var(--primary-color); }

    .scroll-area { flex-grow: 1; overflow-y: auto; padding: 12px 0; }
    #sidebar.collapsed .scroll-area { padding: 12px 0; }

    .section-title {
      padding: 0 16px;
      margin: 16px 0 4px;
      font-size: 10px; font-weight: 700;
      color: var(--text-sub); letter-spacing: 1px;
      text-transform: uppercase; user-select: none; white-space: nowrap;
    }
    #sidebar.collapsed .section-title { display: none; }

    .section { display: flex; flex-direction: column; min-height: 30px; }
    .section:empty::before {
      content: "항목을 끌어다 놓으세요";
      display: block; font-size: 11px; color: #bbb; text-align: center;
      padding: 12px 16px;
    }
    #sidebar.collapsed .section:empty::before { content: ""; }

    .tool-button {
      display: flex; align-items: center;
      padding: 10px 20px; font-size: 13.5px; font-weight: 500;
      cursor: pointer; background: transparent;
      border: none; border-left: 3px solid transparent;
      border-radius: 0;
      transition: all 0.15s; white-space: nowrap; overflow: hidden;
      color: var(--text-sub);
    }
    .tool-button:hover {
      background: var(--green-light);
      color: var(--primary-color);
      border-left-color: transparent;
    }
    .tool-button.active {
      background: var(--green-light);
      color: var(--primary-color);
      border-left-color: var(--primary-color);
      font-weight: 700;
    }

    .tool-icon {
      display: flex; align-items: center; justify-content: center;
      min-width: 20px; font-size: 16px; flex-shrink: 0;
    }
    .tool-text { margin-left: 10px; }

    #sidebar.collapsed .tool-button {
      justify-content: center; padding: 10px 0;
      border-left: none; width: 100%;
    }
    #sidebar.collapsed .tool-text { display: none; }
    #sidebar.collapsed .tool-icon { margin: 0; font-size: 20px; }

    #tabBar {
      display: none; background: var(--green-light);
      border-bottom: 1px solid var(--green-border);
      overflow-x: auto; white-space: nowrap;
      padding: 6px 8px 0 8px; gap: 4px;
      scrollbar-width: none; flex-shrink: 0;
    }
    #tabBar::-webkit-scrollbar { display: none; }

    .tab {
      display: inline-flex; align-items: center; padding: 7px 14px;
      background: #dcedc8; border: 1px solid var(--green-border);
      border-bottom: none; border-radius: 8px 8px 0 0;
      font-size: 13px; cursor: pointer; max-width: 180px;
      transition: all 0.15s; color: var(--text-sub); user-select: none;
    }
    .tab.active {
      background: #fff; font-weight: 600;
      border-bottom: 2px solid var(--primary-color);
      color: var(--primary-color);
    }
    .tab .close-tab { margin-left: 7px; font-size: 15px; color: #9aab9a; border-radius: 50%; }
    .tab .close-tab:hover { color: var(--primary-color); }

    #content {
      flex-grow: 1; position: relative; background: var(--bg);
      overflow: hidden; display: flex; flex-direction: column;
    }
    #iframeContainer { flex-grow: 1; position: relative; width: 100%; height: 100%; }
    #iframeContainer iframe { position: absolute; top:0; left:0; width:100%; height:100%; border: none; display: none; }
    #iframeContainer iframe.active { display: block; }

    #welcome {
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; height: 100%; text-align: center;
      padding: 40px 20px; overflow-y: auto;
    }
    #welcome h2 { color: var(--primary-color); margin-bottom: 4px; font-size: 22px; }

    #naverClock {
      font-size: 40px; font-weight: 700; margin: 12px 0;
      background: var(--green-light); color: var(--primary-color);
      padding: 10px 28px; border-radius: 14px;
      border: 1px solid var(--green-border);
      letter-spacing: 2px;
    }

    .quick-links {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 13px; margin-top: 22px; width: 100%; max-width: 680px;
    }
    .link-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px 10px; background: #fff;
      border: 1px solid var(--border-color); border-radius: 12px;
      text-decoration: none; color: var(--text-sub);
      transition: all 0.2s ease; box-shadow: var(--shadow);
      aspect-ratio: 2 / 1.1; gap: 7px; font-size: 13px; font-weight: 600;
    }
    .link-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(46,125,50,0.12);
      background: var(--green-light);
      border-color: var(--green-border);
    }
    .link-card .material-symbols-outlined { font-size: 22px; }

    .link-card.notion  { border-top: 4px solid #37352f; }
    .link-card.notion .material-symbols-outlined { color: #37352f; }
    .link-card.sheet   { border-top: 4px solid #1d8045; }
    .link-card.sheet .material-symbols-outlined { color: #1d8045; }
    .link-card.admin   { border-top: 4px solid #1a73e8; }
    .link-card.admin .material-symbols-outlined { color: #1a73e8; }
    .link-card.partner { border-top: 4px solid #f29900; }
    .link-card.partner .material-symbols-outlined { color: #f29900; }

    .sidebar-footer {
      padding: 10px 16px; border-top: 1px solid var(--border-color);
      display: flex; flex-wrap: wrap; gap: 5px;
      background: var(--green-light);
    }
    #sidebar.collapsed .sidebar-footer { display: none; }
    .footer-btn {
      flex: 1; font-size: 11px; padding: 7px 5px; cursor: pointer;
      background: var(--green-light); border: 1px solid var(--green-border);
      border-radius: 6px; color: var(--text-sub); transition: all 0.15s;
    }
    .footer-btn:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

    #toggleMenuBtn {
      display: none; width: 100%; padding: 6px;
      background: var(--green-light); border: none;
      border-top: 1px solid var(--green-border);
      cursor: pointer; align-items: center; justify-content: center;
      color: var(--primary-color);
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: 100%; height: 40%; border-right: none; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
      #sidebar.collapsed { height: 62px !important; width: 100% !important; }
      #sidebar.collapsed .scroll-area, #sidebar.collapsed .sidebar-footer { display: none; }
      #toggleMenuBtn { display: flex; }
      .pc-toggle-btn { display: none; }
      #content { height: 100%; flex-grow: 1; padding-top: 0; }
      #tabBar { display: none !important; }
      .quick-links { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .link-card { aspect-ratio: 2 / 1.2; font-size: 12px; padding: 12px 8px; }
      .link-card .material-symbols-outlined { font-size: 18px; }
    }
  </style>
</head>

  <script type="module">
    // ha-tools.js (또는 firebase-config.js)에서 db 객체를 가져옵니다.
    import { db } from "./ha-tools.js"; 
    import { ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    // 1. 로그인 체크 (LocalStorage 방식)
    const currentUserId = localStorage.getItem('ha_user');

    if (!currentUserId) {
      // 로그인 정보 없으면 로그인 페이지로 이동
      location.replace("login.html");
    } else {
      // 로그인 정보가 있으면 화면 표시 및 데이터 로드 시작
      document.body.style.display = 'flex';
      document.getElementById('displayUser').textContent = currentUserId + "님";
      
      // 유저 데이터 로드 및 실시간 동기화
      initUserData();
    }

    // 2. 유저 데이터 로드 함수
    async function initUserData() {
      await loadDefaultTools(); // manifest 로드

      const userRef = ref(db, 'users/' + currentUserId);
      
      // 실시간으로 DB 값 감시 (ha-store.js와 동일한 방식)
      onValue(userRef, (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          // 데이터 구조가 toolDashboardState(문자열)인 경우와 fav/active(객체)인 경우 모두 대응
          let state;
          if (data.toolDashboardState) {
            state = JSON.parse(data.toolDashboardState);
          } else {
            state = {
              fav: data.fav || [],
              active: data.active || [],
              inactive: data.inactive || []
            };
          }
          localStorage.setItem("toolDashboardState", JSON.stringify(state));
          renderAppFromServer(state);
        } else {
          // 데이터가 없으면 초기화
          initApp();
        }
      });

      updateClock();
      setInterval(updateClock, 1000);
      setupDragAndDrop();
      setupTabDragAndDrop();
    }

    // 3. 서버에 상태 저장 함수 (수정됨)
    window.saveStateToServer = function(state) {
      if (!currentUserId) return;
      const userRef = ref(db, 'users/' + currentUserId);
      
      // 개별 필드로 업데이트 (ha-store 방식)
      update(userRef, {
        fav: state.fav,
        active: state.active,
        inactive: state.inactive,
        toolDashboardState: JSON.stringify(state) // 호환성을 위해 유지
      });
    };

    // 4. 로그아웃 함수 (수정됨)
    window.handleLogout = () => {
      if(confirm("로그아웃 하시겠습니까?")) {
        localStorage.removeItem('ha_user');
        location.replace("login.html");
      }
    };

    // 기타 기존 함수 유지용 가상 auth 객체 (에러 방지)
    window.auth = { currentUser: { uid: currentUserId } };
  </script>

  <script>
    const sections = ['favTools', 'activeTools', 'inactiveTools'].map(id => document.getElementById(id));
    const welcome = document.getElementById('welcome');
    const tabBar = document.getElementById('tabBar');
    const iframeContainer = document.getElementById('iframeContainer');
    let dragged = null;
    let draggedTab = null;
    let tabs = [];

    const normalizeToolFile = (file) => (file || "").replace(/^★\//, "tools/");

    let defaultTools = [];

    async function loadDefaultTools() {
      try {
        const res = await fetch(`tools-manifest.json?v=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error('manifest load failed');
        const list = await res.json();
        if (!Array.isArray(list) || list.length === 0) throw new Error('manifest empty');
        defaultTools = list.map(t => ({
          file: normalizeToolFile(t.file),
          label: t.label || t.file,
        }));
      } catch (e) {
        defaultTools = [{ file: "tools/메모장.html", label: "⏰ 메모장" }];
      }
    }

    window.refreshToolsManifest = async function() {
      await loadDefaultTools();
      const saved = localStorage.getItem("toolDashboardState");
      const state = saved ? JSON.parse(saved) : { fav: [], active: defaultTools.map(t => t.file), inactive: [] };
      renderAppFromServer(state);
      alert("도구 목록을 새로고침했습니다.");
    };

    const isMobile = () => window.innerWidth <= 768;

    function renderAppFromServer(state) {
      const render = (files, container) => {
        container.innerHTML = "";
        (files || []).map(normalizeToolFile).forEach(file => {
          const tool = defaultTools.find(t => t.file === file);
          if (tool) container.appendChild(createButton(tool));
        });
      };
      const allSavedFiles = [
        ...(state.fav || []),
        ...(state.active || []),
        ...(state.inactive || [])
      ].map(normalizeToolFile);
      const missingTools = defaultTools.filter(tool => !allSavedFiles.includes(tool.file));
      if (missingTools.length > 0) {
        missingTools.forEach(tool => { state.active.unshift(tool.file); });
        if (window.saveStateToServer) window.saveStateToServer(state);
        localStorage.setItem("toolDashboardState", JSON.stringify(state));
      }
      render(state.fav, sections[0]);
      render(state.active, sections[1]);
      render(state.inactive, sections[2]);
    }

    function initApp() {
      const saved = localStorage.getItem("toolDashboardState");
      let state = saved ? JSON.parse(saved) : { fav: [], active: defaultTools.map(t => t.file), inactive: [] };
      renderAppFromServer(state);
    }

    function createButton(tool) {
      const btn = document.createElement("div");
      btn.className = "tool-button";
      btn.draggable = true;
      btn.dataset.file = tool.file;

      const segmenter = new Intl.Segmenter('ko', { granularity: 'grapheme' });
      const segments = Array.from(segmenter.segment(tool.label));
      const iconPart = segments[0].segment;
      const textPart = segments.slice(1).map(s => s.segment).join('').trim();

      btn.innerHTML = `
        <span class="tool-icon">${iconPart}</span>
        <span class="tool-text">${textPart}</span>
      `;

      btn.onclick = () => openTab(tool);
      btn.ondragstart = () => { dragged = btn; };
      return btn;
    }

    const getSafeId = (file) => 'frame_' + btoa(unescape(encodeURIComponent(file))).replace(/=/g, '');

    function openTab(tool) {
      if (isMobile()) {
        document.querySelectorAll('.tool-button').forEach(b => b.classList.remove('active'));
        const activeBtn = document.querySelector(`.tool-button[data-file="${tool.file}"]`);
        if(activeBtn) activeBtn.classList.add('active');

        welcome.style.display = "none";
        tabBar.style.display = "none";
        
        let mFrame = document.getElementById('mobileFrame');
        if(!mFrame) {
          mFrame = document.createElement('iframe');
          mFrame.id = 'mobileFrame';
          iframeContainer.appendChild(mFrame);
        }
        document.querySelectorAll('#iframeContainer iframe').forEach(f => f.classList.remove('active'));
        mFrame.classList.add('active');
        mFrame.src = tool.file;

        if (!document.getElementById('sidebar').classList.contains('collapsed')) toggleSidebar();
        return;
      }

      let existingTab = tabs.find(t => t.file === tool.file);
      if (existingTab) {
        activateTab(tool.file);
        return;
      }

      const tabId = getSafeId(tool.file);
      tabs.push({ file: tool.file, label: tool.label, id: tabId });

      const tabEl = document.createElement('div');
      tabEl.className = 'tab';
      tabEl.id = 'tab_' + tabId;
      tabEl.dataset.file = tool.file;
      tabEl.draggable = true;
      tabEl.innerHTML = `<span>${tool.label}</span><span class="material-symbols-outlined close-tab" onclick="closeTab(event, '${tool.file}')">close</span>`;
      
      tabEl.addEventListener('dragstart', (e) => {
        draggedTab = tabEl;
        tabEl.classList.add('dragging');
      });
      tabEl.addEventListener('dragend', () => {
        draggedTab = null;
        tabEl.classList.remove('dragging');
        updateTabsArrayOrder();
      });

      tabEl.onclick = () => activateTab(tool.file);
      tabBar.appendChild(tabEl);

      const ifrm = document.createElement('iframe');
      ifrm.id = tabId;
      ifrm.src = tool.file;

      iframeContainer.appendChild(ifrm);

      activateTab(tool.file);
    }

    function setupTabDragAndDrop() {
      tabBar.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!draggedTab) return;
        const afterElement = getTabDragAfterElement(tabBar, e.clientX);
        if (afterElement == null) tabBar.appendChild(draggedTab);
        else tabBar.insertBefore(draggedTab, afterElement);
      });
    }

    function getTabDragAfterElement(container, x) {
      const draggableElements = [...container.querySelectorAll('.tab:not(.dragging)')];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = x - box.left - box.width / 2;
        if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
        else return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function updateTabsArrayOrder() {
      const currentTabElements = [...tabBar.querySelectorAll('.tab')];
      tabs = currentTabElements.map(el => tabs.find(t => t.file === el.dataset.file));
    }

    function activateTab(file) {
      if (isMobile()) return;
      const tid = getSafeId(file);
      document.querySelectorAll('.tab, #iframeContainer iframe, .tool-button').forEach(el => el.classList.remove('active'));
      welcome.style.display = "none";
      tabBar.style.display = "flex";
      const tBtn = document.getElementById('tab_' + tid);
      const ifr = document.getElementById(tid);
      const mBtn = document.querySelector(`.tool-button[data-file="${file}"]`);
      if(tBtn) tBtn.classList.add('active');
      if(ifr) ifr.classList.add('active');
      if(mBtn) mBtn.classList.add('active');
    }

    window.closeTab = function(e, file) {
      e.stopPropagation();
      const tid = getSafeId(file);
      tabs = tabs.filter(t => t.file !== file);
      const targetTab = document.getElementById('tab_' + tid);
      const targetIfr = document.getElementById(tid);
      if(targetTab) targetTab.remove();
      if(targetIfr) targetIfr.remove();
      
      if (tabs.length > 0) activateTab(tabs[tabs.length - 1].file);
      else goHome();
    };

    function goHome() {
      document.querySelectorAll('.tab, #iframeContainer iframe, .tool-button').forEach(el => el.classList.remove('active'));
      tabBar.style.display = "none";
      welcome.style.display = "flex";
      const mf = document.getElementById('mobileFrame');
      if(mf) mf.src = "";
    }

    function setupDragAndDrop() {
      sections.forEach(section => {
        section.ondragover = (e) => e.preventDefault();
        section.ondrop = (e) => {
          e.preventDefault();
          if (!dragged) return;
          const afterElement = getDragAfterElement(section, e.clientY);
          if (afterElement == null) section.appendChild(dragged);
          else section.insertBefore(dragged, afterElement);
          const state = {
            fav: Array.from(sections[0].children).map(b => b.dataset.file),
            active: Array.from(sections[1].children).map(b => b.dataset.file),
            inactive: Array.from(sections[2].children).map(b => b.dataset.file)
          };
          if(window.saveStateToServer) window.saveStateToServer(state);
          dragged = null;
        };
      });
    }

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.tool-button:not(.dragging)')];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
        else return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function updateClock() {
      const now = new Date();
      const clock = document.getElementById('naverClock');
      if(clock) clock.textContent = now.toTimeString().split(' ')[0];
      const days = ['일','월','화','수','목','금','토'];
      const disp = document.getElementById('todayDisplay');
      if(disp) disp.textContent = `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()} (${days[now.getDay()]})`;
    }

    function getChosung(str) {
      const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
      let result = "";
      for(let i=0; i<str.length; i++) {
        const code = str.charCodeAt(i) - 44032;
        if (code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
        else result += str.charAt(i);
      }
      return result;
    }

    function filterTools() {
      const query = document.getElementById('toolSearch').value.toLowerCase().replace(/\s/g, "");
      const queryChosung = getChosung(query);
      document.querySelectorAll('.tool-button').forEach(btn => {
        const label = btn.textContent.toLowerCase().replace(/\s/g, "");
        const labelChosung = getChosung(label);
        if (label.includes(query) || labelChosung.includes(query)) btn.style.display = "flex";
        else btn.style.display = "none";
      });
    }

    window.toggleSidebar = function() {
      const sb = document.getElementById('sidebar');
      const isCollapsed = sb.classList.toggle('collapsed');
      const pcIcon = document.getElementById('pcToggleIcon');
      if(pcIcon) pcIcon.textContent = isCollapsed ? 'menu' : 'menu_open';
      const mobileIcon = document.getElementById('toggleIcon');
      if(mobileIcon) mobileIcon.textContent = isCollapsed ? 'expand_more' : 'expand_less';
    }
  </script>
</body>
</html>
