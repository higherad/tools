<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대량 키워드 연관어 체커</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --main: #03c75a; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 40px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--main); text-align: center; margin-bottom: 25px; }
        
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; resize: none; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
        button { flex: 1; padding: 15px; background: var(--main); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .status-bar { margin-bottom: 15px; font-size: 14px; color: #666; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #f1f3f4; padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        
        .status-yes { color: #03c75a; font-weight: bold; }
        .status-no { color: #d93025; font-weight: bold; }
        .tag-count { background: #e8f5e9; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 대량 키워드 연관어 체커</h2>
    <p style="font-size:13px; color:#666; margin-bottom:10px;">* 분석할 키워드를 한 줄에 하나씩 입력해 주세요.</p>
    <textarea id="keywordList" placeholder="홍대맛집&#10;강남카페&#10;제주도여행"></textarea>
    
    <div class="btn-group">
        <button id="startBtn" onclick="processBatch()">분석 시작하기</button>
        <button id="copyBtn" onclick="copyTable()" style="background:#4285f4; display:none;">결과 복사하기</button>
    </div>

    <div id="status" class="status-bar"></div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>번호</th>
                <th>키워드</th>
                <th>연관어 유무</th>
                <th>개수</th>
                <th>추출된 연관어 (상위 5개)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let keywords = [];
    let currentIndex = 0;

    async function processBatch() {
        const input = document.getElementById('keywordList').value.trim();
        if (!input) return alert("키워드를 입력해주세요.");

        keywords = input.split('\n').map(k => k.trim()).filter(k => k !== "");
        currentIndex = 0;

        // UI 초기화
        document.getElementById('startBtn').disabled = true;
        document.getElementById('resultTable').style.display = 'table';
        document.getElementById('resultBody').innerHTML = '';
        document.getElementById('status').innerText = `전체 ${keywords.length}개 분석 시작...`;

        nextKeyword();
    }

    function nextKeyword() {
        if (currentIndex >= keywords.length) {
            document.getElementById('status').innerText = `✅ 모든 분석이 완료되었습니다. (총 ${keywords.length}개)`;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('copyBtn').style.display = 'inline-block';
            return;
        }

        const query = keywords[currentIndex];
        document.getElementById('status').innerText = `진행 중: ${currentIndex + 1} / ${keywords.length} (${query})`;

        // JSONP 호출
        const script = document.createElement('script');
        script.src = `https://ac.search.naver.com/nx/ac?q=${encodeURIComponent(query)}&con=0&ans=2&ans_con=3&forced_shape=blank&r_format=json&r_enc=UTF-8&st=100&r_lt=100&_callback=handleBatchResponse`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function handleBatchResponse(data) {
        const items = data.items[0] || [];
        const query = keywords[currentIndex];
        const tbody = document.getElementById('resultBody');
        
        const hasRelated = items.length > 0;
        const count = items.length;
        const topRelated = items.slice(0, 5).map(i => i[0]).join(', ');

        const row = `
            <tr>
                <td>${currentIndex + 1}</td>
                <td><strong>${query}</strong></td>
                <td class="${hasRelated ? 'status-yes' : 'status-no'}">${hasRelated ? 'O' : 'X'}</td>
                <td><span class="tag-count">${count}개</span></td>
                <td style="text-align:left; font-size:12px; color:#666;">${topRelated || '-'}</td>
            </tr>
        `;
        
        tbody.insertAdjacentHTML('beforeend', row);
        
        currentIndex++;
        // API 과부하 방지를 위해 0.2초 간격으로 호출
        setTimeout(nextKeyword, 200);
    }

    function copyTable() {
        // 테이블 내용을 텍스트 형식으로 복사 (엑셀 붙여넣기용)
        let text = "번호\t키워드\t유무\t개수\t연관어\n";
        const rows = document.querySelectorAll("#resultBody tr");
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            text += `${cols[0].innerText}\t${cols[1].innerText}\t${cols[2].innerText}\t${cols[3].innerText}\t${cols[4].innerText}\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            alert("결과가 클립보드에 복사되었습니다. 엑셀에 바로 붙여넣으세요!");
        });
    }
</script>

</body>
</html>
