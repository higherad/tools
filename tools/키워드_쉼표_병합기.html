<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>키워드 쉼표 병합기</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕳️</text></svg>">

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --split-color: #0ea5e9;
      --secondary: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px;
    }

    header p {
      color: var(--text-sub);
      font-size: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: stretch;
    }

    @media (max-width: 680px) {
      .two-col { grid-template-columns: 1fr; }
    }

    .main-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
      resize: vertical;
    }

    #keywords, #split-keywords {
      height: 120px;
      margin-bottom: 20px;
    }

    .config-grid {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 100px;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      height: 42px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex: 1.5;
      min-width: 180px;
    }

    .split-btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .split-btn-row button {
      min-width: 110px;
      flex: none;
    }

    button {
      height: 42px;
      flex: 1;
      padding: 0 16px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      white-space: nowrap;
    }

    button#convert { background: var(--primary); color: white; }
    button#convert:hover { background: var(--primary-hover); }
    button#clear { background: #f1f5f9; color: var(--secondary); }
    button#clear:hover { background: #e2e8f0; }
    button#split { background: var(--split-color); color: white; }
    button#split:hover { background: #0284c7; }
    button#split-clear { background: #f1f5f9; color: var(--secondary); }
    button#split-clear:hover { background: #e2e8f0; }

    #info, #split-info {
      font-size: 12px;
      text-align: right;
      margin-top: 8px;
      color: var(--text-sub);
    }

    .copy-btn {
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
      background: #eff6ff;
      color: var(--primary);
      border-radius: 6px;
      flex: none;
    }

    .copy-btn.split-copy {
      background: #e0f2fe;
      color: var(--split-color);
    }

    /* 결과 영역 */
    #results {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .group-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--primary);
      text-transform: uppercase;
    }

    .group-title.split { color: var(--split-color); }

    .group-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .group-info-row span { font-size: 12px; color: var(--text-sub); }
    .group-info-row input { width: 60px; height: 30px; padding: 4px 8px; font-size: 13px; }

    .result-area {
      font-family: monospace;
      font-size: 13px;
      background: #f8fafc;
      color: #334155;
      line-height: 1.5;
      resize: vertical;
    }

    .result-area.merge { height: 60px; }
    .result-area.split { height: 200px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>키워드 쉼표 병합기</h1>
    <p>줄바꿈 ↔ 쉼표 변환 도구</p>
  </header>

  <div class="two-col">
    <!-- 병합 카드 -->
    <div class="main-card">
      <div class="section-title">쉼표 병합</div>
      <label>키워드 입력</label>
      <textarea id="keywords" placeholder="키워드를 한 줄에 하나씩 입력하세요..."></textarea>

      <div class="config-grid">
        <div class="input-group">
          <label>키워드 개수</label>
          <input id="base-count" type="number" min="1" value="4" />
        </div>
        <div class="input-group">
          <label>총 그룹 수</label>
          <input id="group-count" type="number" min="1" value="4" />
        </div>
        <div class="btn-group">
          <button id="convert">병합하기</button>
          <button id="clear">초기화</button>
        </div>
      </div>
      <div id="info"></div>
    </div>

    <!-- 분리 카드 -->
    <div class="main-card">
      <div class="section-title">쉼표 분리</div>
      <label>키워드 입력</label>
      <textarea id="split-keywords" placeholder="키워드1,키워드2,키워드3 형태로 입력하세요..."></textarea>

      <div class="split-btn-row">
        <button id="split">분리하기</button>
        <button id="split-clear">초기화</button>
      </div>
      <div id="split-info"></div>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
  const keywordsEl    = document.getElementById('keywords');
  const baseCountEl   = document.getElementById('base-count');
  const groupCountEl  = document.getElementById('group-count');
  const convertBtn    = document.getElementById('convert');
  const clearBtn      = document.getElementById('clear');
  const info          = document.getElementById('info');

  const splitKeywordsEl = document.getElementById('split-keywords');
  const splitBtn        = document.getElementById('split');
  const splitClearBtn   = document.getElementById('split-clear');
  const splitInfo       = document.getElementById('split-info');

  const results = document.getElementById('results');

  let globalKeywords = [];
  let groupSizes = [];

  function parseKeywords(input) {
    return input.split(/[\n\r]+/).map(s => s.trim()).filter(s => s.length > 0);
  }

  function copyWithEffect(btn, getText) {
    const text = typeof getText === 'function' ? getText() : getText;
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.textContent;
      const origBg   = btn.style.background || '';
      const origColor = btn.style.color || '';
      btn.textContent = '완료 ✨';
      btn.style.background = '#059669';
      btn.style.color = 'white';
      setTimeout(() => {
        btn.textContent = original;
        btn.style.background = origBg;
        btn.style.color = origColor;
      }, 1000);
    });
  }

  function calculateGroupSizes(total, base, groups) {
    const arr = Array(groups).fill(0);
    let remain = total;
    for (let i = 0; i < groups; i++) {
      if (remain <= 0) break;
      const take = Math.min(base, remain);
      arr[i] = take;
      remain -= take;
    }
    return arr;
  }

  function adjustAfterChange(index, newSize) {
    const total = globalKeywords.length;
    const base  = Number(baseCountEl.value) || 1;
    let used = 0;
    for (let i = 0; i <= index; i++) {
      used += (i === index) ? newSize : groupSizes[i];
    }
    let remain = Math.max(0, total - used);
    const newArr = [...groupSizes];
    newArr[index] = newSize;
    for (let i = index + 1; i < groupSizes.length; i++) {
      const assign = Math.min(base, remain);
      newArr[i] = assign;
      remain -= assign;
    }
    groupSizes = newArr;
  }

  function buildMergeResults() {
    let html = '';
    let offset = 0;
    for (let i = 0; i < groupSizes.length; i++) {
      const size = groupSizes[i];
      const block = globalKeywords.slice(offset, offset + size).join(',');
      const safeBlock = block.replace(/"/g, '&quot;');
      html += `
        <div class="group-box">
          <div class="group-header">
            <div class="group-title">GROUP ${i + 1}</div>
            <button class="copy-btn" data-idx="${i}">복사</button>
          </div>
          <div class="group-info-row">
            <span>포함 개수:</span>
            <input type="number" class="group-size" min="0" value="${size}" data-idx="${i}" />
          </div>
          <textarea class="result-area merge" readonly>${block}</textarea>
        </div>`;
      offset += size;
    }
    results.innerHTML = html;

    results.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const ta = btn.closest('.group-box').querySelector('.result-area');
        copyWithEffect(btn, () => ta.value);
      });
    });

    results.querySelectorAll('.group-size').forEach(inp => {
      inp.addEventListener('change', e => {
        adjustAfterChange(Number(e.target.dataset.idx), Number(e.target.value));
        buildMergeResults();
      });
    });
  }

  function convert() {
    globalKeywords = parseKeywords(keywordsEl.value);
    if (globalKeywords.length === 0) return;
    splitInfo.textContent = '';
    groupSizes = calculateGroupSizes(globalKeywords.length, Number(baseCountEl.value) || 1, Number(groupCountEl.value) || 1);
    buildMergeResults();
    info.textContent = `총 ${globalKeywords.length}개 키워드 / ${groupCountEl.value}개 그룹`;
  }

  function doSplit() {
    const input = splitKeywordsEl.value.trim();
    if (!input) return;
    const keywords = input.split(',').map(s => s.trim()).filter(s => s.length > 0);
    const resultText = keywords.join('\n');
    const height = Math.max(120, Math.min(keywords.length * 26, 400));

    globalKeywords = [];
    groupSizes = [];
    info.textContent = '';

    results.innerHTML = `
      <div class="group-box">
        <div class="group-header">
          <div class="group-title split">분리 결과</div>
          <button class="copy-btn split-copy" id="split-copy-btn">복사</button>
        </div>
        <div class="group-info-row">
          <span>키워드 ${keywords.length}개</span>
        </div>
        <textarea class="result-area split" style="height:${height}px" readonly>${resultText}</textarea>
      </div>`;

    splitInfo.textContent = `총 ${keywords.length}개 키워드`;

    document.getElementById('split-copy-btn').addEventListener('click', e => {
      const ta = e.target.closest('.group-box').querySelector('.result-area');
      copyWithEffect(e.target, () => ta.value);
    });
  }

  convertBtn.addEventListener('click', convert);
  clearBtn.addEventListener('click', () => {
    keywordsEl.value = '';
    globalKeywords = [];
    groupSizes = [];
    results.innerHTML = '';
    info.textContent = '';
  });

  splitBtn.addEventListener('click', doSplit);
  splitClearBtn.addEventListener('click', () => {
    splitKeywordsEl.value = '';
    splitInfo.textContent = '';
    results.innerHTML = '';
  });
</script>

</body>
</html>
