<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>키워드 쉼표 병합기</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕳️</text></svg>">

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px;
    }

    header p {
      color: var(--text-sub);
      font-size: 14px;
    }

    .main-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
      resize: vertical;
    }

    #keywords {
      height: 120px;
      margin-bottom: 20px;
    }

    .config-grid {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 120px;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      height: 42px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex: 1.5;
      min-width: 200px;
    }

    button {
      height: 42px;
      flex: 1;
      padding: 0 16px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      white-space: nowrap;
    }

    button#convert { background: var(--primary); color: white; }
    button#convert:hover { background: var(--primary-hover); }
    button#clear { background: #f1f5f9; color: var(--secondary); }
    button#clear:hover { background: #e2e8f0; }

    #multi-results {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .group-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--primary);
      text-transform: uppercase;
    }

    .group-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .group-info-row span { font-size: 12px; color: var(--text-sub); }
    .group-info-row input { width: 60px; height: 30px; padding: 4px 8px; font-size: 13px; }

    .copy-btn {
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
      background: #eff6ff;
      color: var(--primary);
      border-radius: 6px;
      flex: none;
    }

    .result-area {
      height: 60px;
      font-family: monospace;
      font-size: 13px;
      background: #f8fafc;
      color: #334155;
      line-height: 1.4;
    }

    #info {
      font-size: 12px;
      text-align: right;
      margin-top: 8px;
      color: var(--text-sub);
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>키워드 쉼표 병합기</h1>
    <p>줄바꿈 키워드를 쉼표(,)로 연결하여 그룹화합니다.</p>
  </header>

  <div class="main-card">
    <label>키워드 입력</label>
    <textarea id="keywords" placeholder="키워드를 한 줄에 하나씩 입력하세요..."></textarea>

    <div class="config-grid">
      <div class="input-group">
        <label>키워드 개수</label>
        <input id="base-count" type="number" min="1" value="4" />
      </div>
      <div class="input-group">
        <label>총 그룹 수</label>
        <input id="group-count" type="number" min="1" value="4" />
      </div>
      <div class="btn-group">
        <button id="convert">병합하기</button>
        <button id="clear">초기화</button>
      </div>
    </div>
    <div id="info"></div>
  </div>

  <div id="multi-results"></div>
</div>

<script>
  const keywordsEl = document.getElementById('keywords');
  const baseCountEl = document.getElementById('base-count');
  const groupCountEl = document.getElementById('group-count');
  const convertBtn = document.getElementById('convert');
  const clearBtn = document.getElementById('clear');
  const multiResults = document.getElementById('multi-results');
  const info = document.getElementById('info');

  let globalKeywords = [];
  let groupSizes = [];

  function parseKeywords(input){
    return input.split(/[\n\r]+/).map(s => s.trim()).filter(s => s.length > 0);
  }

  function copyWithEffect(btn, text){
    navigator.clipboard.writeText(text).then(()=>{
      const original = btn.textContent;
      btn.textContent = "완료 ✨";
      btn.style.background = "#059669";
      btn.style.color = "white";
      setTimeout(()=>{
        btn.textContent = original;
        btn.style.background = "#eff6ff";
        btn.style.color = "var(--primary)";
      }, 1000);
    });
  }

  function calculateGroupSizes(total, base, groups) {
    let arr = Array(groups).fill(0);
    let remain = total;
    for (let i = 0; i < groups; i++) {
      if (remain <= 0) break;
      const take = Math.min(base, remain);
      arr[i] = take;
      remain -= take;
    }
    return arr;
  }

  function adjustAfterChange(index, newSize) {
    const total = globalKeywords.length;
    const groups = groupSizes.length;
    const base = Number(baseCountEl.value) || 1;
    let used = 0;
    for (let i = 0; i <= index; i++) {
      used += (i === index) ? newSize : groupSizes[i];
    }
    let remain = Math.max(0, total - used);
    const newArr = [...groupSizes];
    newArr[index] = newSize;
    for (let i = index + 1; i < groups; i++) {
      const assign = Math.min(base, remain);
      newArr[i] = assign;
      remain -= assign;
    }
    groupSizes = newArr;
  }

  function buildGroups(){
    let html = '';
    let offset = 0;
    for (let i = 0; i < groupSizes.length; i++) {
      const size = groupSizes[i];
      let blockArr = globalKeywords.slice(offset, offset + size);
      const block = blockArr.join(','); // 띄어쓰기 제거
      html += `
        <div class="group-box">
          <div class="group-header">
            <div class="group-title">GROUP ${i+1}</div>
            <button class="copy-btn" data-text="${block}">복사</button>
          </div>
          <div class="group-info-row">
            <span>포함 개수:</span>
            <input type="number" class="group-size" min="0" value="${size}" data-idx="${i}" />
          </div>
          <textarea class="result-area" readonly>${block}</textarea>
        </div>`;
      offset += size;
    }
    multiResults.innerHTML = html;
    document.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", () => copyWithEffect(btn, btn.dataset.text));
    });
    document.querySelectorAll(".group-size").forEach(inp => {
      inp.addEventListener("change", e => {
        adjustAfterChange(Number(e.target.dataset.idx), Number(e.target.value));
        buildGroups();
      });
    });
  }

  function convert(){
    globalKeywords = parseKeywords(keywordsEl.value);
    if(globalKeywords.length === 0) return;
    groupSizes = calculateGroupSizes(globalKeywords.length, Number(baseCountEl.value) || 1, Number(groupCountEl.value) || 1);
    buildGroups();
    info.textContent = `총 ${globalKeywords.length}개 키워드 / ${groupCountEl.value}개 그룹`;
  }

  convertBtn.addEventListener('click', convert);
  clearBtn.addEventListener('click', () => {
    keywordsEl.value = '';
    multiResults.innerHTML = '';
    info.textContent = '';
  });
</script>

</body>
</html>
