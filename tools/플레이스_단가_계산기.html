<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>플레이스 단가 계산기</title>
<style>
:root{
  --bg:#f1f3f8;--card:#fff;--text:#111827;--muted:#6b7280;
  --accent:#2563eb;--accent-l:#eff4ff;--ok:#0d9488;--ok-l:#f0fdfa;
  --error:#dc2626;--error-l:#fef2f2;--line:#e5e7eb;--line2:#f8fafc;
  --shadow:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-size:14px;padding:24px 16px 60px}
.wrap{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--line);padding:20px 22px}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
.ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
input[type=number],input[type=text],input[type=date]{
  width:100%;height:42px;padding:0 12px;border:1.5px solid var(--line);
  border-radius:10px;font-size:14px;font-family:inherit;background:var(--line2);
  color:var(--text);transition:border .15s,background .15s
}
input:focus{outline:none;border-color:var(--accent);background:#fff}
input[readonly]{background:#f3f4f6;color:var(--muted);cursor:not-allowed}
.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1 1 130px;min-width:0}

.btn{border:none;border-radius:9px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-ghost{background:var(--card);color:var(--text);border:1.5px solid var(--line)}
.btn-ghost:hover{background:var(--line2)}
.btn-danger{background:var(--error);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn-icon{padding:5px 7px;font-size:13px;border-radius:8px;line-height:1}

/* 견적 블록 */
.blk{border:1.5px solid var(--line);border-radius:12px;padding:14px;background:#fff;margin-bottom:10px}
.blk:last-child{margin-bottom:0}
.blk-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.blk-head span{font-size:12px;font-weight:700;color:var(--muted)}
.blk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.blk-mini{font-size:12px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}

/* 안내문구 */
.summary-box{background:var(--line2);border:1.5px dashed var(--line);border-radius:12px;padding:16px;font-size:14px;line-height:2;white-space:pre-line;min-height:240px;color:var(--text);font-family:inherit}
.copy-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.copy-btn:hover{background:#1d4ed8}
.copy-btn.ok{background:var(--ok)}
.filter-row{display:flex;gap:10px;flex-wrap:wrap}
.filter-row label{font-size:12px;font-weight:600;color:var(--text);margin:0;display:flex;align-items:center;gap:4px;cursor:pointer}

/* 업로드 */
.upload-area{border:2px dashed var(--line);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--line2)}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:var(--accent-l)}
.upload-area .u-icon{font-size:28px;margin-bottom:8px}
.upload-area p{color:var(--muted);font-size:13px;line-height:1.6}

/* 대행사 */
.agency-block{margin-bottom:16px;border:1.5px solid #c7d2fe;border-radius:14px;overflow:hidden}
.agency-block:last-child{margin-bottom:0}
.agency-hd{display:flex;justify-content:space-between;align-items:center;background:var(--accent-l);padding:12px 16px;border-bottom:1.5px solid #c7d2fe}
.agency-hd .aname{font-size:15px;font-weight:800;color:var(--accent)}
.agency-hd .ameta{font-size:12px;color:#6366f1;margin-top:1px}
.ag-table{width:100%;border-collapse:collapse;font-size:13px}
.ag-table thead th{background:#f8fafc;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.3px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--line)}
.ag-table tbody tr{border-bottom:1px solid var(--line)}
.ag-table tbody tr:last-child{border-bottom:none}
.ag-table tbody td{padding:10px 14px}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700}
.badge-done{background:var(--ok-l);color:var(--ok)}
.badge-pend{background:#fef9c3;color:#854d0e}
.agency-ft{background:#f0f4ff;border-top:1.5px solid #c7d2fe;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.agency-ft .totals{display:flex;gap:20px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.agency-ft .totals span b{color:var(--accent);font-weight:800}
.agency-copy-btn{background:var(--ok);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.agency-copy-btn:hover{background:#0f766e}
.agency-copy-btn.ok{background:#0f766e}

/* 환불 모달 항목 */
.refund-row{border:1.5px solid #fecaca;border-radius:12px;padding:14px;background:#fff}
.refund-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.refund-row-num{font-size:13px;font-weight:800;color:var(--error)}
.refund-row-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.refund-result{font-size:12px;margin-top:10px;padding-top:10px;border-top:1px dashed #fecaca;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.r-tag{color:var(--muted)}
.r-days{background:#fef2f2;color:var(--error);font-weight:700;padding:2px 7px;border-radius:999px;font-size:11px}
.r-arrow{color:var(--muted)}
.r-total{font-size:14px;font-weight:900;color:var(--error)}
.r-detail{font-size:11px;color:var(--muted)}

@media(max-width:600px){
  .blk-grid{grid-template-columns:1fr}
  .refund-row-grid{grid-template-columns:1fr}
  .row{flex-direction:column}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ① CSV 정산 등록 -->
<div class="card">
  <div class="card-top">
    <div class="card-title"><div class="ic" style="background:#f0fdfa;color:var(--ok)">📂</div>정산 등록 — 대행사별 분류</div>
    <div style="display:flex;gap:8px">
      <input type="file" id="csvFileInput" accept=".csv" style="display:none"/>
      <button class="btn btn-ghost btn-sm" id="uploadCsvBtn">📤 CSV 업로드</button>
      <button class="btn btn-ghost btn-sm" id="clearCsvBtn" style="display:none;color:var(--error)">✕ 초기화</button>
    </div>
  </div>
  <div id="csvContent">
    <div class="upload-area" id="uploadZone">
      <div class="u-icon">📄</div>
      <p><b>CSV 파일을 드래그하거나 클릭해서 업로드</b><br>대행사별로 자동 분류됩니다</p>
    </div>
  </div>
</div>

<!-- ② 단가 설정 -->
<div class="card">
  <div class="card-top">
    <div class="card-title"><div class="ic" style="background:#eff4ff;color:var(--accent)">💰</div>개별 단가 설정</div>
  </div>
  <div class="row">
    <div class="col field"><label>트래픽 단가 (원)</label><input id="trafficPrice" type="number" value="0"/></div>
    <div class="col field"><label>길찾기 단가 (원)</label><input id="routePrice" type="number" value="0"/></div>
    <div class="col field"><label>부가세 (%)</label><input id="vatRate" type="number" value="10" readonly/></div>
  </div>
</div>

<!-- ③ 견적 블록 -->
<div class="card">
  <div class="card-top" style="margin-bottom:14px">
    <div class="card-title"><div class="ic" style="background:#eff4ff;color:var(--accent)">📝</div>개별 정산 수량</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-ghost btn-sm" id="resetAll">초기화</button>
      <button class="btn btn-ghost btn-sm" id="openRefundModal" style="color:var(--error);border-color:#fecaca">↩️ 환불 계산</button>
    </div>
  </div>
  <div id="blocks"></div>
</div>

<!-- ④ 안내 문구 -->
<div class="card">
  <div class="card-top">
    <div class="card-title"><div class="ic" style="background:#f0fdfa;color:var(--ok)">📋</div>안내 문구</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <div class="filter-row">
      <label><input type="checkbox" id="showTraffic1" checked/> 트래픽</label>
      <label><input type="checkbox" id="showRoute1" checked/> 길찾기</label>
      <label style="color:var(--accent)"><input type="checkbox" id="combine1" checked/> 합산(+)</label>
    </div>
    <button class="copy-btn" id="copy1">복사</button>
  </div>
  <div class="summary-box" id="summary1"></div>
</div>

<!-- 환불 계산기 모달 -->
<div id="refundModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);padding:20px;overflow-y:auto;align-items:flex-start;justify-content:center">
  <div style="background:#fff;border-radius:18px;max-width:600px;width:100%;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,.18);border:2px solid #fecaca;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--error-l);padding:16px 20px;border-bottom:2px solid #fecaca">
      <div style="display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--error)">
        <div class="ic" style="background:#fff;color:var(--error)">↩️</div>환불 금액 계산기
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm" id="resetRefund" style="color:var(--error)">초기화</button>
        <button class="btn btn-danger btn-sm" id="addRefundBlock">+ 환불 항목 추가</button>
        <button id="closeRefundModal" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1">✕</button>
      </div>
    </div>
    <div style="padding:20px;display:flex;flex-direction:column;gap:10px">
      <div id="refund_empty" style="text-align:center;padding:28px 0;color:var(--muted);font-size:13px">
        + 환불 항목 추가 버튼을 눌러 항목을 입력하세요
      </div>
      <div id="refundBlocks" style="display:flex;flex-direction:column;gap:10px"></div>
      <div id="refund_total_box" style="display:none;background:var(--error-l);border:1.5px solid #fecaca;border-radius:12px;padding:14px 18px;flex-direction:column;gap:4px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:700;color:var(--error)">환불 금액 합계</span>
          <span id="ref_total_amt" style="font-size:22px;font-weight:900;color:var(--error)">0원</span>
        </div>
        <div id="ref_total_detail" style="font-size:11px;color:var(--error);opacity:.7;text-align:right"></div>
      </div>
    </div>
  </div>
</div>

</div>
<script>
(() => {
  const $ = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => Array.from(r.querySelectorAll(s));
  const num = v => Number((v??"").toString().replace(/[^0-9.-]/g,""))||0;
  const fmt = n => Math.round(n).toLocaleString();
  const won = n => fmt(n)+"원";

  const todayStr = () => new Date().toISOString().split("T")[0];

  /* 오늘 포함하여 종료예정일까지 일수 계산 */
  function calcRefundDays(endDateVal){
    if(!endDateVal) return 0;
    const today = new Date(); today.setHours(0,0,0,0);
    const end   = new Date(endDateVal); end.setHours(0,0,0,0);
    const diff  = Math.round((end - today) / 86400000) + 1; // 오늘 포함
    return diff > 0 ? diff : 0;
  }

  /* ══════════════════════════════
     견적 블록 (캠페인 수 추가)
  ══════════════════════════════ */
  function makeBlk(){
    const el = document.createElement("div");
    el.className = "blk";
    el.innerHTML = `
      <div class="blk-head"><span>📌 견적 항목</span></div>
      <div class="blk-grid">
        <div class="field"><label>캠페인 수</label><input type="number" class="b-camp" placeholder="1" min="1"/></div>
        <div class="field"><label>트래픽 전체 목표</label><input type="number" class="t-per" placeholder="0"/></div>
        <div class="field"><label>길찾기 전체 목표</label><input type="number" class="r-per" placeholder="0"/></div>
      </div>
      <div class="blk-mini" data-mini>결과: -</div>`;
    el.oninput = recalc;
    return el;
  }

  /* ══════════════════════════════
     환불 항목
  ══════════════════════════════ */
  let refundSeq = 0;

  function makeRefundRow(){
    refundSeq++;
    const idx = refundSeq;
    const el = document.createElement("div");
    el.className = "refund-row";
    el.innerHTML = `
      <div class="refund-row-head">
        <span class="refund-row-num">환불 항목 ${idx}</span>
        <button class="btn btn-ghost btn-icon rdel" style="color:var(--error);border-color:#fecaca" title="삭제">🗑</button>
      </div>
      <div class="refund-row-grid">
        <div class="field">
          <label>종료 예정일</label>
          <input type="date" class="r-end" min="${todayStr()}"/>
        </div>
        <div class="field"><label>트래픽 수량</label><input type="number" class="r-t-qty" placeholder="0"/></div>
        <div class="field"><label>길찾기 수량</label><input type="number" class="r-r-qty" placeholder="0"/></div>
      </div>
      <div class="refund-result" data-result>
        <span class="r-tag">종료 예정일을 선택하고 수량을 입력해주세요</span>
      </div>`;

    el.querySelector(".rdel").onclick = () => { el.remove(); renumberRefund(); recalcRefund(); };
    el.oninput = () => { updateRefundRow(el); recalcRefund(); };
    return el;
  }

  function renumberRefund(){
    $$("#refundBlocks .refund-row").forEach((b,i)=>{
      const h = b.querySelector(".refund-row-num");
      if(h) h.textContent = `환불 항목 ${i+1}`;
    });
    refundSeq = $$("#refundBlocks .refund-row").length;
  }

  function updateRefundRow(el){
    const endVal = el.querySelector(".r-end").value;
    const tQty   = num(el.querySelector(".r-t-qty").value);
    const rQty   = num(el.querySelector(".r-r-qty").value);
    const tp     = num($("#trafficPrice").value);
    const rp     = num($("#routePrice").value);
    const res    = el.querySelector("[data-result]");

    if(!endVal){
      res.innerHTML = `<span class="r-tag">종료 예정일을 선택하고 수량을 입력해주세요</span>`;
      return;
    }

    const days   = calcRefundDays(endVal);
    const tAmt   = tQty * tp;
    const rAmt   = rQty * rp;
    const total  = tAmt + rAmt;

    if(days === 0){
      res.innerHTML =
        `<span class="r-days">0일</span>` +
        `<span class="r-arrow">→</span>` +
        `<span class="r-tag">오늘이 종료일이므로 환불 금액이 없습니다</span>`;
      return;
    }

    if(tQty === 0 && rQty === 0){
      res.innerHTML =
        `<span class="r-days">${days}일 잔여</span>` +
        `<span class="r-arrow">→</span>` +
        `<span class="r-tag">수량을 입력해주세요</span>`;
      return;
    }

    const parts = [];
    if(tAmt > 0) parts.push(`트래픽 ${fmt(tQty)}개 × ${fmt(tp)}원 = -${won(tAmt)}`);
    if(rAmt > 0) parts.push(`길찾기 ${fmt(rQty)}개 × ${fmt(rp)}원 = -${won(rAmt)}`);

    res.innerHTML =
      `<span class="r-days">${days}일 잔여</span>` +
      `<span class="r-arrow">→</span>` +
      `<span class="r-total">-${won(total)}</span>` +
      `<span class="r-detail">(${parts.join(" / ")})</span>`;
  }

  /* 환불 합계 재계산 */
  function recalcRefund(){
    const rows = $$("#refundBlocks .refund-row");
    const empty    = $("#refund_empty");
    const totalBox = $("#refund_total_box");

    if(rows.length === 0){
      empty.style.display = "block";
      totalBox.style.display = "none";
      recalc(); return;
    }

    empty.style.display = "none";

    const tp = num($("#trafficPrice").value);
    const rp = num($("#routePrice").value);
    let sumT = 0, sumR = 0;

    rows.forEach(b => {
      const days = calcRefundDays(b.querySelector(".r-end").value);
      if(days > 0){
        sumT += num(b.querySelector(".r-t-qty").value) * tp;
        sumR += num(b.querySelector(".r-r-qty").value) * rp;
      }
    });

    const grand = sumT + sumR;
    totalBox.style.display = "flex";
    $("#ref_total_amt").textContent = grand > 0 ? `-${won(grand)}` : "0원";

    const parts = [];
    if(sumT > 0) parts.push(`트래픽 -${won(sumT)}`);
    if(sumR > 0) parts.push(`길찾기 -${won(sumR)}`);
    $("#ref_total_detail").textContent = parts.join("  +  ");

    recalc();
  }

  /* ══════════════════════════════
     안내 문구 재계산
  ══════════════════════════════ */
  function recalc(){
    const tp  = num($("#trafficPrice").value);
    const rp  = num($("#routePrice").value);
    const vat = num($("#vatRate").value);

    let totalCamp = 0, T = 0, R = 0;
    $$("#blocks .blk").forEach(b => {
      const c = num($(".b-camp",b).value);
      const t = num($(".t-per",b).value);
      const r = num($(".r-per",b).value);
      totalCamp += c || 1;
      T += t; R += r;
      $("[data-mini]",b).textContent = `캠페인 ${c||1}건 · 트래픽 ${fmt(t)}개 · 길찾기 ${fmt(r)}개`;
    });

    const sT = $("#showTraffic1").checked;
    const sR = $("#showRoute1").checked;
    const cb = $("#combine1").checked;

    const totalGoal = (sT?T:0) + (sR?R:0);
    const unitP     = (sT?tp:0) + (sR?rp:0);
    const baseAmt   = (sT?T*tp:0) + (sR?R*rp:0);
    const dep       = Math.ceil(baseAmt*(100+vat)/100);

    // 환불 합계
    let refundTotal = 0;
    $$("#refundBlocks .refund-row").forEach(b => {
      const days = calcRefundDays(b.querySelector(".r-end").value);
      if(days > 0){
        refundTotal +=
          num(b.querySelector(".r-t-qty").value) * tp +
          num(b.querySelector(".r-r-qty").value) * rp;
      }
    });

    // 캠페인/목표/단가 라인
    let countLine;
    if(cb){
      countLine =
        `• 캠페인 수: ${totalCamp}건\n` +
        `• 전체 목표: ${fmt(totalGoal)}개\n\n` +
        `• 단가: ${fmt(unitP)}원`;
    } else {
      const p = [];
      if(sT) p.push(`• 트래픽: ${fmt(T)}개 (건당 ${fmt(tp)}원)`);
      if(sR) p.push(`• 길찾기: ${fmt(R)}개 (건당 ${fmt(rp)}원)`);
      countLine = p.join("\n");
    }

    // 금액 라인
    let amtLines;
    if(refundTotal > 0){
      const netAmt = baseAmt - refundTotal;
      const netDep = Math.ceil(netAmt*(100+vat)/100);
      amtLines =
        `• 환불 금액: -${won(refundTotal)}\n` +
        `• 금액: ${won(netAmt)} (VAT 별도)\n\n` +
        `• 입금액: ${won(netDep)} (VAT 포함)`;
    } else {
      amtLines =
        `• 금액: ${won(baseAmt)} (VAT 별도)\n\n` +
        `• 입금액: ${won(dep)} (VAT 포함)`;
    }

    $("#summary1").textContent =
      `${countLine}\n${amtLines}\n\n` +
      `주식회사 하이어애드\n318-085637-04-018\nIBK기업은행\n\n확인 후 입금 부탁드립니다.`;
  }

  /* ══════════════════════════════
     이벤트 바인딩
  ══════════════════════════════ */
  ["trafficPrice","routePrice"].forEach(id => {
    $("#"+id).oninput = () => {
      // 단가 바뀌면 환불 행 결과도 갱신
      $$("#refundBlocks .refund-row").forEach(b => updateRefundRow(b));
      recalcRefund();
    };
  });
  ["showTraffic1","showRoute1","combine1"].forEach(id => {
    if($("#"+id)) $("#"+id).onchange = recalc;
  });

  $("#resetAll").onclick = () => {
    $("#blocks").innerHTML = "";
    $("#blocks").appendChild(makeBlk());
    recalc();
  };

  $("#addRefundBlock").onclick = () => {
    const row = makeRefundRow();
    $("#refundBlocks").appendChild(row);
    recalcRefund();
  };

  $("#resetRefund").onclick = () => {
    $("#refundBlocks").innerHTML = "";
    refundSeq = 0;
    recalcRefund();
  };

  const modal = $("#refundModal");
  $("#openRefundModal").onclick  = () => { modal.style.display = "flex"; };
  $("#closeRefundModal").onclick = () => { modal.style.display = "none"; };
  modal.onclick = e => { if(e.target === modal) modal.style.display = "none"; };

  $("#copy1").onclick = () => {
    navigator.clipboard.writeText($("#summary1").textContent.trim()).then(() => {
      $("#copy1").classList.add("ok"); $("#copy1").textContent = "✓ 복사됨";
      setTimeout(() => { $("#copy1").classList.remove("ok"); $("#copy1").textContent = "복사"; }, 1500);
    });
  };

  // 초기 블록
  $("#blocks").appendChild(makeBlk());
  recalc();

  /* ══════════════════════════════
     CSV 업로드 & 대행사별 분류
  ══════════════════════════════ */
  function triggerUpload(){ $("#csvFileInput").click(); }
  $("#uploadCsvBtn").onclick = triggerUpload;
  $("#uploadZone").onclick   = triggerUpload;
  $("#uploadZone").ondragover  = e => { e.preventDefault(); $("#uploadZone").classList.add("drag"); };
  $("#uploadZone").ondragleave = () => $("#uploadZone").classList.remove("drag");
  $("#uploadZone").ondrop = e => {
    e.preventDefault(); $("#uploadZone").classList.remove("drag");
    const f = e.dataTransfer.files[0]; if(f) readCsv(f);
  };
  $("#csvFileInput").onchange = e => {
    const f = e.target.files[0]; if(f) readCsv(f); e.target.value = "";
  };

  function resetCsvArea(){
    $("#csvContent").innerHTML = `<div class="upload-area" id="uploadZone"><div class="u-icon">📄</div><p><b>CSV 파일을 드래그하거나 클릭해서 업로드</b><br>대행사별로 자동 분류됩니다</p></div>`;
    const uz = $("#uploadZone");
    uz.onclick     = triggerUpload;
    uz.ondragover  = e => { e.preventDefault(); uz.classList.add("drag"); };
    uz.ondragleave = () => uz.classList.remove("drag");
    uz.ondrop      = e => { e.preventDefault(); uz.classList.remove("drag"); const f = e.dataTransfer.files[0]; if(f) readCsv(f); };
    $("#clearCsvBtn").style.display = "none";
  }
  $("#clearCsvBtn").onclick = resetCsvArea;

  function readCsv(file){
    const r = new FileReader();
    r.onload = ev => parseCsv(ev.target.result.replace(/^\uFEFF/,""));
    r.readAsText(file,"UTF-8");
  }

  function parseCsv(text){
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if(lines.length < 2){ alert("데이터가 없습니다."); return; }
    const header = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
    const colMap = {
      "접수일시":"date","대행사":"agency","유저ID":"userId",
      "캠페인 수":"campaigns","일 목표 합산":"totalGoal","단가(원)":"unitPrice",
      "정산 금액(VAT 별도)":"amount","입금액(VAT 포함)":"deposit",
      "환불 금액":"refund","정산상태":"status"
    };
    const ci = {};
    header.forEach((h,i) => { if(colMap[h]) ci[colMap[h]] = i; });
    const rows = [];
    for(let i=1;i<lines.length;i++){
      const c = lines[i].split(",").map(v => v.replace(/"/g,"").trim());
      if(!c[ci.agency]) continue;
      rows.push({
        date:c[ci.date]||"", agency:c[ci.agency]||"", userId:c[ci.userId]||"",
        campaigns:num(c[ci.campaigns]), totalGoal:num(c[ci.totalGoal]),
        unitPrice:num(c[ci.unitPrice]), amount:num(c[ci.amount]),
        deposit:num(c[ci.deposit]), refund:num(c[ci.refund]),
        status:c[ci.status]||""
      });
    }
    if(!rows.length){ alert("유효한 데이터가 없습니다."); return; }
    renderAgencies(rows);
    $("#clearCsvBtn").style.display = "";
  }

  function buildCopyMsg(totalCamp, totalG, uPrice, totalA, totalD, totalRefund, vat=10){
    const header =
      `• 캠페인 수: ${totalCamp}건\n` +
      `• 전체 목표: ${fmt(totalG)}개\n\n` +
      `• 단가: ${fmt(uPrice)}원\n`;
    let amtPart;
    if(totalRefund > 0){
      const net    = totalA - totalRefund;
      const netDep = Math.ceil(net*(100+vat)/100);
      amtPart =
        `• 환불 금액: -${won(totalRefund)}\n` +
        `• 금액: ${won(net)} (VAT 별도)\n\n` +
        `• 입금액: ${won(netDep)} (VAT 포함)`;
    } else {
      amtPart =
        `• 금액: ${won(totalA)} (VAT 별도)\n\n` +
        `• 입금액: ${won(totalD)} (VAT 포함)`;
    }
    return header + amtPart + "\n\n주식회사 하이어애드\n318-085637-04-018\nIBK기업은행\n\n확인 후 입금 부탁드립니다.";
  }

  function renderAgencies(rows){
    const order = [], groups = {};
    rows.forEach(r => {
      if(!groups[r.agency]){ groups[r.agency]=[]; order.push(r.agency); }
      groups[r.agency].push(r);
    });
    const container = document.createElement("div");
    order.forEach(agency => {
      const list = groups[agency];
      const totalAmt    = list.reduce((s,r) => s+r.amount,  0);
      const totalDep    = list.reduce((s,r) => s+r.deposit, 0);
      const totalRefund = list.reduce((s,r) => s+r.refund,  0);
      const pendCount   = list.filter(r => r.status !== "정산완료").length;

      const block = document.createElement("div");
      block.className = "agency-block";

      const hd = document.createElement("div");
      hd.className = "agency-hd";
      hd.innerHTML = `
        <div>
          <div class="aname">${agency}</div>
          <div class="ameta">총 ${list.length}건 · 미정산 ${pendCount}건</div>
        </div>
        <button class="agency-copy-btn">📋 복사</button>`;
      block.appendChild(hd);

      const wrap = document.createElement("div");
      wrap.style.overflowX = "auto";
      const tbl = document.createElement("table");
      tbl.className = "ag-table";
      tbl.innerHTML = `<thead><tr>
        <th>접수일시</th><th>유저ID</th><th>캠페인 수</th>
        <th>일 목표 합산</th><th>단가(원)</th>
        <th>정산 금액(VAT 별도)</th><th>입금액(VAT 포함)</th>
        <th>환불 금액</th><th>상태</th>
      </tr></thead>`;
      const tbody = document.createElement("tbody");
      list.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.date}</td><td>${r.userId}</td>
          <td style="text-align:right">${fmt(r.campaigns)}</td>
          <td style="text-align:right"><b>${fmt(r.totalGoal)}</b></td>
          <td style="text-align:right">${fmt(r.unitPrice)}</td>
          <td style="text-align:right"><b>${fmt(r.amount)}</b></td>
          <td style="text-align:right;color:var(--accent);font-weight:700">${fmt(r.deposit)}</td>
          <td style="text-align:right${r.refund?";color:var(--error);font-weight:700":""}">${r.refund?fmt(r.refund):"-"}</td>
          <td><span class="badge ${r.status==="정산완료"?"badge-done":"badge-pend"}">${r.status}</span></td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody); wrap.appendChild(tbl); block.appendChild(wrap);

      const ft = document.createElement("div");
      ft.className = "agency-ft";
      ft.innerHTML = `<div class="totals">
        <span>정산 합계 <b>${fmt(totalAmt)}원</b></span>
        <span>입금 합계 <b>${fmt(totalDep)}원</b></span>
        ${totalRefund ? `<span style="color:var(--error)">환불 <b>${fmt(totalRefund)}원</b></span>` : ""}
      </div>`;
      block.appendChild(ft);
      container.appendChild(block);

      hd.querySelector(".agency-copy-btn").onclick = function(){
        const totalCamp = list.reduce((s,r) => s+r.campaigns, 0);
        const totalG    = list.reduce((s,r) => s+r.totalGoal, 0);
        const uPrice    = list[0].unitPrice;
        const msg = buildCopyMsg(totalCamp, totalG, uPrice, totalAmt, totalDep, totalRefund);
        navigator.clipboard.writeText(msg).then(() => {
          const btn = this;
          btn.classList.add("ok"); btn.textContent = "✓ 복사됨";
          setTimeout(() => { btn.classList.remove("ok"); btn.textContent = "📋 복사"; }, 1500);
        });
      };
    });
    $("#csvContent").innerHTML = "";
    $("#csvContent").appendChild(container);
  }

})();
</script>
</body>
</html>
