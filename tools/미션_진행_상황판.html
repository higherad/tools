<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 비즈핏 통합 상황판</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        body { background: var(--bg); margin: 0; padding: 20px; font-family: 'Pretendard', sans-serif; color: #333; }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { color: var(--primary); margin-bottom: 24px; font-size: 24px; text-align: center; }

        /* 탭 래퍼 */
        .tab-wrapper {
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* 탭 헤더 바 */
        .tab-bar {
            display: flex;
            background: #f6f8f6;
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 16px 20px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-size: 15px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* 탭 콘텐츠 */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* 패널 상단 툴바 */
        .panel-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: #fafafa;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }

        .full-btn {
            padding: 6px 14px;
            font-size: 12px;
            background: #f0f4f0;
            border: 1px solid #d0ddd0;
            border-radius: 6px;
            cursor: pointer;
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .full-btn:hover { background: var(--primary); color: white; }

        /* iframe */
        .sheet-frame {
            width: 100%;
            height: 740px;
            border: none;
            display: block;
        }

        .footer-info { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍀 비즈핏 통합 상황판</h1>

    <div class="tab-wrapper">

        <!-- 탭 버튼 -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(0)">📒 NP 트래픽 등급표</button>
            <button class="tab-btn" onclick="switchTab(1)">📒 NS 트래픽(단독) 등급표</button>
            <button class="tab-btn" onclick="switchTab(2)">📒 NS 트래픽(가격비교) 등급표</button>
        </div>

        <!-- 탭 패널 1 -->
        <div class="tab-panel active" id="panel-0">
            <div class="panel-toolbar">
                <span class="panel-title">📒 NP 트래픽 등급표</span>
                <a class="full-btn" href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQoNV2gqFCCiUae_UiCVhY-WJ4_5wUD0JPHDYk_rHMQcprN0BfQddmxkrLbCuWnmg/pubhtml?gid=40553156&single=true&widget=false&chrome=false" target="_blank">새창으로 ↗</a>
            </div>
            <iframe class="sheet-frame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQoNV2gqFCCiUae_UiCVhY-WJ4_5wUD0JPHDYk_rHMQcprN0BfQddmxkrLbCuWnmg/pubhtml?gid=40553156&single=true&widget=false&chrome=false"></iframe>
        </div>

        <!-- 탭 패널 2 -->
        <div class="tab-panel" id="panel-1">
            <div class="panel-toolbar">
                <span class="panel-title">📒 NS 트래픽(단독) 등급표</span>
                <a class="full-btn" href="https://docs.google.com/spreadsheets/d/e/2PACX-1vR3OdGJxL1NjwRU89xfKURxPMlJvl-AshXFgqR7X1NM3hwFZ9HUrkT76oA7fXJ90Q/pubhtml?gid=1221355086&single=true&widget=false&chrome=false" target="_blank">새창으로 ↗</a>
            </div>
            <iframe class="sheet-frame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR3OdGJxL1NjwRU89xfKURxPMlJvl-AshXFgqR7X1NM3hwFZ9HUrkT76oA7fXJ90Q/pubhtml?gid=1221355086&single=true&widget=false&chrome=false"></iframe>
        </div>

        <!-- 탭 패널 3 -->
        <div class="tab-panel" id="panel-2">
            <div class="panel-toolbar">
                <span class="panel-title">📒 NS 트래픽(가격비교) 등급표</span>
                <a class="full-btn" href="https://docs.google.com/spreadsheets/d/e/2PACX-1vR3OdGJxL1NjwRU89xfKURxPMlJvl-AshXFgqR7X1NM3hwFZ9HUrkT76oA7fXJ90Q/pubhtml?gid=1007752263&single=true&widget=false&chrome=false" target="_blank">새창으로 ↗</a>
            </div>
            <iframe class="sheet-frame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR3OdGJxL1NjwRU89xfKURxPMlJvl-AshXFgqR7X1NM3hwFZ9HUrkT76oA7fXJ90Q/pubhtml?gid=1007752263&single=true&widget=false&chrome=false"></iframe>
        </div>

    </div><!-- /.tab-wrapper -->

    <p class="footer-info">※ 탭을 클릭하면 해당 상황판으로 전환됩니다. 오른쪽 상단 버튼으로 새창에서 볼 수 있습니다.</p>
</div>

<script>
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    function switchTab(idx) {
        tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        panels.forEach((p, i) => p.classList.toggle('active', i === idx));
    }
</script>

</body>
</html>
