<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Ad | 블로그 태그 추출 도구</title>
    <style>
        /* [Higher Ad 브랜드 가이드 기반 스타일링] */
        .tool-container {
            font-family: 'Pretendard', -apple-system, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 24px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #eef0f2;
            border-radius: 10px;
            font-size: 15px;
            background: #f8f9fa;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #03cf5d;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(3, 207, 93, 0.1);
        }

        .btn-extract {
            padding: 14px 28px;
            background: #03cf5d;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-extract:hover { background: #02b852; }

        /* [결과 카드 레이아웃] */
        #result-container {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .result-card {
            padding: 20px;
            border-radius: 12px;
            background-color: #ffffff;
            border: 1px solid #f0f2f5;
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: #03cf5d;
            box-shadow: 0 4px 12px rgba(3, 207, 93, 0.08);
        }

        /* [요청하신 순서: 1. 블로그명] */
        .card-top {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        .rank-badge {
            font-size: 11px;
            font-weight: 800;
            background: #03cf5d;
            color: #fff;
            padding: 3px 8px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .blog-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* [요청하신 순서: 2. URL] */
        .url-section {
            margin-bottom: 12px;
        }

        .blog-link {
            font-size: 13px;
            color: #0066ff;
            text-decoration: none;
            word-break: break-all;
            opacity: 0.8;
        }

        .blog-link:hover { text-decoration: underline; opacity: 1; }

        /* [요청하신 순서: 3. 태그] */
        .tag-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            padding-top: 8px;
            border-top: 1px dashed #f0f2f5;
        }

        .tag-item {
            font-size: 14px;
            color: #3b18ff;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .no-tag { color: #ccc; font-weight: 400; font-size: 13px; }

        .loader {
            display: none;
            text-align: center;
            padding: 30px;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="header-title">🔍 블로그 태그 추출 도구</div>
    
    <div class="input-group">
        <input type="text" id="keyword" placeholder="분석할 키워드를 입력하세요" onkeypress="if(event.keyCode==13) runExtract()">
        <button class="btn-extract" onclick="runExtract()">추출하기</button>
    </div>

    <div id="loader" class="loader">네이버 블로그 데이터를 분석 중입니다...</div>

    <div id="result-container"></div>
</div>

<script>
    async function runExtract() {
        const keyword = document.getElementById('keyword').value;
        const loader = document.getElementById('loader');
        const container = document.getElementById('result-container');
        
        // [중요] 새로 배포하신 GAS 웹 앱 URL을 여기에 입력하세요
        const API_URL = "https://script.google.com/macros/s/AKfycbxpj23jTWsOZ8hGUs-_b8D6F-ul7sl0E6YZBNj7ED8nMmOe1zQcFQ1U17tK1GQ1AuphLg/exec";

        if (!keyword) return alert("키워드를 입력해 주세요.");

        loader.style.display = "block";
        container.style.display = "none";
        container.innerHTML = "";

        try {
            const response = await fetch(`${API_URL}?keyword=${encodeURIComponent(keyword)}&_t=${Date.now()}`);
            const result = await response.json();

            if (result.items && result.items.length > 0) {
                result.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    
                    // 태그 레이아웃 생성
                    let tagHtml = `<div class="tag-wrapper"><span class="no-tag">태그 없음</span></div>`;
                    if (item.tags && item.tags !== "태그 없음") {
                        const tagArray = item.tags.split(/[, ]+/).filter(t => t.trim() !== "");
                        tagHtml = `<div class="tag-wrapper">` + 
                                  tagArray.map(t => `<span class="tag-item">#${t.replace(/^#/, '')}</span>`).join('') + 
                                  `</div>`;
                    }

                    // 요청하신 순서 반영: 블로그명 -> URL -> 태그
                    card.innerHTML = `
                        <div class="card-top">
                            <span class="rank-badge">${item.rank}위</span>
                            <span class="blog-name">${item.blogName}</span>
                        </div>
                        <div class="url-section">
                            <a href="${item.url}" target="_blank" class="blog-link">${item.url}</a>
                        </div>
                        ${tagHtml}
                    `;
                    container.appendChild(card);
                });
                container.style.display = "flex";
            } else {
                alert("검색 결과를 가져오지 못했습니다. 키워드를 확인해 주세요.");
            }
        } catch (error) {
            console.error(error);
            alert("연결 상태가 불안정하거나 GAS URL 설정이 잘못되었습니다.");
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
