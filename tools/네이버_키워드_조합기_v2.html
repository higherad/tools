<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>네이버 키워드 조합기 v2</title>
<style>
:root {
    --primary: #4e73df; --success: #1cc88a; --danger: #e74a3b;
    --gray-100: #f8f9fc; --gray-200: #eaecf4; --gray-600: #858796; --gray-800: #5a5c69;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard','Malgun Gothic',sans-serif; background:#f4f6f9; padding:20px; color:var(--gray-800); }
.app { max-width:1100px; margin:0 auto; }

/* ── 탭 ── */
.tab-bar { display:flex; gap:2px; border-bottom:2px solid var(--primary); margin-bottom:0; }
.tab-btn {
    padding:10px 24px; border:none; border-radius:8px 8px 0 0;
    background:var(--gray-200); color:var(--gray-600);
    font-size:14px; font-weight:bold; cursor:pointer; transition:.15s;
}
.tab-btn.active { background:var(--primary); color:#fff; }
.tab-panel { display:none; padding-top:20px; }
.tab-panel.active { display:block; }

/* ── 카드 ── */
.v2-card { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:20px; overflow:hidden; }
.v2-hd {
    padding:13px 20px; background:var(--gray-100); border-bottom:1px solid var(--gray-200);
    font-weight:bold; font-size:14px; display:flex; align-items:center;
    justify-content:space-between; gap:10px;
}
.v2-bd { padding:20px; }

/* ── 폼 ── */
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
textarea.ta {
    width:100%; height:120px; border:1px solid var(--gray-200); border-radius:8px;
    padding:10px; font-size:13px; font-family:inherit; resize:none; outline:none;
    line-height:1.7; transition:border-color .2s;
}
textarea.ta:focus { border-color:var(--primary); }
.badge { display:inline-block; padding:1px 7px; border-radius:4px; font-size:11px; font-weight:bold; margin-left:5px; }
.req { background:#ffe3e3; color:#c92a2a; }
.opt { background:#e3f2fd; color:#1565c0; }
.filter-row {
    display:flex; align-items:center; gap:16px; padding:11px 14px;
    background:var(--gray-100); border-radius:8px; margin-bottom:16px;
    font-size:13px; flex-wrap:wrap;
}
.filter-row input[type=number] {
    width:80px; padding:4px 8px; border:1px solid var(--gray-200);
    border-radius:6px; font-size:13px; text-align:center; outline:none;
}

/* ── 버튼 ── */
.btn { padding:9px 18px; border:none; border-radius:8px; font-size:13px; font-weight:bold; cursor:pointer; transition:.15s; white-space:nowrap; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#2e59d9; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#17a673; }
.btn-outline { background:#fff; color:var(--gray-800); border:1px solid var(--gray-200); }
.btn-outline:hover { background:var(--gray-100); }
.btn-sm { padding:5px 11px; font-size:12px; }
.btn-full { width:100%; padding:14px; font-size:16px; }

/* ── 상태바 ── */
.v2-status { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.v2-status.info    { background:#e3f2fd; color:#1565c0; border-left:4px solid #1565c0; display:block; }
.v2-status.success { background:#e8f5e9; color:#2e7d32; border-left:4px solid #2e7d32; display:block; }
.v2-status.error   { background:#ffebee; color:#c62828; border-left:4px solid #c62828; display:block; }

/* ── 서브키워드 태그 ── */
.tag-cloud { display:flex; flex-wrap:wrap; gap:8px; }
.kw-tag {
    display:flex; align-items:center; gap:5px; padding:5px 12px;
    background:#e8f4fd; border:1px solid #bee3f8; border-radius:20px;
    font-size:13px; cursor:pointer; user-select:none; transition:.15s;
}
.kw-tag.off { background:var(--gray-100); border-color:var(--gray-200); color:var(--gray-600); text-decoration:line-through; }
.kw-tag .cnt { font-size:11px; color:#888; }

/* ── v2 결과 테이블 ── */
.result-box { background:#fff; border-radius:12px; border:1px solid var(--gray-200); overflow:hidden; }
.result-hd {
    padding:11px 16px; background:var(--gray-100); border-bottom:1px solid var(--gray-200);
    display:flex; justify-content:space-between; align-items:center; gap:10px;
}
.result-scroll { height:430px; overflow-y:auto; }
.result-scroll table { width:100%; border-collapse:collapse; }
.result-scroll th, .result-scroll td { padding:8px 14px; font-size:13px; text-align:left; border-bottom:1px solid #f0f0f0; }
.result-scroll th { background:var(--gray-100); font-weight:bold; color:var(--gray-600); position:sticky; top:0; z-index:1; }
.result-scroll tr:hover { background:#f7f9ff; }
.result-scroll tr.sel { background:#fff9db !important; }

/* ── 패턴 배지 ── */
.pbadge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:bold; }
.p1 { background:#e3f2fd; color:#1565c0; }
.p2 { background:#e8f5e9; color:#2e7d32; }
.p3 { background:#fff3e0; color:#e65100; }

/* ══════════════════════════════════════════════════════════
   v1 스타일 (원본 유지 — 클래스명 충돌 방지를 위해 분리)
══════════════════════════════════════════════════════════ */
.save-manager { background:#fff; padding:25px; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,.05); margin-bottom:25px; }
.save-header { display:flex; align-items:center; gap:10px; font-weight:bold; margin-bottom:15px; font-size:16px; }
.slot-grid { display:flex; gap:12px; }
.slot-box { display:flex; align-items:center; background:#fff; border:1px solid var(--gray-200); border-radius:8px; overflow:hidden; transition:.2s; flex:1; min-width:0; }
.slot-box:focus-within { border-color:var(--primary); box-shadow:0 0 0 2px rgba(78,115,223,.1); }
.slot-btn { width:45px; height:42px; border:none; background:var(--gray-100); cursor:pointer; font-weight:bold; border-right:1px solid var(--gray-200); flex-shrink:0; font-size:14px; }
.slot-btn.active { background:var(--primary); color:#fff; border-right-color:var(--primary); }
.slot-name { flex-grow:1; width:100%; padding:8px 12px; border:none; outline:none; font-size:14px; background:transparent; text-align:center; }
.input-grid-v1 { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:25px; }
.card-v1 { background:#fff; border-radius:12px; border:1px solid var(--gray-200); box-shadow:0 2px 4px rgba(0,0,0,.03); overflow:hidden; display:flex; flex-direction:column; }
.card-hd-v1 { background:var(--gray-100); padding:12px 18px; border-bottom:1px solid var(--gray-200); display:flex; justify-content:space-between; align-items:center; }
.card-hd-v1 strong { font-size:15px; color:#444; }
.hdr-ctrl { display:flex; align-items:center; gap:15px; }
.pos-sel { padding:4px 8px; border:1px solid #ccc; border-radius:6px; font-size:13px; background:#fff; cursor:pointer; outline:none; }
.must-chk { font-size:13px; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:5px; color:var(--danger) !important; }
.card-bd-v1 { padding:15px; flex-grow:1; }
textarea.words { width:100%; height:140px; border:1px solid #e0e0e0; border-radius:8px; padding:12px; box-sizing:border-box; resize:none; font-size:14px; font-family:inherit; line-height:1.5; outline:none; transition:.2s; }
textarea.words:focus { border-color:var(--primary); }
.ctrl-panel { background:#fff; padding:25px; border-radius:12px; margin-bottom:25px; display:flex; flex-direction:column; align-items:center; gap:15px; box-shadow:0 4px 6px rgba(0,0,0,.05); }
.qty-row { display:flex; align-items:center; gap:12px; font-weight:bold; font-size:16px; }
.qty-inp { width:90px; padding:8px; border:1px solid #ccc; border-radius:8px; text-align:center; font-size:16px; outline:none; }
.btn-v1main { width:100%; max-width:600px; padding:18px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:18px; font-weight:bold; cursor:pointer; transition:.2s; box-shadow:0 4px 10px rgba(78,115,223,.3); }
.btn-v1main:hover { background:#2e59d9; transform:translateY(-1px); }
.res-sec-v1 { background:#fff; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.05); overflow:hidden; border:1px solid #ddd; }
.res-hd-v1 { padding:15px 20px; border-bottom:1px solid #eee; background:#fff; display:flex; justify-content:space-between; align-items:center; }
.res-hd-v1 span { font-size:14px; font-weight:bold; color:#555; }
.hint { font-size:12px; color:#999; font-weight:normal; margin-left:10px; }
.res-outer-v1 { position:relative; height:450px; overflow-y:auto; background:#fff; }
.res-tbl { width:100%; border-collapse:collapse; table-layout:fixed; }
.res-tbl tr { height:40px; border-bottom:1px solid #f8f9fc; transition:.1s; }
.res-tbl tr:hover { background:#f1f4ff; }
.res-tbl tr.checked { background:#fff9db !important; }
.col-ck { width:50px; text-align:center; }
.col-num { width:60px; text-align:center; color:#aaa; font-size:13px; border-right:1px solid #eee; }
.col-txt { padding-left:20px; font-size:14px; color:#333; }
input[type=checkbox] { cursor:pointer; width:16px; height:16px; }
</style>
</head>
<body>
<div class="app">

<!-- 탭 -->
<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('v2')">🤖 자동 추출 v2</button>
    <button class="tab-btn" onclick="switchTab('v1')">🔑 수동 조합 v1</button>
</div>

<!-- ════════════════════════════════════════
     TAB v2 — 자동 추출
════════════════════════════════════════ -->
<div class="tab-panel active" id="tab-v2">

    <!-- 키워드 입력 -->
    <div class="v2-card">
        <div class="v2-hd">📝 키워드 입력</div>
        <div class="v2-bd">
            <div class="grid3" style="margin-bottom:14px;">
                <div>
                    <label class="fl">지역명 <span class="badge req">필수</span></label>
                    <textarea class="ta" id="inp-loc" placeholder="강남역&#10;역삼동&#10;강남구"></textarea>
                </div>
                <div>
                    <label class="fl">업종 / 카테고리 <span class="badge req">필수</span></label>
                    <textarea class="ta" id="inp-biz" placeholder="삼겹살&#10;고기집"></textarea>
                </div>
                <div>
                    <label class="fl">대표 메뉴 <span class="badge opt">선택</span></label>
                    <textarea class="ta" id="inp-menu" placeholder="항정살&#10;갈매기살"></textarea>
                </div>
            </div>
            <div class="filter-row">
                <span style="font-weight:bold;">최소 모바일 검색량</span>
                <input type="number" id="inp-min" value="100" min="0">
                <span style="color:#aaa; font-size:12px;">미만 연관 키워드는 서브 키워드 추출에서 제외됩니다.</span>
            </div>
            <button class="btn btn-primary btn-full" onclick="runV2()">🔍 API 조회 &amp; 자동 조합 생성</button>
        </div>
    </div>

    <!-- 상태바 -->
    <div class="v2-status" id="v2-status"></div>

    <!-- 서브키워드 태그 -->
    <div class="v2-card" id="subkw-card" style="display:none;">
        <div class="v2-hd">
            🏷️ 추출된 서브 키워드 <span id="subkw-cnt" style="font-weight:normal; font-size:12px; color:#aaa;"></span>
            <span style="font-size:11px; color:#bbb; font-weight:normal;">클릭으로 포함 / 제외</span>
        </div>
        <div class="v2-bd">
            <div class="tag-cloud" id="tag-cloud"></div>
            <div style="margin-top:12px; display:flex; gap:8px;">
                <button class="btn btn-outline btn-sm" onclick="allTags(true)">전체 포함</button>
                <button class="btn btn-outline btn-sm" onclick="allTags(false)">전체 제외</button>
                <button class="btn btn-primary btn-sm" onclick="regenV2()">✨ 조합 재생성</button>
            </div>
        </div>
    </div>

    <!-- 결과 -->
    <div id="v2-result"></div>

</div><!-- /tab-v2 -->

<!-- ════════════════════════════════════════
     TAB v1 — 수동 조합 (원본 유지)
════════════════════════════════════════ -->
<div class="tab-panel" id="tab-v1">
    <div class="save-manager">
        <div class="save-header">📁 저장 캠페인 (서버 동기화)</div>
        <div id="slot-grid" class="slot-grid"></div>
    </div>
    <div class="input-grid-v1" id="v1-input-container"></div>
    <div class="ctrl-panel">
        <div class="qty-row">추출 수량: <input type="number" id="limitCount" value="100" class="qty-inp" oninput="autoSave()"></div>
        <button class="btn-v1main" onclick="generate()">⚡ 키워드 조합 생성하기</button>
        <div id="gen-count" style="color:var(--primary); font-weight:bold; font-size:14px;">조합 대기 중...</div>
    </div>
    <div class="res-sec-v1">
        <div class="res-hd-v1">
            <div>
                <span>📋 생성 결과</span>
                <span class="hint">(Shift+클릭: 범위 선택 / Ctrl+C: 선택항목 복사)</span>
            </div>
            <label style="font-size:13px; cursor:pointer; display:flex; align-items:center; gap:5px; font-weight:bold;">
                <input type="checkbox" id="all-check" onclick="toggleAll(this.checked)"> 전체 선택
            </label>
        </div>
        <div class="res-outer-v1">
            <table class="res-tbl"><tbody id="result-body"></tbody></table>
        </div>
    </div>
</div><!-- /tab-v1 -->

</div><!-- /.app -->

<script>
/* ============================================================
   공통
   ============================================================ */
const sleep     = ms => new Promise(r => setTimeout(r, ms));
const splitLines = t => t.split('\n').map(s => s.trim()).filter(Boolean);

function switchTab(t) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (i === 0 && t === 'v2') || (i === 1 && t === 'v1')));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
}

/* ============================================================
   V2 — 상수 (불용어 / 화이트리스트)
   ============================================================ */
// 진짜 쓸모없는 토큰만 (의존명사·방향사·행정단위)
// 맛집·추천·가격 등은 유효한 서브키워드이므로 제외하지 않음
const STOPWORDS = new Set([
    '동','구','시','군','읍','면','리',
    '앞','옆','뒤','안','위','아래',
    '것','거','게','데','수','줄','때','곳',
]);

const NOUN_HINTS = [
    '주차','루프탑','단체석','룸','프라이빗','테라스','야외',
    '포장','배달','예약','웨이팅','대기','오마카세','코스',
    '뷔페','셀프','바베큐','바비큐','브런치','해산물','랍스터',
    '와인','칵테일','소주','맥주','전통주','보드게임','노래방',
    '당구','볼링','키즈','어린이','반려동물','펫','강아지','고양이',
    '흡연','금연','와이파이','콘센트','충전','화장실',
    '엘리베이터','장애인','유모차','주차장','발레파킹',
];

const SENT_END = /(가능|있는|없는|되는|하는|인|한|된|좋은|나쁜|높은|낮은|넓은|좁은|많은|적은|큰|작은|빠른|느린|됩니다|합니다|해요|이에요|예요|아요|어요|거리|미만|이상|이하|초과)$/;

/* ============================================================
   V2 — 프록시 설정 (naver-keyword-bot Cloud Run)
   ============================================================ */
const PROXY_URL = 'https://naver-keyword-bot-938928195180.asia-northeast3.run.app/relkwd';

/* ============================================================
   V2 — 상태
   ============================================================ */
let v2SubData = [];            // {noun, rawKw, mobile, included}
let v2Locs = [], v2Biz = [], v2Menus = [];
let v2Combined = [];           // 최종 조합 결과
let v2LastCk  = null;

/* ============================================================
   V2 — Naver API 호출 (프록시 경유)
   ============================================================ */
async function callAPI(hints) {
    const qs   = new URLSearchParams({ hintKeywords: hints.join(',') });
    const resp = await fetch(`${PROXY_URL}?${qs}`);
    if (!resp.ok) throw new Error(`API ${resp.status}: ${(await resp.text()).slice(0, 160)}`);
    return (await resp.json()).keywordList || [];
}

/* ============================================================
   V2 — 서브 키워드 명사 추출
   ============================================================ */
function extractNoun(kw, dynStop) {
    kw = kw.trim();
    for (const h of NOUN_HINTS) if (kw.includes(h)) return h;   // 화이트리스트 최우선

    const stop  = new Set([...STOPWORDS, ...dynStop]);
    const valid = w => w && w.length >= 2 && !stop.has(w) && !SENT_END.test(w);
    const tokens = kw.split(/\s+/);

    if (tokens.length === 1) return valid(kw) ? kw : null;

    for (const t of tokens) {
        const c = t.replace(/(이|가|은|는|을|를|에|의|와|과|도|만|로|으로)$/, '');
        if (valid(c)) return c;
    }
    return null;
}

function filterKwList(list, minMobile, dynStop) {
    const seen = new Set(), out = [];

    // 입력 지역명의 어근 집합 (강남역 → 강남역+강남, 역삼동 → 역삼동+역삼)
    const locStems = new Set(v2Locs);
    for (const loc of v2Locs) {
        const stem = loc.replace(/(역|동|구|시|군|읍|면|리|가)$/, '');
        if (stem.length >= 2) locStems.add(stem);
    }
    const locStemArr = [...locStems];

    // 지역 접미사 패턴 (OO역, OO동 등)
    const IS_REGION = /^[가-힣]{2,}(역|동|구|시|군|읍|면|리)$/;
    // 복합어 접미사 (삼겹살맛집 → 삼겹살)
    const COMPOUND = /^(.{2,}?)(맛집|음식점|식당|카페|술집|주점|횟집|고깃집)$/;

    for (const item of list) {
        const raw    = (item.relKeyword || '').trim();
        const mobile = parseInt(item.monthlyMobileQcCnt) || 0;
        if (!raw || mobile < minMobile) continue;

        // ① 타 지역 차단: 입력하지 않은 지역어 토큰이 있으면 스킵
        const hasForeignRegion = raw.split(/\s+/).some(t =>
            IS_REGION.test(t) && !locStemArr.some(s => t.includes(s))
        );
        if (hasForeignRegion) continue;

        // ② 명사 추출
        let noun = extractNoun(raw, dynStop);
        if (!noun) continue;

        // ③ 지역 어근 제거 (강남맛집 → 맛집)
        for (const stem of locStemArr) {
            noun = noun.replace(new RegExp(stem, 'g'), '').trim();
        }

        // ④ 복합어 접미사 분리 (삼겹살맛집 → 삼겹살)
        const cm = noun.match(COMPOUND);
        if (cm) noun = cm[1];

        noun = noun.trim();

        // ⑤ 유효성: 2글자 미만, 지역 접미사 단독, 중복 제거
        if (!noun || noun.length < 2) continue;
        if (/^(역|동|구|시|군|읍|면|리)$/.test(noun)) continue;
        if (seen.has(noun)) continue;

        seen.add(noun);
        out.push({ noun, rawKw: raw, mobile, included: true });
    }
    return out.sort((a, b) => b.mobile - a.mobile);
}

/* ============================================================
   V2 — 검색 의도(Intent) 기반 조합 엔진
   ============================================================ */
function combine3(locs, biz, subs, menus) {
    const seen = new Set(), res = [];
    const add = (kw, pat) => {
        kw = kw.trim().replace(/\s+/g, ' ');
        if (kw && !seen.has(kw)) { seen.add(kw); res.push({ keyword: kw, pattern: pat }); }
    };
    for (const loc of locs) {
        // 패턴1: 기본형
        for (const b of biz)  add(`${loc} ${b}`, '패턴1(메인)');
        for (const m of menus) add(`${loc} ${m}`, '패턴1(메뉴)');

        // 패턴2: 특징형 — {지역} + {서브} + {업종} (의도형 롱테일)
        for (const s of subs) {
            if (s.length > 8) continue;
            for (const b of biz) add(`${loc} ${s} ${b}`, '패턴2(특징)');
            add(`${loc} ${s}`, '패턴2(서비스)');     // 서브 단독 조합도 유지
        }

        // 패턴3: 심화형 — {지역} + {메뉴} + {서브}
        for (const m of menus) {
            for (const s of subs) add(`${loc} ${m} ${s}`, '패턴3(심화)');
        }
    }
    return res;
}

/* ============================================================
   V2 — 메인 실행
   ============================================================ */
async function runV2() {
    v2Locs  = splitLines(document.getElementById('inp-loc').value);
    v2Biz   = splitLines(document.getElementById('inp-biz').value);
    v2Menus = splitLines(document.getElementById('inp-menu').value);
    const minM = parseInt(document.getElementById('inp-min').value) || 100;

    if (!v2Locs.length || !v2Biz.length)
        return setStatus('error', '❌ 지역명과 업종은 필수 입력입니다.');

    // 시드 키워드 구성
    const seeds = [];
    for (const l of v2Locs) {
        for (const b of v2Biz)   seeds.push(`${l} ${b}`);
        for (const m of v2Menus) seeds.push(`${l} ${m}`);
    }

    // UI 초기화
    document.getElementById('subkw-card').style.display = 'none';
    document.getElementById('v2-result').innerHTML = '';

    const chunks = [];
    for (let i = 0; i < seeds.length; i += 5) chunks.push(seeds.slice(i, i + 5));

    const allKwList = [];
    try {
        for (let i = 0; i < chunks.length; i++) {
            setStatus('info', `⏳ API 조회 중... [${i + 1}/${chunks.length}]  ${chunks[i].join(', ')}`);
            allKwList.push(...await callAPI(chunks[i]));
            if (i < chunks.length - 1) await sleep(500);
        }
    } catch (err) {
        setStatus('error', `❌ ${err.message}`);
        return;
    }

    processResults(allKwList, minM);
}

function processResults(list, minM) {
    if (!list.length) {
        setStatus('error', '❌ API 응답이 비어 있습니다. 시드 키워드를 확인하세요.');
        return;
    }
    const dynStop = new Set([...v2Locs, ...v2Biz, ...v2Menus]);
    v2SubData = filterKwList(list, minM, dynStop);
    renderTags();
    const subs = v2SubData.filter(d => d.included).map(d => d.noun);
    v2Combined = combine3(v2Locs, v2Biz, subs, v2Menus);
    renderResult();
    setStatus('success',
        `✅ 완료 — API 수신 ${list.length}개 → 서브키워드 ${v2SubData.length}개 추출 → 조합 ${v2Combined.length}개 생성`);
}

/* ============================================================
   V2 — 서브키워드 태그 렌더링
   ============================================================ */
function renderTags() {
    const cloud = document.getElementById('tag-cloud');
    document.getElementById('subkw-card').style.display = '';
    cloud.innerHTML = '';
    v2SubData.forEach(d => {
        const tag = document.createElement('div');
        tag.className = 'kw-tag' + (d.included ? '' : ' off');
        tag.innerHTML = `${d.noun} <span class="cnt">${d.mobile.toLocaleString()}</span>`;
        tag.onclick = () => { d.included = !d.included; tag.classList.toggle('off', !d.included); };
        cloud.appendChild(tag);
    });
    document.getElementById('subkw-cnt').textContent = `(${v2SubData.length}개)`;
}

function allTags(on) { v2SubData.forEach(d => d.included = on); renderTags(); }

function regenV2() {
    const subs = v2SubData.filter(d => d.included).map(d => d.noun);
    v2Combined = combine3(v2Locs, v2Biz, subs, v2Menus);
    renderResult();
    setStatus('success', `✅ 재생성 완료 — ${v2Combined.length}개`);
}

/* ============================================================
   V2 — 결과 테이블
   ============================================================ */
const PAT_META = {
    '패턴1(메인)':  ['p1', '메인'],
    '패턴1(메뉴)':  ['p1', '메뉴'],
    '패턴2(특징)':  ['p2', '특징'],
    '패턴2(서비스)':['p2', '서비스'],
    '패턴3(심화)':  ['p3', '심화'],
};

function renderResult() {
    const rows = v2Combined.map((item, i) => {
        const [cls, lbl] = PAT_META[item.pattern] || ['p1', item.pattern];
        return `<tr id="vr${i}">
            <td style="width:40px;text-align:center;"><input type="checkbox" class="v2ck" data-i="${i}" onclick="v2Ck(event,this)"></td>
            <td style="width:46px;color:#bbb;font-size:12px;">${i + 1}</td>
            <td>${item.keyword}</td>
            <td><span class="pbadge ${cls}">${lbl}</span></td>
        </tr>`;
    }).join('');

    document.getElementById('v2-result').innerHTML = `
    <div class="result-box">
        <div class="result-hd">
            <div>
                <b>📋 조합 결과</b>
                <span style="font-size:12px;color:#888;margin-left:8px;">${v2Combined.length}개</span>
                <span style="font-size:11px;color:#bbb;margin-left:6px;">(Shift+클릭: 범위 선택)</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <label style="font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:bold;">
                    <input type="checkbox" id="v2-all" onchange="v2AllToggle(this.checked)"> 전체
                </label>
                <button class="btn btn-outline btn-sm" onclick="v2Copy()">📋 복사</button>
                <button class="btn btn-success btn-sm" onclick="v2CSV()">⬇️ CSV</button>
            </div>
        </div>
        <div class="result-scroll">
            <table>
                <thead><tr>
                    <th style="width:40px;"></th><th style="width:46px;">번호</th>
                    <th>키워드</th><th style="width:120px;">패턴</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    </div>`;
}

function v2Ck(e, cb) {
    const all = [...document.querySelectorAll('.v2ck')];
    if (e.shiftKey && v2LastCk) {
        const a = all.indexOf(v2LastCk), b = all.indexOf(cb);
        all.slice(Math.min(a, b), Math.max(a, b) + 1).forEach(c => { c.checked = v2LastCk.checked; v2RowSel(c); });
    }
    v2LastCk = cb;
    v2RowSel(cb);
}
function v2RowSel(cb) {
    document.getElementById('vr' + cb.dataset.i)?.classList.toggle('sel', cb.checked);
}
function v2AllToggle(on) {
    document.querySelectorAll('.v2ck').forEach(cb => { cb.checked = on; v2RowSel(cb); });
}
function v2SelKws() {
    return [...document.querySelectorAll('.v2ck:checked')].map(cb => v2Combined[+cb.dataset.i]);
}
function v2Copy() {
    const sel = v2SelKws();
    if (!sel.length) { alert('선택된 항목이 없습니다.'); return; }
    navigator.clipboard.writeText(sel.map(g => g.keyword).join('\n'));
    alert(`${sel.length}개 복사 완료!`);
}
function v2CSV() {
    const sel = v2SelKws();
    const src = sel.length ? sel : v2Combined;
    const csv = [['키워드','패턴'], ...src.map(g => [g.keyword, g.pattern])]
        .map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob(['﻿' + csv], { type: 'text/csv' })),
        download: `조합키워드_${new Date().toISOString().slice(0, 10)}.csv`,
    });
    a.click();
}

function setStatus(type, msg) {
    const el = document.getElementById('v2-status');
    el.className = 'v2-status ' + type;
    el.textContent = msg;
}

/* ============================================================
   V1 — 수동 조합기 (원본 로직 완전 보존)
   ============================================================ */
let currentSlot = 1, lastChecked = null, generatedKeywords = [], isInitialLoading = false;

// 입력 카드 생성
const labelsV1 = ['지역', '업체명', '서비스', '의도'];
const v1Container = document.getElementById('v1-input-container');
labelsV1.forEach((L, i) => {
    v1Container.innerHTML += `
    <div class="card-v1">
        <div class="card-hd-v1">
            <strong>${i + 1}. ${L}</strong>
            <div class="hdr-ctrl">
                <select id="pos${i}" class="pos-sel" onchange="autoSave()">
                    <option value="any">랜덤 위치</option>
                    <option value="0">1번 고정</option><option value="1">2번 고정</option>
                    <option value="2">3번 고정</option><option value="3" ${i===3?'selected':''}>4번 고정</option>
                </select>
                <label class="must-chk"><input type="checkbox" id="must${i}" onchange="autoSave()"> 필수</label>
            </div>
        </div>
        <div class="card-bd-v1">
            <textarea id="words${i}" class="words" oninput="autoSave()" placeholder="${L} 키워드를 줄바꿈으로 입력하세요..."></textarea>
        </div>
    </div>`;
});

function createSlots() {
    const grid = document.getElementById('slot-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        grid.innerHTML += `
        <div class="slot-box">
            <button id="slot_btn_${i}" class="slot-btn" onclick="switchSlot(${i})">${i}</button>
            <input type="text" id="slot_name_${i}" class="slot-name" value="캠페인 ${i}" oninput="autoSave()" placeholder="이름">
        </div>`;
    }
}

function autoSave() {
    if (isInitialLoading) return;
    const data = { limit: document.getElementById('limitCount').value, groups: [] };
    for (let i = 0; i < 4; i++) {
        data.groups.push({
            words: document.getElementById('words' + i).value,
            must:  document.getElementById('must' + i).checked,
            pos:   document.getElementById('pos' + i).value,
        });
    }
    const slotNames = {};
    for (let i = 1; i <= 5; i++) slotNames[i] = document.getElementById('slot_name_' + i).value;
    if (window.parent?.saveSeoData) window.parent.saveSeoData(currentSlot, data, slotNames);
}

function switchSlot(n) {
    currentSlot = n;
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('slot_btn_' + n).classList.add('active');
    if (window.parent?.loadSeoData) window.parent.loadSeoData(n);
}

window.applyServerData = function(slotNum, data, slotNames) {
    isInitialLoading = true;
    if (slotNames) for (let i = 1; i <= 5; i++) {
        if (slotNames[i]) document.getElementById('slot_name_' + i).value = slotNames[i];
    }
    if (data) {
        document.getElementById('limitCount').value = data.limit || 100;
        data.groups.forEach((g, i) => {
            document.getElementById('words' + i).value = g.words || '';
            document.getElementById('must' + i).checked = g.must || false;
            document.getElementById('pos' + i).value = g.pos || (i === 3 ? '3' : 'any');
        });
    } else {
        for (let i = 0; i < 4; i++) {
            document.getElementById('words' + i).value = '';
            document.getElementById('must' + i).checked = false;
            document.getElementById('pos' + i).value = i === 3 ? '3' : 'any';
        }
    }
    isInitialLoading = false;
};

function generate() {
    const limit = parseInt(document.getElementById('limitCount').value);
    const groups = [];
    for (let i = 0; i < 4; i++) {
        groups.push({
            data: document.getElementById('words' + i).value.split('\n').map(s => s.trim()).filter(x => x),
            must: document.getElementById('must' + i).checked,
            pos:  document.getElementById('pos' + i).value,
        });
    }
    const pool = [];
    function build(idx, cur) {
        if (idx === 4) {
            for (let i = 0; i < 4; i++) if (groups[i].must && !cur.some(c => c.gid === i)) return;
            if (!cur.length) return;
            const res = new Array(cur.length).fill(null), flex = [];
            cur.forEach(item => {
                const p = groups[item.gid].pos;
                if (p !== 'any' && parseInt(p) < res.length) res[parseInt(p)] = item.val;
                else flex.push(item.val);
            });
            for (let i = 0; i < res.length; i++) if (!res[i]) res[i] = flex.shift();
            pool.push(res.join(' '));
            return;
        }
        groups[idx].data.forEach(w => build(idx + 1, [...cur, { gid: idx, val: w }]));
        if (!groups[idx].must) build(idx + 1, cur);
    }
    build(0, []);
    generatedKeywords = [...new Set(pool)].sort(() => Math.random() - 0.5).slice(0, limit);
    const tbody = document.getElementById('result-body');
    tbody.innerHTML = '';
    generatedKeywords.forEach((kw, i) => {
        tbody.innerHTML += `
        <tr id="row_${i}">
            <td class="col-ck"><input type="checkbox" class="kw-check" data-idx="${i}" onclick="handleCheck(event, this)"></td>
            <td class="col-num">${i + 1}</td>
            <td class="col-txt">${kw}</td>
        </tr>`;
    });
    document.getElementById('gen-count').innerText = `✨ ${generatedKeywords.length}개의 키워드가 생성되었습니다!`;
    document.getElementById('all-check').checked = false;
}

function handleCheck(e, cb) {
    const cbs = [...document.querySelectorAll('.kw-check')];
    if (e.shiftKey && lastChecked) {
        const a = cbs.indexOf(lastChecked), b = cbs.indexOf(cb);
        cbs.slice(Math.min(a, b), Math.max(a, b) + 1).forEach(c => { c.checked = lastChecked.checked; updateRowClass(c); });
    }
    lastChecked = cb;
    updateRowClass(cb);
}
function updateRowClass(cb) {
    const row = document.getElementById('row_' + cb.getAttribute('data-idx'));
    if (row) row.classList.toggle('checked', cb.checked);
}
function toggleAll(on) {
    document.querySelectorAll('.kw-check').forEach(cb => { cb.checked = on; updateRowClass(cb); });
}

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
        const sel = [];
        document.querySelectorAll('.kw-check:checked').forEach(cb =>
            sel.push(generatedKeywords[cb.getAttribute('data-idx')]));
        if (sel.length) {
            e.preventDefault();
            const ta = document.createElement('textarea');
            ta.value = sel.join('\n');
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert(sel.length + '개의 키워드가 복사되었습니다!');
        }
    }
});

/* ============================================================
   INIT
   ============================================================ */
window.onload = () => {
    createSlots();
    document.getElementById('slot_btn_1').classList.add('active');
    if (window.parent?.loadSeoData) window.parent.loadSeoData(1);
};
