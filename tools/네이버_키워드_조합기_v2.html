<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>네이버 플레이스 키워드 자동 생성기 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root {
    --primary: #3b5bdb;
    --primary-light: #4263eb;
    --primary-dark: #2f4ac7;
    --primary-bg: #edf2ff;
    --success: #2f9e44;
    --success-bg: #ebfbee;
    --danger: #e03131;
    --danger-bg: #fff5f5;
    --warning: #e67700;
    --warning-bg: #fff9db;
    --gray-50: #f8f9fa;
    --gray-100: #f1f3f5;
    --gray-200: #e9ecef;
    --gray-300: #dee2e6;
    --gray-400: #ced4da;
    --gray-500: #adb5bd;
    --gray-600: #868e96;
    --gray-700: #495057;
    --gray-800: #343a40;
    --gray-900: #212529;
    --cat-main: #1971c2;
    --cat-main-bg: #dbe4ff;
    --cat-tpo: #2f9e44;
    --cat-tpo-bg: #d3f9d8;
    --cat-feat: #d9480f;
    --cat-feat-bg: #ffe8cc;
    --cat-menu: #7048e8;
    --cat-menu-bg: #f3f0ff;
    --cat-drop: #868e96;
    --cat-drop-bg: #f1f3f5;
    --radius: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    color: var(--gray-800);
    line-height: 1.6;
}

.app-wrapper {
    max-width: 1160px;
    margin: 0 auto;
    padding: 24px 20px 60px;
}

/* ── 헤더 ── */
.app-header {
    background: linear-gradient(135deg, var(--primary) 0%, #5c7cfa 100%);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 8px 24px rgba(59,91,219,.3);
}
.app-header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
.app-header p  { font-size: 13px; opacity: .85; margin-top: 4px; }
.header-badge {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

/* ── 카드 ── */
.card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-bottom: 16px;
    overflow: hidden;
    border: 1px solid var(--gray-200);
}
.card-header {
    padding: 14px 20px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}
.card-header .subtitle { font-size: 12px; color: var(--gray-500); font-weight: 400; }
.card-body { padding: 20px; }

/* ── 입력 그리드 ── */
.input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 14px; }
.input-grid-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; margin-bottom: 14px; }

label.fl {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-700);
    margin-bottom: 6px;
}
textarea.ta {
    width: 100%;
    height: 108px;
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.7;
    color: var(--gray-800);
    transition: border-color .2s, box-shadow .2s;
}
textarea.ta:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59,91,219,.1);
}
textarea.ta.tall { height: 140px; }

.badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 5px;
}
.badge-req { background: #ffe3e3; color: #c92a2a; }
.badge-opt { background: #e3f2fd; color: #1565c0; }
.badge-ai  { background: var(--primary-bg); color: var(--primary); }

/* ── 설정 행 ── */
.setting-row {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 16px;
    background: var(--gray-50);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    flex-wrap: wrap;
    border: 1px solid var(--gray-200);
}
.setting-row label { font-weight: 700; white-space: nowrap; }
.setting-row input[type=number] {
    width: 80px;
    padding: 5px 8px;
    border: 1px solid var(--gray-300);
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
    outline: none;
    font-family: inherit;
}
.setting-row input[type=number]:focus { border-color: var(--primary); }
.setting-row .hint { font-size: 12px; color: var(--gray-500); }

/* ── API 키 입력 ── */
.api-key-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
}
.api-key-row label { font-size: 13px; font-weight: 700; color: #92400e; white-space: nowrap; }
.api-key-row input[type=text] {
    flex: 1;
    padding: 7px 12px;
    border: 1px solid #fcd34d;
    border-radius: 6px;
    font-size: 13px;
    font-family: monospace;
    outline: none;
    background: #fff;
}
.api-key-row input[type=text]:focus { border-color: var(--primary); }

/* ── 업종 카테고리 행 (파란 계열) ── */
.cat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #edf2ff;
    border: 1px solid #bac8ff;
    border-radius: 8px;
    flex-wrap: wrap;
}
.cat-row label { font-size: 13px; font-weight: 700; color: #1e3a8a; white-space: nowrap; }
.cat-row span  { font-size: 12px; color: #3b5bdb; }

/* ── 업종 카테고리 버튼 ── */
.cat-sel-btn {
    padding: 6px 16px;
    border: 1px solid #bac8ff;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    background: #fff;
    color: #3b5bdb;
    cursor: pointer;
    transition: .15s;
    white-space: nowrap;
}
.cat-sel-btn:hover:not(.active) { background: #dbe4ff; }
.cat-sel-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ── 버튼 ── */
.btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: .15s;
    white-space: nowrap;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(59,91,219,.3); }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-primary:active { transform: none; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #267a38; }
.btn-outline { background: #fff; color: var(--gray-700); border: 1px solid var(--gray-300); }
.btn-outline:hover { background: var(--gray-50); }
.btn-ai {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    box-shadow: 0 2px 10px rgba(102,126,234,.4);
}
.btn-ai:hover { opacity: .9; transform: translateY(-1px); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-full { width: 100%; padding: 15px; font-size: 16px; justify-content: center; }

/* ── 상태바 ── */
.status-bar {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
}
.status-bar.info    { background: var(--primary-bg); color: var(--primary-dark); border-left: 4px solid var(--primary); display: flex; }
.status-bar.success { background: var(--success-bg); color: var(--success); border-left: 4px solid var(--success); display: flex; }
.status-bar.error   { background: var(--danger-bg); color: var(--danger); border-left: 4px solid var(--danger); display: flex; }
.status-bar.warning { background: var(--warning-bg); color: var(--warning); border-left: 4px solid var(--warning); display: flex; }

/* ── 진행 표시 ── */
.progress-wrap { margin-bottom: 16px; display: none; }
.progress-wrap.show { display: block; }
.progress-steps {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
}
.p-step {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-400);
    background: var(--gray-100);
    border-right: 1px solid var(--gray-200);
    position: relative;
    transition: .3s;
}
.p-step:first-child { border-radius: 8px 0 0 8px; }
.p-step:last-child { border-radius: 0 8px 8px 0; border-right: none; }
.p-step.done { background: var(--success-bg); color: var(--success); }
.p-step.active { background: var(--primary-bg); color: var(--primary); }

/* ── 원본 데이터 뷰어 ── */
.raw-collapse {
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
}
.raw-collapse-header {
    padding: 10px 16px;
    background: var(--gray-50);
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
}
.raw-collapse-header:hover { background: var(--gray-100); }
.raw-collapse-body { display: none; padding: 12px 16px; }
.raw-collapse.open .raw-collapse-body { display: block; }
.raw-data-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 12px;
}
.raw-item {
    padding: 5px 10px;
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
}
.raw-item .raw-vol { font-size: 11px; color: var(--gray-500); }

/* ── AI 결과 카테고리 ── */
.ai-result-wrap { margin-bottom: 16px; }
.category-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}
.cat-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid transparent;
    transition: .15s;
}
.cat-tab.all     { background: var(--gray-200); color: var(--gray-700); }
.cat-tab.main    { background: var(--cat-main-bg); color: var(--cat-main); }
.cat-tab.tpo     { background: var(--cat-tpo-bg); color: var(--cat-tpo); }
.cat-tab.feat    { background: var(--cat-feat-bg); color: var(--cat-feat); }
.cat-tab.menu    { background: var(--cat-menu-bg); color: var(--cat-menu); }
.cat-tab.drop    { background: var(--cat-drop-bg); color: var(--cat-drop); }
.cat-tab.active  { border-color: currentColor; box-shadow: 0 0 0 3px rgba(0,0,0,.06); }

/* ── 결과 테이블 ── */
.result-box {
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    overflow: hidden;
}
.result-header {
    padding: 12px 16px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.result-header .result-title { font-weight: 700; font-size: 14px; }
.result-header .result-count { font-size: 12px; color: var(--gray-500); margin-left: 8px; }
.result-scroll { max-height: 480px; overflow-y: auto; }
.result-scroll table { width: 100%; border-collapse: collapse; }
.result-scroll th,
.result-scroll td { padding: 9px 14px; font-size: 13px; text-align: left; border-bottom: 1px solid #f4f4f5; }
.result-scroll th {
    background: var(--gray-50);
    font-weight: 700;
    color: var(--gray-600);
    font-size: 12px;
    position: sticky;
    top: 0;
    z-index: 2;
}
.result-scroll tr:hover td { background: #f7f9ff; }
.result-scroll tr.sel td { background: #fff9db !important; }

/* ── 카테고리 뱃지 ── */
.cat-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
}
.cb-main  { background: var(--cat-main-bg); color: var(--cat-main); }
.cb-tpo   { background: var(--cat-tpo-bg); color: var(--cat-tpo); }
.cb-feat  { background: var(--cat-feat-bg); color: var(--cat-feat); }
.cb-menu  { background: var(--cat-menu-bg); color: var(--cat-menu); }
.cb-drop  { background: var(--cat-drop-bg); color: var(--cat-drop); }

/* ── AI 분석 요약 ── */
.ai-summary {
    background: linear-gradient(135deg, #f0f3ff 0%, #f5f0ff 100%);
    border: 1px solid #c5d0ff;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--gray-700);
}
.ai-summary strong { color: var(--primary); }
.ai-summary-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
}

/* ── 로딩 스피너 ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
}

/* ── 반응형 ── */
@media (max-width: 768px) {
    .input-grid { grid-template-columns: repeat(2, 1fr); }
    .input-grid-2 { grid-template-columns: 1fr; }
    .app-header { flex-direction: column; gap: 12px; text-align: center; }
}
@media (max-width: 540px) {
    .input-grid { grid-template-columns: 1fr; }
    .app-wrapper { padding: 12px 12px 40px; }
}
</style>
</head>
<body>
<div class="app-wrapper">

<!-- 헤더 -->
<div class="app-header">
    <div>
        <h1>🗺️ 네이버 플레이스 키워드 자동 생성기</h1>
        <p>Naver API 대량 수집 → Gemini AI 분류 → 플레이스 최적화 키워드</p>
    </div>
</div>


<!-- ══════════════════════════════════════════
     TAB v2 — AI 자동 추출
══════════════════════════════════════════ -->
<div style="padding-top:16px;">

    <!-- 업종 카테고리 선택 -->
    <div class="cat-row">
        <label>🏪 업종 카테고리</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="cat-sel-btn active" onclick="selectCat('food',this)">음식점/카페</button>
            <button class="cat-sel-btn" onclick="selectCat('beauty',this)">미용/뷰티</button>
            <button class="cat-sel-btn" onclick="selectCat('medical',this)">병원/의료</button>
            <button class="cat-sel-btn" onclick="selectCat('none',this)">필터 X</button>
        </div>
        <span>업종에 맞는 키워드 필터와 AI 분류 기준이 자동 적용됩니다</span>
    </div>

    <!-- Gemini 모델 선택 -->
    <div class="api-key-row" style="margin-bottom:16px;">
        <label>🤖 Gemini 모델</label>
        <select id="gemini-model" style="flex:1;padding:7px 12px;border:1px solid #fcd34d;border-radius:6px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer;outline:none;">
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        </select>
        <span style="font-size:12px;color:#92400e;">오류 시 다른 모델로 전환해보세요</span>
    </div>

    <!-- 입력 카드 -->
    <div class="card">
        <div class="card-header">
            📝 매장 정보 입력
            <span class="subtitle">정확할수록 AI 분류 품질이 높아집니다</span>
        </div>
        <div class="card-body">
            <div class="input-grid">
                <div>
                    <label class="fl">지역명 <span class="badge badge-req">필수</span></label>
                    <textarea class="ta" id="inp-loc" placeholder="강남역&#10;역삼동"></textarea>
                </div>
                <div>
                    <label class="fl">업종 / 카테고리 <span class="badge badge-req">필수</span></label>
                    <textarea class="ta" id="inp-biz" placeholder="삼겹살&#10;고기집"></textarea>
                </div>
                <div>
                    <label class="fl">상세 주소 <span class="badge badge-ai">AI 분석</span></label>
                    <textarea class="ta" id="inp-address" placeholder="서울 강남구 역삼동 825-1&#10;(정확한 랜드마크 분석용)"></textarea>
                </div>
                <div>
                    <label class="fl">주요 메뉴 키워드 <span class="badge badge-ai">AI 매칭</span></label>
                    <textarea class="ta" id="inp-menu-kws" placeholder="오겹살&#10;꽃목살&#10;한우육회"></textarea>
                </div>
            </div>
            <div style="margin-bottom:14px;">
                <label class="fl">매장 특징 <span class="badge badge-opt">선택</span></label>
                <textarea class="ta" id="inp-feature" placeholder="직접 구워주는 서비스&#10;콜키지 프리&#10;룸 식당 (단체 회식)&#10;애견 동반 가능&#10;주차 2시간 무료"></textarea>
            </div>
            <div class="setting-row">
                <label>최소 모바일 검색량</label>
                <input type="number" id="inp-min" value="0" min="0">
                <span class="hint" style="margin-right:24px;">0 = 전체 수집</span>
                <label>목표 키워드 수</label>
                <input type="number" id="inp-target" value="50" min="0">
                <span class="hint">0으로 설정하면 수량 제한 없이 전체 분류합니다</span>
            </div>
            <button class="btn btn-primary btn-full" onclick="runV2()">
                <span id="run-btn-text">🔍 API 수집 후 AI 분류 시작</span>
            </button>
        </div>
    </div>

    <!-- 상태바 -->
    <div class="status-bar" id="v2-status"></div>

    <!-- 진행 단계 -->
    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-steps">
            <div class="p-step" id="pstep-1">① Naver API 수집</div>
            <div class="p-step" id="pstep-2">② 중복 제거</div>
            <div class="p-step" id="pstep-3">③ Gemini AI 분류</div>
            <div class="p-step" id="pstep-4">④ 결과 출력</div>
        </div>
    </div>

    <!-- 결과 영역 -->
    <div id="v2-result"></div>

</div><!-- /tab-v2 -->



</div><!-- /.app-wrapper -->

<script>
/* ============================================================
   공통 유틸
   ============================================================ */
/* ── Gemini 프록시 (키는 서버에서 관리) ── */
const GEMINI_PROXY = 'https://naver-keyword-bot-938928195180.asia-northeast3.run.app/gemini';

const sleep      = ms => new Promise(r => setTimeout(r, ms));
const splitLines = t  => t.split('\n').map(s => s.trim()).filter(Boolean);


function setStatus(type, msg) {
    const el = document.getElementById('v2-status');
    el.className = 'status-bar ' + type;
    el.innerHTML = msg;
}

function setStep(n) {
    for (let i = 1; i <= 4; i++) {
        const el = document.getElementById('pstep-' + i);
        el.className = 'p-step' + (i < n ? ' done' : i === n ? ' active' : '');
    }
}

const PROXY_URL = 'https://naver-keyword-bot-938928195180.asia-northeast3.run.app/relkwd';

async function callNaverAPI(hints) {
    const qs   = new URLSearchParams({ hintKeywords: hints.join(',') });
    const resp = await fetch(`${PROXY_URL}?${qs}`);
    if (!resp.ok) throw new Error(`Naver API 오류 ${resp.status}: ${(await resp.text()).slice(0, 160)}`);
    return (await resp.json()).keywordList || [];
}

async function callGeminiAPI(kwList, storeInfo, batchTarget = 0) {

    const kwLines = kwList.map((k, i) =>
        `${i + 1}. ${k.relKeyword} (모바일검색량:${k.monthlyMobileQcCnt || 0})`
    ).join('\n');

    // ── 시스템 프롬프트 (반복 지시사항 분리 → 응답 속도 향상) ──
    const systemInstruction = {
        parts: [{ text: `당신은 네이버 플레이스 검색 최적화 전문가입니다.${storeInfo.catLabel ? `\n이 매장의 업종은 [${storeInfo.catLabel}]입니다. 해당 업종에 최적화된 기준으로 키워드를 판별하세요.` : ''}
사용자가 제공한 [상세 주소]와 [주요 키워드]를 분석하여, 수집된 키워드들의 '매장 적합도'를 판별하세요.

위치 필터링: 상세 주소를 기반으로 도보 10분 내외 지역 키워드에 가중치를 부여하고, 너무 먼 지역 키워드는 DROP으로 처리하세요.
키워드 매칭: 입력된 주요 키워드와 연관성이 높은 검색어는 점수를 높게 부여하고, 매장에서 취급하지 않는 키워드는 DROP으로 처리하세요.
적합도 기준: 점수가 높은 순서대로 MAIN → TPO → FEAT → MENU 순으로 배치하고, 매장과 무관한 키워드는 과감히 DROP으로 분류하세요.

키워드를 아래 5개 카테고리 중 하나로 분류하세요.
- MAIN: 지역+업종 조합의 핵심 키워드 (도보 10분 내 지역 + 업종 매칭)
- TPO: 방문 목적/상황 (회식, 데이트, 모임, 기념일 등 업종별 상황)
- FEAT: 매장 특징/시설 (주차, 룸, 단체, 야외 등 업종별 특징)
- MENU: 세부 서비스/메뉴 키워드 (입력된 주요 키워드와 연관성 높은 것 우선)
- DROP: 매장과 무관하거나 너무 먼 지역의 키워드

출력 규칙:
- 순수 JSON만 출력하라. 설명·백틱·마크다운 절대 금지.
- 모든 문자열은 큰따옴표(")를 사용하라.
- trailing comma 금지.
- category는 반드시 MAIN/TPO/FEAT/MENU/DROP 중 하나.
- 입력된 모든 키워드를 빠짐없이 완전하게 출력하라.
스키마: {"summary":"2-3문장 한국어 요약","keywords":[{"id":1,"keyword":"...","category":"MAIN","searchVolume":12000}]}` }]
    };

    const userPrompt = `[매장 정보]
- 지역(중심): ${storeInfo.locs.join(', ')}
- 상세 주소: ${storeInfo.address || '없음'}
- 업종: ${storeInfo.biz.join(', ')}
- 주요 메뉴: ${storeInfo.menuKws.join(', ') || '없음'}
- 매장 특징: ${storeInfo.features.join(', ') || '없음'}

[분류 지시사항]
1. 상세 주소를 기반으로 반경 내 랜드마크와 무관한 지역 키워드는 제외하라.
2. 입력된 메뉴 키워드와 식재료/요리 방식이 일치하지 않는 키워드는 제외하라.
3. 적합도가 높은 키워드만 MAIN, TPO, FEAT, MENU로 분류하라.${batchTarget > 0 ? `
4. 이 배치에서 적합한 키워드를 최대 ${batchTarget}개만 선별하라. 나머지는 응답에 포함하지 마라. DROP 카테고리는 출력하지 마라.` : ''}

[분류할 키워드 목록]
${kwLines}`;

    const body = {
        system_instruction: systemInstruction,
        contents: [{ parts: [{ text: userPrompt }] }],
        generationConfig: {
            temperature: 0.1,
            topP: 0.8,
            maxOutputTokens: 16384,
            responseMimeType: "application/json",
        }
    };

    const resp = await fetch(GEMINI_PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...body, model: getGeminiModel() }),
    });

    if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        const msg = err?.error?.message || '알 수 없는 오류';
        throw new Error('Gemini API 오류 ' + resp.status + ': ' + msg.slice(0, 120));
    }

    const data = await resp.json();

    // finishReason 확인 — MAX_TOKENS면 응답이 잘린 것
    const finishReason = data?.candidates?.[0]?.finishReason;
    if (finishReason === 'MAX_TOKENS') {
        throw new Error('응답이 토큰 한도로 잘렸습니다. 배치 크기가 너무 큽니다.');
    }

    // ── 파싱 (5단계 폴백) ──
    let parsed;
    try {
        const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text ?? JSON.stringify(data);

        // 1단계: 코드블록·trailing comma 정제
        let cleaned = raw
            .replace(/^```(?:json)?\s*/i, '')
            .replace(/\s*```\s*$/, '')
            .replace(/,\s*([\}\]])/g, '$1')
            .trim();

        // 2단계: 최외곽 {} 추출
        const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('JSON 블록 없음: ' + cleaned.slice(0, 200));
        cleaned = jsonMatch[0];

        // 3단계: 직접 파싱
        try {
            parsed = JSON.parse(cleaned);
        } catch (e1) {
            // 4단계: 제어문자 이스케이프 후 재시도
            const sanitized = cleaned
                .replace(/[\u0000-\u001F\u007F]/g, m =>
                    ({ '\n': '\\n', '\r': '\\r', '\t': '\\t' }[m] || ''))
                .replace(/,\s*([\}\]])/g, '$1');
            try {
                parsed = JSON.parse(sanitized);
            } catch (e2) {
                // 5단계: keywords 배열 부분 추출
                const summaryMatch = cleaned.match(/"summary"\s*:\s*"((?:[^"\\]|\\.)*)"/);
                const kwStart = cleaned.indexOf('"keywords"');
                if (kwStart === -1) throw new Error('keywords 키 없음: ' + e2.message);
                const arrStart = cleaned.indexOf('[', kwStart);
                if (arrStart === -1) throw new Error('keywords 배열 시작 없음');
                const partialArr = cleaned.slice(arrStart);
                const objects = [];
                const objRe = /\{[^{}]*"id"\s*:\s*\d+[^{}]*\}/g;
                let m2;
                while ((m2 = objRe.exec(partialArr)) !== null) {
                    try { objects.push(JSON.parse(m2[0])); } catch (_) {}
                }
                if (objects.length === 0) throw new Error('파싱 최종 실패: ' + e2.message);
                parsed = { summary: summaryMatch ? summaryMatch[1] : '', keywords: objects };
                setStatus('warning', `⚠️ JSON 일부 손상 — ${objects.length}개 키워드만 복구했습니다.`);
            }
        }
    } catch (parseErr) {
        throw new Error('Gemini 응답 파싱 실패: ' + parseErr.message
            + '\n원문 앞부분: ' + JSON.stringify(data).slice(0, 300));
    }

    if (!Array.isArray(parsed.keywords)) {
        throw new Error('Gemini 응답에 keywords 배열이 없습니다: ' + JSON.stringify(parsed).slice(0, 200));
    }

    return parsed;
}

/* ============================================================
   V2 — 배치 Gemini 호출 (500개 초과시 분할)
   ============================================================ */
async function callGeminiBatched(dedupedList, storeInfo, targetCount = 0) {
    const BATCH       = 50;
    const CONCURRENCY = 3;

    const chunks = [];
    for (let i = 0; i < dedupedList.length; i += BATCH) {
        chunks.push(dedupedList.slice(i, i + BATCH));
    }

    const targetLabel = targetCount > 0 ? ` / 목표 ${targetCount}개` : '';
    setStatus('info', `🤖 Gemini AI 분류 시작 — ${chunks.length}개 배치 (배치당 ${BATCH}개${targetLabel})`);

    let mergedKeywords = [];
    let lastSummary    = '';
    let done           = 0;

    for (let i = 0; i < chunks.length; i += CONCURRENCY) {
        // 목표 달성 시 조기 종료
        if (targetCount > 0 && mergedKeywords.length >= targetCount) {
            setStatus('info', `✅ 목표 ${targetCount}개 달성 — 나머지 배치 건너뜀`);
            break;
        }

        const alreadyHave = mergedKeywords.length;
        const remaining   = targetCount > 0 ? Math.max(1, targetCount - alreadyHave) : 0;

        const group = chunks.slice(i, i + CONCURRENCY);
        try {
            const results = await Promise.all(
                group.map(chunk => callGeminiAPI(chunk, storeInfo, remaining))
            );
            for (const result of results) {
                mergedKeywords.push(...(result.keywords || []));
                lastSummary = result.summary || lastSummary;
            }
        } catch (err) {
            setStatus('warning', `⚠️ AI 오류 발생 — 지금까지 확보된 ${mergedKeywords.length}개 결과를 표시합니다. (${err.message})`);
            break;
        }
        done += group.length;
        setStatus('info', `🤖 AI 분류 진행 중... [${done}/${chunks.length}배치 — ${mergedKeywords.length}개 확보${targetLabel}]`);
        if (i + CONCURRENCY < chunks.length) await sleep(500);
    }

    // ID 재정렬
    mergedKeywords = mergedKeywords.map((k, idx) => ({ ...k, id: idx + 1 }));
    return { summary: lastSummary, keywords: mergedKeywords };
}

    const uniqueSeeds = [...new Set(seeds)];

    setStatus('info', `🔄 중복 제거 및 필터링 중... (수집: ${allKwList.length}개)`);

    // ── 타 지역 필터: 입력 지역 외 지역명 포함 키워드 제거 ──
    const ALL_REGIONS = [
        '서울','부산','대구','인천','광주','대전','울산','세종','수원','고양','용인','창원','성남','부천','화성','안산','안양','남양주','천안','전주','청주','김해','시흥','파주','원주','평택','의정부','포항','제주','춘천','목포','군산','여수','순천','구미','경주','거제','통영','양산','김포','하남','광명','광주시','이천','태안','아산','논산','공주','보령','충주','제천','강릉','동해','속초','삼척','태백','정선','의왕','과천','오산','안성','양주','구리','광양','나주','익산','정읍','남원','김제','완주','진주','사천','밀양','함안','합천','거창','고성','남해','하동','산청','의령','함양','창녕','고령','성주','칠곡','영천','경산','군위','의성','청송','영양','영덕','청도','고령','성주','칠곡','예천','봉화','울진','울릉','강화','옹진',
        // 서울 구
        '강남','강동','강북','강서','관악','광진','구로','금천','노원','도봉','동대문','동작','마포','서대문','서초','성동','성북','송파','양천','영등포','용산','은평','종로','중구','중랑',
        // 부산 구
        '해운대','수영','연제','동래','남구','북구','사하','사상','강서','기장','금정','동구','서구','영도','중구',
        // 주요 역/동 (수도권)
        '홍대','신촌','합정','망원','연남','상수','이태원','한남','압구정','청담','신사','논현','반포','잠원','방배','사당','낙성대','봉천','신림','여의도','영등포','구로디지털','가산','독산','시흥','금천','석촌','송리단','잠실','문정','가락','천호','성내','둔촌','고덕','명일','길동','강일','미사','하남','위례','판교','분당','정자','수내','미금','오리','야탑','모란','복정','수서','일원','대치','도곡','개포','구룡','학동','역삼','선릉','삼성','봉은사','코엑스','교대','방배','이수','총신대','사당','낙성대','서울대입구','신대방','신림','보라매','대림','구로','신도림','문래','영등포구청','당산','합정','망원','마포','공덕','애오개','충정로','서울역','남영','용산','이촌','동작','노량진','대방','신길','여의도','샛강','당산','선유도','양평','영등포','신도림',
        // 경기 주요 시
        '수원','성남','안양','부천','광명','평택','동두천','안산','고양','과천','구리','남양주','오산','시흥','군포','의왕','하남','용인','파주','이천','안성','김포','화성','광주','양주','포천','여주','연천','가평','양평',
        // 인천 구
        '계양','남동','동구','미추홀','부평','서구','연수','중구','강화','옹진',
    ];

    // 입력 지역 토큰 (공백 분리 + 개별 단어)
    const inputRegionTokens = new Set(
        v2Locs.flatMap(r => r.split(/\s+/)).map(r => r.replace(/[역동구시군]$/, '').trim()).filter(Boolean)
    );
    // 입력 지역 원본도 포함
    v2Locs.forEach(r => inputRegionTokens.add(r.trim()));

    // 입력 지역과 무관한 지역명 목록
    const foreignRegions = ALL_REGIONS.filter(r => {
        const base = r.replace(/[역동구시군]$/, '');
        return ![...inputRegionTokens].some(t => t.includes(base) || base.includes(t));
    });
    const foreignRegionRe = new RegExp(foreignRegions.map(r => r.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|'));

    // ── 업종 카테고리 필터 설정 로드 ──
    const catCfg    = CATEGORY_CONFIG[selectedCat] || CATEGORY_CONFIG.none;
    const catWhite  = catCfg.whitelist;
    const catBlack  = catCfg.blacklist;

    const seen = new Set();
    const dedupedList = [];
    let filteredRegion = 0, filteredUnrelated = 0;
    for (const item of allKwList) {
        const kw  = (item.relKeyword || '').trim();
        const mob = parseInt(item.monthlyMobileQcCnt) || 0;
        if (!kw || seen.has(kw)) continue;
        if (mob < minM) continue;
        // 타 지역 필터
        if (foreignRegions.length && foreignRegionRe.test(kw)) { filteredRegion++; continue; }
        // 무관 업종 필터 — 화이트리스트 단어 포함 시 블랙리스트 무시
        if (catBlack && (!catWhite || !catWhite.test(kw)) && catBlack.test(kw)) { filteredUnrelated++; continue; }
        seen.add(kw);
        dedupedList.push({ relKeyword: kw, monthlyMobileQcCnt: mob });
    }

    v2RawList = dedupedList;
    setStatus('info', `✅ 필터링 완료 — 수집 ${allKwList.length}개 → 타지역 제거 ${filteredRegion}개 / 무관업종 제거 ${filteredUnrelated}개 → ${dedupedList.length}개 AI 전송`);

    // ─ STEP 3: Gemini AI 분류 ─
    setStep(3);
    const targetLabel = targetCount > 0 ? ` (목표: ${targetCount}개)` : '';
    setStatus('info', `🤖 Gemini AI 분류 중... (${dedupedList.length}개 키워드 분석${targetLabel})`);
    const storeInfo = { locs: v2Locs, biz: v2Biz, features: v2Features, address: v2Address, menuKws: v2MenuKws, catLabel: catCfg.label };
    const geminiResult = await callGeminiBatched(dedupedList, storeInfo, targetCount);

    if (!geminiResult.keywords.length) {
        setStatus('error', '❌ 분류된 키워드가 없습니다. 다른 모델을 선택하거나 잠시 후 다시 시도해보세요.');
        resetBtn();
        return;
    }

    v2AiResult = geminiResult.keywords || [];

    // ─ STEP 4: 결과 렌더링 ─
    setStep(4);
    renderV2Result(geminiResult);
    setStatus('success',
        `✅ 완료 — Naver 수집 ${allKwList.length}개 → 정리 ${dedupedList.length}개 → AI 분류 ${v2AiResult.length}개`);
    resetBtn();
}

function resetBtn() {
    isRunning = false;
    document.getElementById('run-btn-text').innerHTML = '🔍 API 수집 후 AI 분류 시작';
}

/* ============================================================
   V2 — 결과 렌더링
   ============================================================ */
const CAT_META = {
    MAIN: { cls: 'cb-main', label: '메인',   tabCls: 'main',  name: '🔵 메인 키워드' },
    TPO:  { cls: 'cb-tpo',  label: 'TPO',    tabCls: 'tpo',   name: '🟢 방문목적(TPO)' },
    FEAT: { cls: 'cb-feat', label: '시설/특징', tabCls: 'feat', name: '🟠 시설·특징' },
    MENU: { cls: 'cb-menu', label: '메뉴',   tabCls: 'menu',  name: '🟣 메뉴 특화' },
    DROP: { cls: 'cb-drop', label: '제외',   tabCls: 'drop',  name: '⚫ 제외 키워드' },
};

function renderV2Result(geminiResult) {
    currentFilter = 'all';
    const allKws = v2AiResult;

    // 카테고리별 카운트
    const counts = { all: allKws.length, MAIN: 0, TPO: 0, FEAT: 0, MENU: 0, DROP: 0 };
    allKws.forEach(k => { if (counts[k.category] !== undefined) counts[k.category]++; });

    // 카테고리 탭
    const tabsHTML = `
        <div class="category-tabs" id="cat-tabs">
            <div class="cat-tab all active" onclick="filterCat('all')">전체 <b>${counts.all}</b></div>
            <div class="cat-tab main" onclick="filterCat('MAIN')">🔵 메인 <b>${counts.MAIN}</b></div>
            <div class="cat-tab tpo"  onclick="filterCat('TPO')">🟢 TPO <b>${counts.TPO}</b></div>
            <div class="cat-tab feat" onclick="filterCat('FEAT')">🟠 시설·특징 <b>${counts.FEAT}</b></div>
            <div class="cat-tab menu" onclick="filterCat('MENU')">🟣 메뉴 <b>${counts.MENU}</b></div>
            <div class="cat-tab drop" onclick="filterCat('DROP')">⚫ 제외 <b>${counts.DROP}</b></div>
        </div>`;

    // AI 요약
    const summaryHTML = geminiResult.summary ? `
        <div class="ai-summary">
            <div class="ai-summary-title">🤖 AI 분석 요약</div>
            ${geminiResult.summary}
        </div>` : '';

    // 원본 데이터 뷰어
    const rawItemsHTML = v2RawList.map(k =>
        `<div class="raw-item"><span>${k.relKeyword}</span><span class="raw-vol">${Number(k.monthlyMobileQcCnt).toLocaleString()}</span></div>`
    ).join('');

    const rawViewHTML = `
        <div class="raw-collapse" id="raw-collapse">
            <div class="raw-collapse-header" onclick="toggleRaw()">
                📦 Naver 수집 원본 데이터 (${v2RawList.length}개) — 클릭하여 펼치기/접기
                <span id="raw-arrow">▼</span>
            </div>
            <div class="raw-collapse-body">
                <div class="raw-data-grid">${rawItemsHTML}</div>
            </div>
        </div>`;

    // 결과 테이블
    const tableHTML = buildTable(allKws);

    document.getElementById('v2-result').innerHTML = `
        ${summaryHTML}
        ${rawViewHTML}
        <div class="ai-result-wrap">
            ${tabsHTML}
            <div class="result-box" id="result-box">
                <div class="result-header">
                    <div>
                        <span class="result-title">📋 AI 분류 결과</span>
                        <span class="result-count" id="result-count">${allKws.length}개</span>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                        <label style="font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:bold;">
                            <input type="checkbox" id="v2-all" onchange="v2AllToggle(this.checked)"> 전체
                        </label>
                        <button class="btn btn-outline btn-sm" onclick="v2Copy()">📋 복사</button>
                        <button class="btn btn-success btn-sm" onclick="v2CSV()">⬇️ CSV</button>
                    </div>
                </div>
                <div class="result-scroll" id="result-table-wrap">
                    ${tableHTML}
                </div>
            </div>
        </div>`;
}

function buildTable(kws) {
    const filtered = currentFilter === 'all' ? kws : kws.filter(k => k.category === currentFilter);
    document.getElementById('result-count') && (document.getElementById('result-count').textContent = filtered.length + '개');

    const rows = filtered.map((k, i) => {
        const meta = CAT_META[k.category] || CAT_META.DROP;
        return `<tr id="vr${i}">
            <td style="width:40px;text-align:center;"><input type="checkbox" class="v2ck" data-i="${i}" data-kw="${escHtml(k.keyword)}" onclick="v2Ck(event,this)"></td>
            <td style="width:44px;color:#bbb;font-size:12px;">${i + 1}</td>
            <td><strong>${escHtml(k.keyword)}</strong></td>
            <td style="width:80px;text-align:right;color:var(--gray-600);font-size:12px;">${Number(k.searchVolume || 0).toLocaleString()}</td>
            <td style="width:110px;"><span class="cat-badge ${meta.cls}">${meta.label}</span></td>
        </tr>`;
    }).join('');

    return `<table>
        <thead><tr>
            <th style="width:40px;"></th>
            <th style="width:44px;">번호</th>
            <th>키워드</th>
            <th style="width:80px;text-align:right;">검색량</th>
            <th style="width:110px;">카테고리</th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="text-align:center;padding:30px;color:#aaa;">해당 카테고리의 키워드가 없습니다.</td></tr>'}</tbody>
    </table>`;
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filterCat(cat) {
    currentFilter = cat;
    v2LastCk = null;
    // 탭 active 업데이트
    document.querySelectorAll('.cat-tab').forEach(el => {
        const elCat = el.getAttribute('onclick').match(/'([^']+)'/)?.[1];
        el.classList.toggle('active', elCat === cat);
    });
    const wrap = document.getElementById('result-table-wrap');
    if (wrap) {
        wrap.innerHTML = buildTable(v2AiResult);
        document.getElementById('result-count').textContent =
            (currentFilter === 'all' ? v2AiResult : v2AiResult.filter(k => k.category === cat)).length + '개';
    }
}

function toggleRaw() {
    const el = document.getElementById('raw-collapse');
    const ar = document.getElementById('raw-arrow');
    el.classList.toggle('open');
    ar.textContent = el.classList.contains('open') ? '▲' : '▼';
}

/* ============================================================
   V2 — 체크 / 복사 / CSV
   ============================================================ */
function v2Ck(e, cb) {
    const all = [...document.querySelectorAll('.v2ck')];
    if (e.shiftKey && v2LastCk) {
        const a = all.indexOf(v2LastCk), b = all.indexOf(cb);
        all.slice(Math.min(a, b), Math.max(a, b) + 1).forEach(c => { c.checked = v2LastCk.checked; v2RowSel(c); });
    }
    v2LastCk = cb;
    v2RowSel(cb);
}
function v2RowSel(cb) {
    document.getElementById('vr' + cb.dataset.i)?.classList.toggle('sel', cb.checked);
}
function v2AllToggle(on) {
    document.querySelectorAll('.v2ck').forEach(cb => { cb.checked = on; v2RowSel(cb); });
}
function v2SelKws() {
    return [...document.querySelectorAll('.v2ck:checked')].map(cb => cb.dataset.kw);
}
function v2Copy() {
    const sel = v2SelKws();
    if (!sel.length) { alert('선택된 항목이 없습니다.'); return; }
    navigator.clipboard.writeText(sel.join('\n')).then(() => alert(`${sel.length}개 복사 완료!`));
}
function v2CSV() {
    const filtered = currentFilter === 'all' ? v2AiResult : v2AiResult.filter(k => k.category === currentFilter);
    const sel = v2SelKws();
    let src;
    if (sel.length) {
        const selSet = new Set(sel);
        src = filtered.filter(k => selSet.has(k.keyword));
    } else {
        src = filtered;
    }
    const csv = [['키워드','카테고리','검색량(모바일)'],
        ...src.map(k => [k.keyword, k.category, k.searchVolume || 0])]
        .map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv' })),
        download: `플레이스키워드_${new Date().toISOString().slice(0, 10)}.csv`,
    });
    a.click();
}


/* ============================================================
   INIT
   ============================================================ */
window.onload = () => {
    createSlots();
    document.getElementById('slot_btn_1').classList.add('active');
    if (window.parent?.loadSeoData) window.parent.loadSeoData(1);
};
