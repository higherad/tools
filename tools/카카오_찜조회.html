<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카카오 선물하기 찜 조회</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --kakao-yellow: #FEE500;
            --kakao-yellow-dim: rgba(254,229,0,.35);
            --brown: #3C1E1E;
            --bg: #FFFBEF;
            --card: #ffffff;
            --border: #F1E7C6;
            --text: #2b2b2b;
            --muted: #8a8578;
            --heart: #FF5C7A;
            --heart-dim: rgba(255,92,122,.12);
            --bad: #e0524a;
            --bad-dim: rgba(224,82,74,.10);
            --font-ui: 'Pretendard', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--text);
            padding: 48px 20px;
            min-height: 100vh;
        }

        .bubble {
            max-width: 780px;
            margin: auto;
            background: var(--card);
            border-radius: 28px;
            padding: 36px 36px 30px;
            box-shadow: 0 2px 6px rgba(60,30,0,.05), 0 16px 40px rgba(60,30,0,.08);
        }

        .head-row { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .badge {
            flex: none;
            width: 52px; height: 52px;
            border-radius: 16px;
            background: var(--kakao-yellow);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .badge .pulse { animation: heartbeat 1.6s ease-in-out infinite; display: inline-block; }
        h1 { font-size: 20px; font-weight: 800; margin: 0 0 2px; color: var(--brown); }
        .sub { font-size: 13px; color: var(--muted); }

        label.field-label {
            display: block;
            font-size: 12px; font-weight: 700; color: var(--brown);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%; height: 150px;
            padding: 16px 18px;
            background: #FFFDF6;
            border: 2px solid var(--border);
            border-radius: 18px;
            resize: none;
            font-family: var(--font-ui);
            font-size: 13.5px;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 18px;
        }
        textarea::placeholder { color: #c9c2a8; }
        textarea:focus {
            outline: none;
            border-color: var(--kakao-yellow);
            box-shadow: 0 0 0 4px var(--kakao-yellow-dim);
        }

        .action-row { display: flex; gap: 10px; margin-bottom: 22px; }
        .btn {
            padding: 15px;
            border-radius: 999px;
            font-size: 14.5px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform .1s ease, filter .15s ease;
        }
        .btn:active { transform: scale(.98); }
        .btn-main { flex: 1; background: var(--kakao-yellow); color: var(--brown); }
        .btn-main:hover { filter: brightness(.96); }
        .btn-main:disabled { background: #f1eee3; color: #b7b1a0; cursor: not-allowed; }
        .btn-ghost { background: #f6f3e8; color: var(--brown); padding: 15px 20px; }
        .btn-ghost:hover { background: #efe9d6; }

        .status-line {
            font-size: 13px; color: var(--muted); margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px; min-height: 18px;
        }
        .spinner {
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid var(--border); border-top-color: var(--heart);
            animation: spin .7s linear infinite; display: none;
        }
        .status-line.loading .spinner { display: inline-block; }

        .result-list { display: flex; flex-direction: column; gap: 8px; }
        .result-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            background: #FFFDF6;
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        .r-idx { color: #c9c2a8; font-size: 12px; font-weight: 700; padding-top: 2px; flex: none; }
        .r-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
        .r-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .r-store {
            font-size: 11px; font-weight: 800; color: var(--brown);
            background: var(--kakao-yellow-dim); padding: 2px 9px; border-radius: 999px; white-space: nowrap;
        }
        .r-subtitle { font-size: 11.5px; color: var(--muted); }
        .r-name { font-size: 13.5px; font-weight: 700; color: var(--text); }
        .r-name a { color: var(--text); text-decoration: none; }
        .r-name a:hover { color: var(--heart); text-decoration: underline; }
        .r-bottom { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
        .r-rating-group { display: flex; align-items: center; gap: 6px; }
        .r-rating { font-size: 12px; color: #e8a33d; letter-spacing: 1px; }
        .r-review { font-size: 11.5px; color: var(--muted); }
        .r-right-group { display: flex; align-items: center; gap: 8px; }
        .r-price { font-size: 13px; font-weight: 800; color: var(--brown); white-space: nowrap; }
        .r-count {
            display: flex; align-items: center; gap: 5px;
            background: var(--heart-dim); color: var(--heart);
            font-weight: 800; font-size: 13px;
            padding: 5px 12px; border-radius: 999px; white-space: nowrap;
        }
        .r-status { font-size: 11.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .r-status.err { background: var(--bad-dim); color: var(--bad); }

        @keyframes heartbeat { 0%,100% { transform: scale(1); } 25% { transform: scale(1.15); } 40% { transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="bubble">
    <div class="head-row">
        <div class="badge"><span class="pulse">💛</span></div>
        <div>
            <h1>카카오 선물하기 찜 조회</h1>
            <div class="sub">상품 URL을 넣으면 하트(찜) 수를 긁어옵니다</div>
        </div>
    </div>

    <label class="field-label">상품 URL (한 줄에 하나씩)</label>
    <textarea id="urlList" placeholder="https://gift.kakao.com/product/7630727&#10;https://gift.kakao.com/product/1234567"></textarea>

    <div class="action-row">
        <button id="startBtn" class="btn btn-main" onclick="processBatch()">🔍 찜 수 조회하기</button>
        <button id="copyBtn" class="btn btn-ghost" onclick="copyTable()" style="display:none;">📋 복사</button>
    </div>

    <div id="status" class="status-line"><span class="spinner"></span><span id="statusText"></span></div>

    <div id="resultList" class="result-list"></div>
</div>

<script>
    const SERVER = 'https://macro-11-kko-wish-938928195180.asia-northeast3.run.app';

    async function processBatch() {
        const input = document.getElementById('urlList').value.trim();
        if (!input) return alert("URL을 입력해주세요.");

        const urls = input.split('\n').map(u => u.trim()).filter(u => u);

        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        startBtn.disabled = true;
        document.getElementById('copyBtn').style.display = 'none';
        document.getElementById('resultList').innerHTML = '';
        statusEl.classList.add('loading');
        document.getElementById('statusText').textContent = `${urls.length}개 조회 중...`;

        try {
            const res = await fetch(`${SERVER}/wish-counts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls }),
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.message || '조회 실패');

            const list = document.getElementById('resultList');
            data.results.forEach((r, i) => {
                const ok = r.error === null;
                const nameHtml = r.name
                    ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.name)}</a>`
                    : esc(r.url);
                const bottomHtml = ok ? `
                    <div class="r-bottom">
                        <span class="r-rating-group">
                            <span class="r-rating">${renderStars(r.rating)}</span>
                            <span class="r-review">${r.reviewCount != null ? `${r.reviewCount}건의 선물후기` : ''}</span>
                        </span>
                        <span class="r-right-group">
                            <span class="r-price">${r.price != null ? `${r.price.toLocaleString()}원` : '-'}</span>
                            <span class="r-count">💛 ${r.count.toLocaleString()}</span>
                        </span>
                    </div>` : `<div class="r-status err">${esc(r.error)}</div>`;
                list.insertAdjacentHTML('beforeend', `
                    <div class="result-row">
                        <div class="r-idx">${i + 1}</div>
                        <div class="r-body">
                            <div class="r-top">
                                ${r.store ? `<span class="r-store">${esc(r.store)}</span>` : ''}
                                ${r.subtitle ? `<span class="r-subtitle">${esc(r.subtitle)}</span>` : ''}
                            </div>
                            <div class="r-name" title="${esc(r.name || r.url)}">${nameHtml}</div>
                            ${bottomHtml}
                        </div>
                    </div>`);
            });

            document.getElementById('statusText').textContent = `완료 — 총 ${urls.length}개`;
        } catch (e) {
            document.getElementById('statusText').textContent = `오류: ${e.message}`;
        } finally {
            statusEl.classList.remove('loading');
            startBtn.disabled = false;
            document.getElementById('copyBtn').style.display = 'flex';
        }
    }

    function copyTable() {
        let text = "번호\t스토어명\t카테고리\t상품명\t평점\t리뷰 수\t가격\t찜(하트) 수\t상태\n";
        document.querySelectorAll("#resultList .result-row").forEach(row => {
            const idx = row.querySelector('.r-idx').innerText;
            const store = row.querySelector('.r-store')?.innerText || '';
            const subtitle = row.querySelector('.r-subtitle')?.innerText || '';
            const name = row.querySelector('.r-name').innerText;
            const statusEl = row.querySelector('.r-status');
            if (statusEl) {
                text += `${idx}\t${store}\t${subtitle}\t${name}\t-\t-\t-\t-\t${statusEl.innerText}\n`;
                return;
            }
            const rating = row.querySelector('.r-rating').innerText;
            const review = row.querySelector('.r-review').innerText.replace('건의 선물후기', '').trim();
            const price = row.querySelector('.r-price').innerText.replace('원', '').trim();
            const cnt = row.querySelector('.r-count').innerText.replace('💛', '').trim();
            text += `${idx}\t${store}\t${subtitle}\t${name}\t${rating}\t${review}\t${price}\t${cnt}\t성공\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            alert("결과가 클립보드에 복사되었습니다. 엑셀에 바로 붙여넣으세요!");
        });
    }

    function renderStars(rating) {
        if (rating == null) return '';
        const full = Math.round(rating);
        return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

</body>
</html>
