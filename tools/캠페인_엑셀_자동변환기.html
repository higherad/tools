<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠페인 엑셀 자동 변환기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#0d0d0f;--sur:#16161a;--sur2:#1e1e24;--brd:#2a2a35;--acc:#00e5ff;--tx:#e8e8f0;--txd:#7a7a9a;--red:#ef4444;--grn:#10b981;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:80px;}

.hdr{background:linear-gradient(135deg,#0d0d0f,#1a0a2e 50%,#0d0d0f);border-bottom:1px solid var(--brd);padding:22px 36px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;top:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(0,229,255,.07) 0%,transparent 70%);pointer-events:none;}
.hdr-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--acc),#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;box-shadow:0 0 16px rgba(0,229,255,.2);}
.hdr h1{font-size:19px;font-weight:700;letter-spacing:-.5px;}
.hdr p{font-size:12px;color:var(--txd);margin-top:2px;}
.ver{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);border:1px solid rgba(0,229,255,.3);padding:3px 9px;border-radius:20px;}

.wrap{max-width:1450px;margin:0 auto;padding:24px 36px;}

.panel{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.ph{padding:12px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;background:var(--sur2);}
.ph h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ph .m{margin-left:auto;font-size:11px;color:var(--txd);font-family:'JetBrains Mono',monospace;}
.pb{padding:18px;}

/* upload */
.upz{border:2px dashed var(--brd);border-radius:var(--r);padding:32px 18px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.upz:hover,.upz.drag{border-color:var(--acc);background:rgba(0,229,255,.02);}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upz .ico{font-size:30px;display:block;margin-bottom:9px;}
.upz h3{font-size:14px;font-weight:600;margin-bottom:4px;}
.upz p{font-size:12px;color:var(--txd);}
.upz.ok{border-color:var(--grn);background:rgba(16,185,129,.04);}
.upz.ok h3{color:var(--grn);}

/* product settings */
.ps-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.ps-item{display:flex;align-items:center;gap:7px;background:var(--sur2);border:1px solid var(--brd);border-radius:8px;padding:6px 12px;transition:all .2s;cursor:pointer;user-select:none;flex-shrink:0;}
.ps-item:hover{border-color:rgba(255,255,255,.2);background:#222230;}
.ps-item.active{border-color:rgba(255,255,255,.15);}
.ps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.2);}
.ps-name{font-size:13px;font-weight:700;white-space:nowrap;}
.ps-tog{width:30px;height:17px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.ps-tog.on{background:var(--acc);}
.ps-tog.off{background:#3a3a50;}
.ps-tog::after{content:'';position:absolute;top:2.5px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s;}
.ps-tog.on::after{left:16px;}
.ps-tog.off::after{left:2px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--sur);border:1px solid var(--brd);border-radius:14px;width:460px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.65);}
.modal-hdr{padding:14px 18px;background:var(--sur2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;}
.modal-hdr h3{font-size:13px;font-weight:700;flex:1;}
.modal-close{width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,255,255,.06);color:var(--txd);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{background:rgba(239,68,68,.2);color:var(--red);}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:14px;}
.mf{display:flex;flex-direction:column;gap:5px;}
.mf label{font-size:10px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;}
.mf input[type=text],.mf input[type=number]{background:var(--sur2);border:1px solid var(--brd);border-radius:7px;color:var(--tx);padding:8px 11px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;width:100%;}
.mf input[type=text]:focus,.mf input[type=number]:focus{border-color:var(--acc);}
.mf-row{display:flex;gap:8px;}
.mf-row .mf{flex:1;}
.ratio-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ratio-item{background:var(--sur2);border:1px solid var(--brd);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:7px;}
.ratio-item .ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ratio-item .ri-name{font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ratio-item input[type=number]{width:54px;background:transparent;border:1px solid var(--brd);border-radius:5px;color:var(--tx);padding:3px 6px;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;text-align:center;transition:border-color .15s;}
.ratio-item input[type=number]:focus{border-color:var(--acc);}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.ratio-note{font-size:11px;color:var(--txd);font-family:'JetBrains Mono',monospace;text-align:right;}
.ratio-note.ok{color:var(--grn);}
.ratio-note.ng{color:var(--red);}
.modal-footer{padding:12px 18px;background:var(--sur2);border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;}

/* table */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px 11px;background:var(--sur2);color:var(--txd);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--brd);text-align:left;}
td{padding:8px 11px;border-bottom:1px solid var(--brd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}

/* buttons */
.btn{padding:8px 16px;border-radius:7px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:linear-gradient(135deg,var(--acc),#00b4cc);color:#000;box-shadow:0 0 14px rgba(0,229,255,.2);}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,229,255,.35);}
.btn-s{background:var(--sur2);color:var(--tx);border:1px solid var(--brd);}
.btn-s:hover{border-color:var(--txd);}
.btn-d{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.btn-d:hover{background:rgba(239,68,68,.18);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
@keyframes glow{0%,100%{box-shadow:0 0 14px rgba(0,229,255,.2);}50%{box-shadow:0 0 28px rgba(0,229,255,.5);}}
.btn-glow{animation:glow 2.5s ease-in-out infinite;}

/* download cards - agency group */
.ag-group{border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin:14px 14px 0;}
.ag-group:last-child{margin-bottom:14px;}
.ag-group-hdr{padding:9px 14px;background:var(--sur2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;}
.ag-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(0,229,255,.12);color:var(--acc);border:1px solid rgba(0,229,255,.3);}
.ag-cnt{font-size:11px;color:var(--txd);font-family:'JetBrains Mono',monospace;}
.ag-dl-all{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:inherit;background:rgba(0,229,255,.1);color:var(--acc);border:1px solid rgba(0,229,255,.3);transition:all .2s;white-space:nowrap;}
.ag-dl-all:hover{background:rgba(0,229,255,.22);transform:translateY(-1px);}

.dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:12px 14px;}
.dlc{background:var(--sur2);border:1px solid var(--brd);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:10px;transition:all .2s;}
.dlc:hover{border-color:rgba(255,255,255,.2);}
.dlc-ico{font-size:20px;flex-shrink:0;}
.dlc-info{flex:1;min-width:0;}
.dlc-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dlc-meta{font-size:10px;color:var(--txd);margin-top:1px;font-family:'JetBrains Mono',monospace;}
.dlb{padding:5px 13px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.dlb:hover{transform:translateY(-1px);}

/* preview tabs */
.stabs{display:flex;border-bottom:1px solid var(--brd);overflow-x:auto;background:var(--sur2);}
.stab{padding:8px 15px;font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--txd);transition:all .15s;border-right:1px solid var(--brd);}
.stab:hover{color:var(--tx);}
.stab.on{color:var(--acc);border-bottom-color:var(--acc);background:rgba(0,229,255,.04);}
.scon{padding:14px;display:none;max-height:320px;overflow-y:auto;}
.scon.on{display:block;}

/* agency preview tabs */
.ag-tabs-wrap{border-bottom:1px solid var(--brd);}
.ag-ptabs{display:flex;overflow-x:auto;background:rgba(0,229,255,.03);padding:0 14px;}
.ag-ptab{padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--txd);transition:all .15s;}
.ag-ptab:hover{color:var(--tx);}
.ag-ptab.on{color:var(--acc);border-bottom-color:var(--acc);}

/* progress */
.pgw{display:none;padding:0 18px 12px;}
.pgw.show{display:block;}
.pgb{height:3px;background:var(--brd);border-radius:2px;overflow:hidden;}
.pgf{height:100%;background:linear-gradient(90deg,var(--acc),#7c3aed);border-radius:2px;width:0%;transition:width .3s;}
.pgl{font-size:11px;color:var(--txd);margin-top:4px;text-align:center;}

/* product groups */
.pg-btn{display:inline-flex;align-items:center;gap:7px;background:var(--sur2);border:1.5px solid var(--brd);border-radius:8px;padding:5px 8px 5px 12px;cursor:pointer;transition:all .2s;user-select:none;}
.pg-btn:hover{border-color:rgba(255,255,255,.2);background:#222230;}
.pg-btn.active-g{border-color:var(--acc);background:rgba(0,229,255,.06);box-shadow:0 0 10px rgba(0,229,255,.15);}
.pg-name-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.pg-name{font-size:12px;font-weight:700;line-height:1.2;}
.pg-dots{display:flex;gap:3px;align-items:center;}
.pg-del{width:18px;height:18px;border-radius:4px;border:none;background:rgba(239,68,68,.08);color:var(--red);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;line-height:1;}
.pg-del:hover{background:rgba(239,68,68,.25);}
.pg-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--brd);}
.pg-label{font-size:10px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.pg-add-form{margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.pg-add-form input[type=text]{background:var(--sur2);border:1px solid var(--brd);border-radius:7px;color:var(--tx);padding:5px 10px;font-size:12px;font-family:inherit;outline:none;width:160px;transition:border-color .15s;}
.pg-add-form input[type=text]:focus{border-color:var(--acc);}

/* product add/delete */
.ps-item-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:transparent;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;line-height:1;padding:0;}
.ps-item:hover .ps-item-del{color:var(--txd);}
.ps-item-del:hover{background:rgba(239,68,68,.25)!important;color:var(--red)!important;}


/* misc */
.empty{padding:36px;text-align:center;color:var(--txd);}
.empty .ico{font-size:34px;margin-bottom:8px;}

.stats{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--txd);align-items:center;}
.sv{color:var(--acc);font-weight:700;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}

/* product two-row layout */
.ps-two-row{display:flex;flex-direction:column;gap:0;}
.ps-row{display:flex;align-items:center;gap:6px;}
.ps-row-inner{display:flex;gap:8px;flex:1;min-width:0;overflow-x:auto;scroll-behavior:smooth;}
.ps-row-inner::-webkit-scrollbar{display:none;}
.ps-sect-lbl{font-size:10px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;min-width:26px;}
.ps-divider-h{height:1px;background:var(--brd);margin:9px 0;}
.ps-nav{width:22px;height:22px;border-radius:5px;border:1px solid var(--brd);background:var(--sur2);color:var(--txd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;line-height:1;padding:0;}
.ps-nav:hover:not(:disabled){border-color:var(--acc);color:var(--acc);}
.ps-nav:disabled{opacity:.2;cursor:not-allowed;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">📊</div>
  <div>
    <h1>캠페인 엑셀 자동 변환기</h1>
    <p>접수 양식 업로드 → 대행사별 접수+주문 시트 다운로드</p>
  </div>

</div>

<div class="wrap">


  <!-- Upload -->
  <div class="panel">
    <div class="ph"><span>📂</span><h2>접수 양식 업로드</h2><span class="m" style="margin-left:auto;"></span><div style="display:flex;gap:8px;margin-left:auto;"><button class="btn btn-d" style="font-size:11px;padding:5px 11px;" onclick="clearAll()">🗑 초기화</button><button class="btn btn-s" style="font-size:11px;padding:5px 13px;" onclick="downloadAllSplit()" id="dlSplitBtn">📂 개별 다운로드</button><button class="btn btn-p btn-glow" style="font-size:11px;padding:5px 13px;" onclick="downloadAll()" id="dlAllBtn2">⚡ 전체 다운로드</button></div></div>
    <div class="pb">
      <div class="upz" id="upz">
        <input type="file" id="fi" accept=".xlsx,.xls"/>
        <span class="ico">📁</span>
        <h3>접수_날짜.xlsx 드래그 또는 클릭해서 업로드</h3>
        <p>업로드 후 아래 표에서 수정 가능 · 직접 입력도 가능</p>
      </div>
    </div>
  </div>

  <!-- Product type settings -->
  <div class="panel" id="prodPanel">
    <div class="ph"><span>🏷️</span><h2>상품 유형 설정</h2><span class="m">클릭하면 상품명·버전·고정 비율 설정 가능</span><div style="display:flex;gap:6px;margin-left:auto;"><button class="btn btn-p" style="font-size:11px;padding:4px 10px;" onclick="showAddProdModal()">＋ 상품 추가</button><button class="btn btn-s" style="font-size:11px;padding:4px 10px;" onclick="showAddGroup()">＋ 그룹 추가</button></div></div>
    <div class="pb">
      <!-- Groups -->
      <div class="pg-section">
        <div class="pg-label">그룹 프리셋 — 클릭하면 설정이 자동 적용됩니다</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
          <div id="groupWrap" style="display:contents;"></div>
        </div>
        <div id="addGroupForm" class="pg-add-form" style="display:none;">
          <input type="text" id="groupNameInput" placeholder="그룹 이름 (예: 블랙+올리브)" maxlength="24"
            onkeydown="if(event.key==='Enter')saveNewGroup();if(event.key==='Escape')hideAddGroup();" />
          <button class="btn btn-p" style="font-size:11px;padding:4px 12px;" onclick="saveNewGroup()">✔ 저장</button>
          <button class="btn btn-s" style="font-size:11px;padding:4px 10px;" onclick="hideAddGroup()">취소</button>
        </div>
      </div>
      <!-- Products -->
      <div class="ps-two-row">
        <div class="ps-row">
          <span class="ps-sect-lbl">일반</span>
          <button class="ps-nav" id="psNavL" onclick="psScroll(-1)">&#8249;</button>
          <div class="ps-row-inner" id="psWrapNormal"></div>
          <button class="ps-nav" id="psNavR" onclick="psScroll(1)">&#8250;</button>
        </div>
        <div class="ps-divider-h"></div>
        <div class="ps-row">
          <span class="ps-sect-lbl">고정</span>
          <button class="ps-nav" id="psNavFL" onclick="psScrollFixed(-1)">&#8249;</button>
          <div class="ps-row-inner" id="psWrapFixed"></div>
          <button class="ps-nav" id="psNavFR" onclick="psScrollFixed(1)">&#8250;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Settings Modal -->
  <div class="modal-bg" id="modalBg" style="display:none;">
    <div class="modal">
      <div class="modal-hdr">
        <div class="ps-dot" id="mdot" style="width:14px;height:14px;"></div>
        <h3 id="mTitle">상품 설정</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="mf-row">
          <div class="mf" style="flex:1;">
            <label>상품명</label>
            <input type="text" id="mName" placeholder="블랙" />
          </div>
          <div class="mf" style="flex:1.5;">
            <label>엑셀 버전</label>
            <input type="text" id="mVer" placeholder="ver.5.1/3.2" style="font-family:'JetBrains Mono',monospace;font-size:12px;" />
          </div>
        </div>
        <div class="mf">
          <label>키워드 배분 <span style="font-weight:400;text-transform:none;letter-spacing:0;">— 활성 상품 간 검색키워드 분배 (합계 10)</span></label>
          <div class="ratio-grid" id="kwPctGrid"></div>
          <div class="ratio-note" id="kwPctNote">합계: 0%</div>
        </div>
        <div class="mf">
          <label>일 목표 배분 <span style="font-weight:400;text-transform:none;letter-spacing:0;">— 활성 상품 간 일 목표 분배 (합계 10)</span></label>
          <div class="ratio-grid" id="ratioGrid"></div>
          <div class="ratio-note" id="ratioNote">합계: 0%</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-s" style="font-size:12px;padding:7px 14px;" onclick="closeModal()">취소</button>
        <button class="btn btn-p" style="font-size:12px;padding:7px 16px;" onclick="saveModal()">✔ 저장</button>
      </div>
    </div>
  </div>

  <!-- Add Product Modal -->
  <div class="modal-bg" id="addProdModalBg" style="display:none;">
    <div class="modal" style="width:400px;">
      <div class="modal-hdr">
        <div class="ps-dot" id="apDot" style="width:14px;height:14px;background:#06b6d4;"></div>
        <h3>상품 유형 추가</h3>
        <button class="modal-close" onclick="closeAddProdModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="mf">
          <label>상품명</label>
          <input type="text" id="apName" placeholder="새 상품" maxlength="16"
            onkeydown="if(event.key==='Enter')saveNewProd();if(event.key==='Escape')closeAddProdModal();" />
        </div>
        <div class="mf">
          <label>엑셀 버전</label>
          <input type="text" id="apVer" placeholder="ver.5.0/3.2" style="font-family:'JetBrains Mono',monospace;font-size:12px;" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-s" style="font-size:12px;padding:7px 14px;" onclick="closeAddProdModal()">취소</button>
        <button class="btn btn-p" style="font-size:12px;padding:7px 16px;" onclick="saveNewProd()">✔ 추가</button>
      </div>
    </div>
  </div>

  <!-- Download & Preview -->
  <div class="panel">
    <div class="ph"><span>⬇️</span><h2>대행사별 다운로드</h2><span class="m" id="agMeta">대행사 미설정</span></div>
    <div class="stats" id="statsEl" style="display:none;padding:8px 18px;border-bottom:1px solid var(--brd);flex-wrap:wrap;"></div>

    <div class="pgw" id="pgw">
      <div class="pgb"><div class="pgf" id="pgf"></div></div>
      <div class="pgl" id="pgl"></div>
    </div>

    <div id="dlArea">
      <div class="empty"><div class="ico">📭</div><p>데이터를 입력하면 대행사별 다운로드 카드가 생성됩니다</p></div>
    </div>

    <div class="stabs" id="stabs"></div>
    <div id="scons"></div>

  </div>

</div>

<script>
// ── Product defaults ──
let prods = [
  {id:'p1',    name:'블랙',  color:'#3b82f6',active:true,  ver:'ver.5.0/3.2', ratio:5, kwPct:5},
  {id:'p2',    name:'올리브',color:'#8b5cf6',active:true,  ver:'ver.5.0/3.2', ratio:5, kwPct:5},
  {id:'p3',    name:'X3',    color:'#10b981',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
  {id:'p4',    name:'X4',    color:'#f97316',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
  {id:'p5',    name:'X5',    color:'#cbd5e1',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
  {id:'p6',    name:'X6',    color:'#84cc16',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
  {id:'p7',    name:'X7',    color:'#ec4899',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
  {id:'p8',    name:'X8',    color:'#eab308',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
  {id:'charlie',name:'찰리', color:'#f43f5e',active:false, ver:'ver.4.1/3.2', ratio:0, kwPct:0},
  {id:'yupfl', name:'유입플', color:'#f59e0b',active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
];

// 고정 상품 ID 목록 — 이 Set에 등록된 상품은 UI에서 삭제 버튼이 숨겨지고 삭제가 차단됩니다.
// 새 고정 상품을 추가할 때: 1) prods 배열에 항목 추가  2) 이 Set에 해당 id 추가
// 고정 상품은 특수 분배 로직(yupflAlloc 등)을 allocate/kwForProd 함수에 직접 구현하세요.
const FIXED_PROD_IDS = new Set(['charlie', 'yupfl']);

let rows = [], rid = 0;
let groups = [];
let activeGroupId = null;
let defaultProds = null;

function saveDefaultState() {
  defaultProds = prods.map(p=>({id:p.id,active:p.active,ratio:p.ratio,name:p.name,ver:p.ver,kwPct:p.kwPct}));
}
function deactivateGroup() {
  activeGroupId = null;
  if (defaultProds) {
    defaultProds.forEach(s => {
      const p=prods.find(x=>x.id===s.id); if(!p) return;
      p.active=s.active; p.ratio=s.ratio; p.name=s.name; p.ver=s.ver;
      if(s.kwPct !== undefined) p.kwPct = s.kwPct;
    });
    rows.forEach(r=>{ r.products=(r.products||[]).filter(mid=>prods.find(p=>p.id===mid&&p.active)); });
  }
  renderPS(); renderTable(); refreshUI();
  scheduleSave();
}

// ── Product Groups ──
const GROUPS_KEY = '캠페인_prod_groups';

function loadGroups() {
  try { const s=localStorage.getItem(GROUPS_KEY); if(s) groups=JSON.parse(s); } catch(e){}
}
function saveGroupsLocal() {
  try { localStorage.setItem(GROUPS_KEY, JSON.stringify(groups)); } catch(e){}
}

function renderGroups() {
  const wrap = document.getElementById('groupWrap');
  if (!wrap) return;
  if (!groups.length) {
    wrap.innerHTML = `<span style="font-size:11px;color:var(--txd);">저장된 그룹 없음</span>`;
    return;
  }
  wrap.innerHTML = groups.map(g => {
    const isActive = g.id === activeGroupId;
    const dots = g.state.map(s => {
      const p = prods.find(x=>x.id===s.id);
      const col = p ? p.color : '#555';
      return `<span style="width:7px;height:7px;border-radius:50%;background:${col};opacity:${s.active?1:.2};display:inline-block;flex-shrink:0;"></span>`;
    }).join('');
    return `<div class="pg-btn${isActive?' active-g':''}" data-gid="${g.id}" onclick="applyGroup('${g.id}')" ondblclick="event.stopPropagation();startRenameGroup('${g.id}')" title="${g.state.filter(s=>s.active).map(s=>prods.find(x=>x.id===s.id)?.name||s.id).join(', ')}">
      <div class="pg-name-wrap">
        <span class="pg-name">${esc(g.name)}</span>
        <span class="pg-dots">${dots}</span>
      </div>
      <button class="pg-del" onclick="event.stopPropagation();deleteGroup('${g.id}')">✕</button>
    </div>`;
  }).join('');
}

function showAddGroup() {
  const f = document.getElementById('addGroupForm');
  f.style.display = 'flex';
  document.getElementById('groupNameInput').focus();
}
function hideAddGroup() {
  document.getElementById('addGroupForm').style.display = 'none';
  document.getElementById('groupNameInput').value = '';
}
function saveNewGroup() {
  const name = document.getElementById('groupNameInput').value.trim();
  if (!name) { document.getElementById('groupNameInput').focus(); return; }
  const state = prods.map(p => ({id:p.id, active:p.active, ratio:p.ratio, name:p.name, ver:p.ver, kwPct:p.kwPct}));
  groups.push({ id:'g'+Date.now(), name, state });
  saveGroupsLocal();
  hideAddGroup();
  renderGroups();
  scheduleSave();
}
function deleteGroup(id) {
  if (activeGroupId === id) activeGroupId = null;
  groups = groups.filter(g=>g.id!==id);
  saveGroupsLocal();
  renderGroups();
  scheduleSave();
}
function applyGroup(id) {
  const g = groups.find(x=>x.id===id); if(!g) return;
  if (!activeGroupId) saveDefaultState();
  g.state.forEach(s => {
    const p = prods.find(x=>x.id===s.id); if(!p) return;
    p.active = s.active;
    if(s.ratio !== undefined) p.ratio = s.ratio;
    if(s.name)               p.name  = s.name;
    if(s.ver  !== undefined) p.ver   = s.ver;
    if(s.kwPct !== undefined) p.kwPct = s.kwPct;
  });
  activeGroupId = id;
  const activeIds = prods.filter(p=>p.active).map(p=>p.id);
  rows.forEach(r => { r.products = activeIds.slice(); });
  renderPS(); renderTable(); refreshUI();
  scheduleSave();
}
function startRenameGroup(id) {
  const g = groups.find(x=>x.id===id); if(!g) return;
  const el = document.querySelector(`.pg-btn[data-gid="${id}"] .pg-name`);
  if(!el) return;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = g.name;
  inp.maxLength = 24;
  inp.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--acc);color:var(--tx);font-size:12px;font-weight:700;font-family:inherit;outline:none;width:80px;padding:0;';
  let committed = false;
  const commit = () => {
    if (committed) return; committed = true;
    const v = inp.value.trim();
    if (v) g.name = v;
    saveGroupsLocal();
    renderGroups();
    scheduleSave();
  };
  inp.onblur = commit;
  inp.onkeydown = e => { if(e.key==='Enter'){inp.blur();} if(e.key==='Escape'){committed=true;renderGroups();} e.stopPropagation(); };
  el.replaceWith(inp);
  inp.focus(); inp.select();
}
function updateActiveGroup() {
  if (!activeGroupId) return;
  const g = groups.find(x=>x.id===activeGroupId); if(!g) return;
  g.state = prods.map(p => ({id:p.id, active:p.active, ratio:p.ratio, name:p.name, ver:p.ver, kwPct:p.kwPct}));
  saveGroupsLocal();
  renderGroups();
}

// ── utils ──
const today = () => new Date().toISOString().split('T')[0];
const shortD = () => { const d=new Date(); return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); };
const ap = () => prods.filter(p=>p.active);
const esc = v => String(v??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const hex2rgb = h => { const v=h.replace('#',''); return `${parseInt(v.slice(0,2),16)},${parseInt(v.slice(2,4),16)},${parseInt(v.slice(4,6),16)}`; };

function getAgencies(){
  const seen=new Set(), list=[];
  rows.filter(r=>r.name.trim()).forEach(r=>{
    const ag=r.agency.trim()||'(대행사 미지정)';
    if(!seen.has(ag)){seen.add(ag);list.push(ag);}
  });
  return list;
}

function rowsByAgency(ag){
  return rows.filter(r=>r.name.trim() && (r.agency.trim()||'(대행사 미지정)')===ag);
}

// ── Firebase (부모 창 연동) ──
function saveToServer() {
  if (window.parent && window.parent.saveSlotData) {
    window.parent.saveSlotData({ prods, rows, groups });
  }
}

window.applySlotData = function(data) {
  if (!data) return;
  if (data.prods && Array.isArray(data.prods)) {
    // 구버전 kwCount → kwPct 마이그레이션 (0~10 스케일)
    const savedActive = data.prods.filter(p => p.active);
    const needsKwMigration = data.prods.some(p => p.active && p.kwPct === undefined);
    if (needsKwMigration) {
      const n = savedActive.length || 1;
      const each = Math.round(10 / n * 10) / 10;
      const last = Math.round((10 - each * (n - 1)) * 10) / 10;
      let ai = 0;
      data.prods.forEach(p => {
        if (p.active) { p.kwPct = ai === n - 1 ? last : each; ai++; }
        else p.kwPct = 0;
      });
    }
    const defaultIds = new Set(prods.map(p => p.id));
    const savedMap = new Map(data.prods.map(p => [p.id, p]));
    prods = prods.map(def => savedMap.has(def.id) ? {...def, ...savedMap.get(def.id)} : def);
    data.prods.forEach(sp => { if (!defaultIds.has(sp.id)) prods.push(sp); });
  }
  if (data.groups && Array.isArray(data.groups)) {
    groups = data.groups;
  }
  if (data.rows && Array.isArray(data.rows)) {
    rows = data.rows.map(r => ({
      ...r,
      products: Array.isArray(r.products) ? r.products : ap().map(p => p.id)
    }));
    if (rows.length > 0) {
      rid = Math.max(...rows.map(r => r.id ?? 0)) + 1;
    }
  }
  saveDefaultState();
  renderPS();
  renderTable();
  refreshUI();
};

let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToServer, 800);
}

// ── Init ──
window.onload = () => {
  renderPS();
  renderGroups();
  addRow(); addRow(); addRow();
  setupUpload();
  const psInner = document.getElementById('psWrapNormal');
  if (psInner) psInner.addEventListener('scroll', updatePSArrows);
  const psFixed = document.getElementById('psWrapFixed');
  if (psFixed) psFixed.addEventListener('scroll', updatePSArrows);
  window.addEventListener('resize', updatePSArrows);
  document.addEventListener('mousedown', e => {
    if (!activeGroupId) return;
    if (e.target.closest('.panel') || e.target.closest('#modalBg')) return;
    deactivateGroup();
  });
  // 부모 창에게 데이터 요청
  if (window.parent && window.parent.loadSlotData) {
    window.parent.loadSlotData();
  }
};

// ── Product settings ──
function renderPS() {
  renderGroups();
  const prodHtml = p => `
    <div class="ps-item${p.active?' active':''}" id="psi-${p.id}" onclick="openModal('${p.id}')">
      <div class="ps-dot" style="background:${p.color};border-color:rgba(255,255,255,.25);"></div>
      <span class="ps-name" style="color:${p.color}">${esc(p.name)}</span>
      <button class="ps-tog ${p.active?'on':'off'}" onclick="event.stopPropagation();toggleP('${p.id}')"></button>
      ${FIXED_PROD_IDS.has(p.id)?'':'<button class="ps-item-del" onclick="event.stopPropagation();deleteProd(\''+p.id+'\')" title="'+esc(p.name)+' 삭제">✕</button>'}
    </div>`;
  document.getElementById('psWrapNormal').innerHTML = prods.filter(p=>!FIXED_PROD_IDS.has(p.id)).map(prodHtml).join('');
  document.getElementById('psWrapFixed').innerHTML  = prods.filter(p=> FIXED_PROD_IDS.has(p.id)).map(prodHtml).join('');
  updatePSArrows();
}

function psScroll(dir) {
  const el = document.getElementById('psWrapNormal');
  if (!el) return;
  el.scrollLeft += dir * 220;
  setTimeout(updatePSArrows, 180);
}

function psScrollFixed(dir) {
  const el = document.getElementById('psWrapFixed');
  if (!el) return;
  el.scrollLeft += dir * 220;
  setTimeout(updatePSArrows, 180);
}

function updatePSArrows() {
  const el = document.getElementById('psWrapNormal');
  if (el) {
    const l = document.getElementById('psNavL');
    const r = document.getElementById('psNavR');
    if (l) l.disabled = el.scrollLeft <= 0;
    if (r) r.disabled = Math.ceil(el.scrollLeft + el.clientWidth) >= el.scrollWidth;
  }
  const fel = document.getElementById('psWrapFixed');
  if (fel) {
    const fl = document.getElementById('psNavFL');
    const fr = document.getElementById('psNavFR');
    if (fl) fl.disabled = fel.scrollLeft <= 0;
    if (fr) fr.disabled = Math.ceil(fel.scrollLeft + fel.clientWidth) >= fel.scrollWidth;
  }
}

// ── Modal ──
let _modalId = null;

function openModal(id) {
  const p = prods.find(x=>x.id===id); if(!p) return;
  _modalId = id;

  document.getElementById('mdot').style.background = p.color;
  document.getElementById('mTitle').textContent = `${p.name} 설정`;
  document.getElementById('mName').value = p.name;
  document.getElementById('mVer').value = p.ver||'';

  const isYupfl = id === 'yupfl';
  const actives = isYupfl ? [] : ap().filter(q => q.id !== 'yupfl');
  const n = actives.length || 1;
  const defVal = () => Math.round(10 / n * 10) / 10;

  const kwGrid = document.getElementById('kwPctGrid');
  if (isYupfl) {
    kwGrid.innerHTML = `<div style="grid-column:1/-1;padding:8px 0;font-size:12px;color:var(--txd);">검색키워드 앞 <b style="color:var(--acc)">5개</b> 고정 배분 — 비율 설정 없음</div>`;
  } else {
    kwGrid.innerHTML = actives.map(q=>`
    <div class="ratio-item">
      <div class="ri-dot" style="background:${q.color}"></div>
      <span class="ri-name" style="color:${q.color}">${esc(q.name)}</span>
      <input type="number" step="any" min="0" max="10" value="${q.kwPct !== undefined ? q.kwPct : defVal()}" id="kwpct-${q.id}"
        oninput="updatePctNotes()" />
    </div>`).join('');
  }

  const grid = document.getElementById('ratioGrid');
  if (isYupfl) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:8px 0;font-size:12px;color:var(--txd);"><b style="color:var(--acc)">일 300타 이상</b>: 일타수의 15% &nbsp;/&nbsp; <b style="color:var(--acc)">일 300타 미만</b>: 50타 고정</div>`;
  } else {
    grid.innerHTML = actives.map(q=>`
    <div class="ratio-item">
      <div class="ri-dot" style="background:${q.color}"></div>
      <span class="ri-name" style="color:${q.color}">${esc(q.name)}</span>
      <input type="number" step="any" min="0" max="10" value="${q.ratio !== undefined ? q.ratio : defVal()}" id="ratio-${q.id}"
        oninput="updatePctNotes()" />
    </div>`).join('');
  }

  updatePctNotes();
  document.getElementById('modalBg').style.display = 'flex';
}

function updatePctNotes() {
  if (_modalId === 'yupfl') {
    const kwNote = document.getElementById('kwPctNote');
    if (kwNote) { kwNote.textContent = '5개 고정'; kwNote.className = 'ratio-note ok'; }
    const ratioNote = document.getElementById('ratioNote');
    if (ratioNote) { ratioNote.textContent = '고정 등급'; ratioNote.className = 'ratio-note ok'; }
    return;
  }
  const actives = ap().filter(p => p.id !== 'yupfl');
  const kwSum = actives.reduce((s,q)=>{
    const el = document.getElementById(`kwpct-${q.id}`);
    return s + (el ? (parseFloat(el.value)||0) : (q.kwPct||0));
  }, 0);
  const kwRounded = Math.round(kwSum * 10) / 10;
  const kwNote = document.getElementById('kwPctNote');
  if (kwNote) {
    if (kwRounded === 0) { kwNote.textContent = '배분 안함'; kwNote.className = 'ratio-note ok'; }
    else { kwNote.textContent = `합계: ${kwRounded}`; kwNote.className = 'ratio-note ' + (kwRounded===10?'ok':'ng'); }
  }

  const ratioSum = actives.reduce((s,q)=>{
    const el = document.getElementById(`ratio-${q.id}`);
    return s + (el ? (parseFloat(el.value)||0) : (q.ratio||0));
  }, 0);
  const ratioRounded = Math.round(ratioSum * 10) / 10;
  const ratioNote = document.getElementById('ratioNote');
  if (ratioNote) { ratioNote.textContent = `합계: ${ratioRounded}`; ratioNote.className = 'ratio-note ' + (ratioRounded===10?'ok':'ng'); }
}

function closeModal() {
  document.getElementById('modalBg').style.display = 'none';
  _modalId = null;
}

function saveModal() {
  const p = prods.find(x=>x.id===_modalId); if(!p) return;
  p.name = document.getElementById('mName').value.trim() || p.name;
  p.ver  = document.getElementById('mVer').value.trim();

  if (_modalId !== 'yupfl') {
    const actives = ap().filter(q => q.id !== 'yupfl');
    if (actives.length > 0) {
      const kwSum = actives.reduce((s,q)=>{
        const el = document.getElementById(`kwpct-${q.id}`);
        return s + (el ? (parseFloat(el.value)||0) : (q.kwPct||0));
      }, 0);
      const ratioSum = actives.reduce((s,q)=>{
        const el = document.getElementById(`ratio-${q.id}`);
        return s + (el ? (parseFloat(el.value)||0) : (q.ratio||0));
      }, 0);
      const kwRounded = Math.round(kwSum * 10) / 10;
      const ratioRounded = Math.round(ratioSum * 10) / 10;

      if (kwRounded !== 10 && kwRounded !== 0) {
        const note = document.getElementById('kwPctNote');
        note.textContent = `합계 10 또는 모두 0 필수 (현재 ${kwRounded})`;
        note.className = 'ratio-note ng';
        return;
      }
      if (ratioRounded !== 10) {
        const note = document.getElementById('ratioNote');
        note.textContent = `합계 10 필수 (현재 ${ratioRounded})`;
        note.className = 'ratio-note ng';
        return;
      }

      actives.forEach(q=>{
        const kwEl = document.getElementById(`kwpct-${q.id}`);
        if(kwEl) q.kwPct = Math.round((parseFloat(kwEl.value)||0) * 10) / 10;
        const ratEl = document.getElementById(`ratio-${q.id}`);
        if(ratEl) q.ratio = Math.round((parseFloat(ratEl.value)||0) * 10) / 10;
      });
    }
  }

  // 그룹에 상품명/버전 동기화
  groups.forEach(g => {
    const gs = g.state.find(s => s.id === p.id);
    if (gs) { gs.name = p.name; gs.ver = p.ver; }
  });
  saveGroupsLocal();

  closeModal();
  if (activeGroupId) updateActiveGroup(); else saveDefaultState();
  renderPS(); renderTable(); refreshUI();
  scheduleSave();
}

function rebalanceActive(field) {
  const active = ap().filter(p => p.id !== 'yupfl');
  const n = active.length;
  if (!n) return;
  const each = Math.round(10 / n * 10) / 10;
  const last = Math.round((10 - each * (n - 1)) * 10) / 10;
  active.forEach((p, i) => { p[field] = i === n - 1 ? last : each; });
  prods.forEach(p => { if (!p.active || p.id === 'yupfl') p[field] = 0; });
}

function toggleP(id) {
  const p = prods.find(x=>x.id===id); if(!p) return;
  p.active = !p.active;
  if (!p.active) {
    rows.forEach(r => { r.products=(r.products||[]).filter(mid=>mid!==id); });
  } else if (id === 'yupfl') {
    // 유입플 ON 시 모든 행에 자동 배정
    rows.forEach(r => { r.products=r.products||[]; if(!r.products.includes('yupfl')) r.products.push('yupfl'); });
  }
  rebalanceActive('kwPct');
  rebalanceActive('ratio');
  if (activeGroupId) updateActiveGroup(); else saveDefaultState();
  renderPS(); renderTable(); refreshUI();
  scheduleSave();
}

// ── Add / Delete Product ──
const PROD_COLORS=['#3b82f6','#8b5cf6','#10b981','#f97316','#cbd5e1','#84cc16','#ec4899','#eab308','#f43f5e','#06b6d4','#a78bfa','#34d399','#fb923c','#60a5fa','#f472b6','#facc15','#ef4444','#14b8a6','#d946ef','#78716c'];
let _apColor='#06b6d4';

function nextProdColor(){
  const used=new Set(prods.map(p=>p.color));
  return PROD_COLORS.find(c=>!used.has(c))||PROD_COLORS[prods.length%PROD_COLORS.length];
}
function showAddProdModal(){
  _apColor=nextProdColor();
  document.getElementById('apDot').style.background=_apColor;

// ── Upload ──
function setupUpload() {
  const z=document.getElementById('upz');
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
  document.getElementById('fi').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
}

function loadFile(file) {
  const rdr=new FileReader();
  rdr.onload=e=>{
    try {
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});

      let hi=0;
      for(let i=0;i<Math.min(data.length,5);i++){
        if(data[i].some(c=>String(c).includes('업체명'))){hi=i;break;}
      }
      const hdrs=data[hi].map(h=>String(h).trim());
      const ci=n=>hdrs.findIndex(h=>h.includes(n));

      const C={
        rdate: ci('접수일시'),
        agency: ci('대행사'),
        name:  ci('업체명'),
        url:   ci('URL')>=0?ci('URL'):ci('url'),
        mid:   ci('MID'),
        kw:    ci('순위키워드'),
        days:  ci('일 수')>=0?ci('일 수'):ci('일수'),
        sdate: ci('시작일'),
        goal:  ci('일 목표')>=0?ci('일 목표'):ci('일목표'),
        skw:   ci('검색키워드'),
      };

      const newRows=[];
      for(let i=hi+1;i<data.length;i++){
        const r=data[i];
        const nm=String(r[C.name]||'').trim();
        if(!nm) continue;

        const parseDate = raw => {
          if(!raw) return today();
          const d=new Date(raw); if(!isNaN(d)) return d.toISOString().split('T')[0];
          const s=String(raw).replace(/\.\s*/g,'-').trim();
          const m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
          return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:today();
        };

        newRows.push({
          id:rid++,
          receiptDate: C.rdate>=0?parseDate(r[C.rdate]):'',
          agency: C.agency>=0?String(r[C.agency]||'').trim():'',
          name: nm,
          url: C.url>=0?String(r[C.url]||'').trim():'',
          mid: C.mid>=0?String(r[C.mid]||'').trim():'',
          keyword: C.kw>=0?String(r[C.kw]||'').trim():'',
          days: parseInt(C.days>=0?r[C.days]:'')||7,
          startDate: C.sdate>=0?parseDate(r[C.sdate]):today(),
          dailyTarget: parseInt(C.goal>=0?r[C.goal]:'')||125,
          searchKeywords: C.skw>=0?String(r[C.skw]||'').trim():'',
          products: ap().map(p=>p.id),
        });
      }

      if(newRows.length){
        rows=newRows; renderTable(); refreshUI();
        const z=document.getElementById('upz');
        z.classList.add('ok');
        z.querySelector('h3').textContent=`✅ ${file.name} — ${newRows.length}개 업체 로드됨`;
        scheduleSave();
      } else { alert('데이터를 찾을 수 없습니다. 헤더 행을 확인하세요.'); }
    } catch(err){ alert('파일 오류: '+err.message); }
  };
  rdr.readAsArrayBuffer(file);
}

function switchPTab(ag, n){

  document.querySelectorAll(`[data-ag-con="${escAttr(ag)}"]`).forEach(c=>c.classList.toggle('on', c.id===`sc-${ag}-${n}`));

function prevTable(data){
  if(!data||!data.length) return `<div class="empty"><div class="ico">📭</div><p>배정된 업체가 없습니다</p></div>`;
  const cols=Object.keys(data[0]);
  const KW_W='160px';
  return `<div class="tw" style="overflow-x:auto;"><table style="white-space:nowrap;">
    <thead style="position:sticky;top:0;z-index:1;"><tr>${cols.map(c=>{
      const kw=c==='검색키워드';
      return `<th style="white-space:nowrap;${kw?`max-width:${KW_W};width:${KW_W};overflow:hidden;text-overflow:ellipsis;`:''}">${c}</th>`;
    }).join('')}</tr></thead>
    <tbody>${data.map(row=>`<tr>${cols.map(c=>{
      const v=row[c]??'';
      const prod=prods.find(p=>p.name===c);
      const kw=c==='검색키워드';
      const kwcnt=c==='키워드 수';
      const base=kw?`max-width:${KW_W};width:${KW_W};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`:'white-space:nowrap;';
      const st=prod&&v!==''?`style="color:${prod.color};font-weight:700;${base}"`
        :kwcnt&&v!==''&&v!==0?`style="color:#00e5ff;font-weight:700;${base}"`
        :` style="${base}"`;
      return `<td ${st} title="${esc(String(v))}">${esc(String(v))}</td>`;
    }).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

// ── 대행사별 개별 다운로드 (접수 + 상품별 파일 분리) ──
async function downloadForAgencySplit(ag){
  const f=rowsByAgency(ag);
  if(!f.length){alert('해당 대행사의 데이터가 없습니다.');return;}
  const usedIds=new Set(); f.forEach(r=>r.products.forEach(mid=>usedIds.add(mid)));
  const pSheets=ap().filter(p=>usedIds.has(p.id));
  const realAg=ag==='(대행사 미지정)'?'':ag;

  try{
    setPG(true,8,`[${ag}] 접수 시트 생성 중...`);
    await sleep(60);
    const wb0=XLSX.utils.book_new(); buildJusuSheet(wb0,f);
    XLSX.writeFile(wb0, fname(realAg,'접수'));
    await sleep(350);
    for(let i=0;i<pSheets.length;i++){
      const p=pSheets[i];
      setPG(true,15+Math.round(82*(i+1)/pSheets.length),`[${ag}] ${p.name} 시트 생성 중...`);
      await sleep(60);
      const wb=XLSX.utils.book_new(); buildProdSheet(wb,f,p);
      XLSX.writeFile(wb, fname(realAg, p.name));
      await sleep(350);
    }
    setPG(true,100,`[${ag}] ${1+pSheets.length}개 파일 완료 ✅`); await sleep(1200);
  }catch(e){alert('오류: '+e.message);}
  finally{setPG(false);}
}

// ── 전체 개별 다운로드 (모든 대행사, 상품별 파일 분리) ──
async function downloadAllSplit(){
  const agencies=getAgencies();
  if(!agencies.length){alert('데이터를 입력해주세요.');return;}
  const btn=document.getElementById('dlSplitBtn');
  if(btn) btn.disabled=true;

  try{
    let totalFiles=0;
    agencies.forEach(ag=>{
      const f=rowsByAgency(ag);
      const usedIds=new Set(); f.forEach(r=>r.products.forEach(mid=>usedIds.add(mid)));
      totalFiles+=1+ap().filter(p=>usedIds.has(p.id)).length;
    });

    let done=0;
    for(const ag of agencies){
      const f=rowsByAgency(ag);
      const usedIds=new Set(); f.forEach(r=>r.products.forEach(mid=>usedIds.add(mid)));
      const pSheets=ap().filter(p=>usedIds.has(p.id));
      const realAg=ag==='(대행사 미지정)'?'':ag;

      setPG(true,Math.round(100*done/totalFiles),`[${ag}] 접수 시트 생성 중...`);
      await sleep(60);
      const wb0=XLSX.utils.book_new(); buildJusuSheet(wb0,f);
      XLSX.writeFile(wb0, fname(realAg,'접수'));
      done++; await sleep(300);

      for(let i=0;i<pSheets.length;i++){
        const p=pSheets[i];
        setPG(true,Math.round(100*done/totalFiles),`[${ag}] ${p.name} 시트 생성 중...`);
        await sleep(60);
        const wb=XLSX.utils.book_new(); buildProdSheet(wb,f,p);
        XLSX.writeFile(wb, fname(realAg, p.name));
        done++; await sleep(300);
      }
    }
    setPG(true,100,`전체 ${agencies.length}개 대행사 · ${totalFiles}개 파일 다운로드 완료 ✅`);
    await sleep(1500);
  }catch(e){alert('오류: '+e.message);}
  finally{if(btn) btn.disabled=false; setPG(false);}
}

// ── XLSX: 접수 sheet ──
function sc(ws,r,c,v,s={}){
  const addr=XLSX.utils.encode_cell({r,c});
  ws[addr]={
    t:typeof v==='number'?'n':'s', v,
    s:{
      font:{name:'맑은 고딕',sz:10,...s.font},
      alignment:{horizontal:s.align||'center',vertical:'center',wrapText:false},
      ...(s.fill?{fill:{fgColor:{rgb:s.fill},patternType:'solid'}}:{}),
      ...(s.nb?{}:{border:{
        top:{style:'thin',color:{rgb:'D0D0D0'}},bottom:{style:'thin',color:{rgb:'D0D0D0'}},
        left:{style:'thin',color:{rgb:'D0D0D0'}},right:{style:'thin',color:{rgb:'D0D0D0'}}
      }})
    }
  };
}

function scDate(ws,r,c,dateStr,s={}){
  if(!dateStr){sc(ws,r,c,'',s);return;}
  const [y,m,d]=String(dateStr).split('-').map(Number);
  const jsDate=new Date(y,m-1,d);
  const base=new Date(1899,11,30); // 1900 leap bug 보정
  const serial=Math.round((jsDate-base)/(86400*1000));
  const addr=XLSX.utils.encode_cell({r,c});
  ws[addr]={
    t:'n', v:serial,
    z:'YYYY-MM-DD',
    s:{
      font:{name:'맑은 고딕',sz:10,...(s.font||{})},
      alignment:{horizontal:'center',vertical:'center',wrapText:false},
      numFmt:'YYYY-MM-DD',
      ...(s.nb?{}:{border:{
        top:{style:'thin',color:{rgb:'D0D0D0'}},bottom:{style:'thin',color:{rgb:'D0D0D0'}},
        left:{style:'thin',color:{rgb:'D0D0D0'}},right:{style:'thin',color:{rgb:'D0D0D0'}}
      }})
    }
  };
}

function buildJusuSheet(wb,f){
  const ws={};
  const totalGil=f.reduce((s,r)=>s+r.dailyTarget*r.days,0);

  sc(ws,0,0,'총 일 목표 합계',{font:{bold:true,color:{rgb:'FFFFFF'}},fill:'111827'});
  sc(ws,1,0,totalGil,    {font:{bold:true},fill:'F3F4F6'});

  const AP=ap();
  const baseH=['업체명','URL','MID','순위키워드','일수','시작일','일 목표','분류','검색키워드','키워드 수'];
  const prodH=AP.map(p=>p.name);
  const tailH=['합계'];
  const headers=[...baseH,...prodH,...tailH];

  headers.forEach((h,ci)=>{
    const prod=AP.find(p=>p.name===h);
    const fill=prod?prod.color.replace('#',''):(ci<10?'D97706':'374151');
    sc(ws,3,ci,h,{font:{bold:true,color:{rgb:'FFFFFF'}},fill,align:'center'});
  });

  f.forEach((r,ri)=>{
    const rowIdx=4+ri;
    const asgn=AP.filter(p=>r.products.includes(p.id));
    const alloc=allocate(asgn, r.dailyTarget);
    const kwCount=r.searchKeywords?r.searchKeywords.split(',').map(k=>k.trim()).filter(k=>k).length:0;
    const base=[r.name,r.url,r.mid,r.keyword,r.days,null,r.dailyTarget,asgn.length,r.searchKeywords,kwCount];
    const pv=AP.map(p=>r.products.includes(p.id)?(alloc[p.id]??0):'');
    const tail=[r.dailyTarget*r.days];
    const row=[...base,...pv,...tail];
    row.forEach((v,ci)=>{
      if(v===''||v===undefined) return;
      const pi=ci-10; const isProd=ci>=10&&ci<10+AP.length&&pv[pi]!=='';
      const fc=isProd?AP[pi].color.replace('#',''):null;
      if(ci===5){ scDate(ws,rowIdx,5,r.startDate); return; }
      sc(ws,rowIdx,ci,v,{
        align:[0,1,3].includes(ci)?'left':'center',
        font:fc?{color:{rgb:fc},bold:true}:{}
      });
    });
    ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:rowIdx,c:headers.length-1}});
  });
  if(!ws['!ref']) ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:4,c:headers.length-1}});
  ws['!cols']=[{wch:22},{wch:44},{wch:14},{wch:18},{wch:6},{wch:13},{wch:12},{wch:6},{wch:44},{wch:8},...AP.map(()=>({wch:10})),{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'접수');
}

function buildProdSheet(wb,f,prod){
  const ws={};
  const pRows=f.filter(r=>r.products.includes(prod.id));

  sc(ws,0,0,prod.ver||'',{font:{bold:true,color:{rgb:'DC2626'}},nb:true});

  const headers=['상품등급명','업체명','URL','MID','순위키워드','일 목표','일 수','예약일','검색키워드'];
  headers.forEach((h,ci)=>{
    sc(ws,1,ci,h,{font:{bold:true,color:{rgb:'FFFFFF'}},fill:h==='검색키워드'?'DC2626':'1F2937'});
  });

  pRows.forEach((r,ri)=>{
    const asgn=ap().filter(p=>r.products.includes(p.id));
    const alloc=allocate(asgn, r.dailyTarget);
    const pp=alloc[prod.id]??0;
    const daysVal=prod.id==='charlie'?pp*r.days:r.days;
    const row=[prod.name,r.name,r.url,r.mid,r.keyword,pp,daysVal,null,kwForProd(r.searchKeywords,prod)];
    row.forEach((v,ci)=>{
      if(ci===7){ scDate(ws,2+ri,7,r.startDate); return; }
      sc(ws,2+ri,ci,v,{align:[0,1,2,4,8].includes(ci)?'left':'center'});
    });
  });

  const lr=Math.max(1,pRows.length+1);
  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:lr,c:8}});
  ws['!cols']=[{wch:10},{wch:22},{wch:44},{wch:14},{wch:18},{wch:8},{wch:6},{wch:13},{wch:52}];
  XLSX.utils.book_append_sheet(wb,ws,prod.name);
}

// ── XLSX: 주문 sheet 공통 빌더 ──
function buildJumuSheet_(wb,f,label,filterFn){
  const ws={};
  const AP=ap();
  const usedIds=new Set(); f.forEach(r=>r.products.forEach(id=>usedIds.add(id)));
  const pList=AP.filter(p=>filterFn(p)&&usedIds.has(p.id));
  if(!pList.length) return;

  const headers=['상품등급명','업체명','URL','MID','순위키워드','일 목표','일 수','예약일','검색키워드'];

  headers.forEach((h,ci)=>{
    const fill=h==='검색키워드'?'DC2626':'1F2937';
    sc(ws,0,ci,h,{font:{bold:true,color:{rgb:'FFFFFF'}},fill});
  });

  let curRow=1;
  pList.forEach((prod)=>{
    const pRows=f.filter(r=>r.products.includes(prod.id));
    pRows.forEach((r)=>{
      const asgn=ap().filter(p=>r.products.includes(p.id));
      const alloc=allocate(asgn, r.dailyTarget);
      const pp=alloc[prod.id]??0;
      const daysVal=prod.id==='charlie'?pp*r.days:r.days;
      const prodColor=prod.color.replace('#','');
      const row=[prod.name,r.name,r.url,r.mid,r.keyword,pp,daysVal,null,kwForProd(r.searchKeywords,prod)];
      row.forEach((v,ci)=>{
        if(ci===7){ scDate(ws,curRow,7,r.startDate); return; }
        sc(ws,curRow,ci,v,{
          align:[0,1,2,4,8].includes(ci)?'left':'center',
          font:ci===0?{color:{rgb:prodColor},bold:true}:{}
        });
      });
      curRow++;
    });
  });

  if(curRow<2) curRow=2;
  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:curRow-1,c:8}});
  ws['!cols']=[{wch:10},{wch:22},{wch:44},{wch:14},{wch:18},{wch:8},{wch:6},{wch:13},{wch:52}];
  XLSX.utils.book_append_sheet(wb,ws,label);
}

function buildJumuNormalSheet(wb,f){ buildJumuSheet_(wb,f,'일반',p=>!FIXED_PROD_IDS.has(p.id)); }
function buildJumuFixedSheet(wb,f){  buildJumuSheet_(wb,f,'고정',p=> FIXED_PROD_IDS.has(p.id)); }

function kwForProd(keywords, prod) {
  if (!keywords) return '';
  const parts = keywords.split(',').map(k => k.trim()).filter(k => k);
  if (!parts.length) return '';
  // 유입플: 항상 앞 5개 고정 (독립)
  if (prod.id === 'yupfl') return parts.slice(0, 5).join(',');
  // 일반 상품: 유입플과 무관하게 전체 키워드를 비율로 배분 (독립)
  const activeOthers = ap().filter(p => p.id !== 'yupfl');
  const totalKw = parts.length;
  const pcts = activeOthers.map(p => p.kwPct || 0);
  const totalPct = pcts.reduce((s,v) => s+v, 0);
  if (totalPct === 0) return parts.join(',');
  const exact = pcts.map(pct => totalKw * pct / totalPct);
  const floors = exact.map(v => Math.floor(v));
  const remainders = exact.map((v,i) => v - floors[i]);
  let leftover = totalKw - floors.reduce((s,v) => s+v, 0);
  const order = remainders.map((_,i)=>i).sort((a,b)=>remainders[b]-remainders[a]);
  for (let i = 0; i < leftover; i++) floors[order[i]]++;
  let offset = 0;
  for (let i = 0; i < activeOthers.length; i++) {
    if (activeOthers[i].id === prod.id) return parts.slice(offset, offset + floors[i]).join(',');
    offset += floors[i];
  }
  return '';
}

// 유입플 고정 수량 계산: 300타 이상 → 15%, 300 미만 → 50타
function yupflAlloc(dailyTarget) {
  if (dailyTarget >= 300) return Math.round(dailyTarget * 0.15);
  return 50;
}

// ratio 비율로 target 분배, Largest Remainder로 정수 오차 보정
// 유입플이 포함된 경우 먼저 고정 수량 선취 후 나머지를 비율로 배분
function allocate(asgn, target) {
  if (!asgn.length) return {};
  const yupfl = asgn.find(p => p.id === 'yupfl');
  if (yupfl) {
    const yAmt = Math.min(yupflAlloc(target), target);
    const remaining = Math.max(0, target - yAmt);
    const others = asgn.filter(p => p.id !== 'yupfl');
    const map = { yupfl: yAmt };
    if (others.length) {
      const totalW = others.reduce((s,p) => s + p.ratio, 0) || 1;
      const exact = others.map(p => remaining * p.ratio / totalW);
      const floors = exact.map(v => Math.floor(v));
      const remainders = exact.map((v,i) => v - floors[i]);
      let leftover = remaining - floors.reduce((s,v) => s+v, 0);
      const order = remainders.map((_,i) => i).sort((a,b) => remainders[b]-remainders[a]);
      for (let i = 0; i < leftover; i++) floors[order[i]]++;
      others.forEach((p,i) => { map[p.id] = floors[i]; });
    }
    return map;
  }
  const totalW = asgn.reduce((s,p)=>s+p.ratio, 0) || 1;
  const exact = asgn.map(p => target * p.ratio / totalW);
  let floors = exact.map(v => Math.floor(v));
  const remainders = exact.map((v,i) => v - floors[i]);
  let leftover = target - floors.reduce((s,v)=>s+v, 0);
  const order = remainders.map((_,i)=>i).sort((a,b)=>remainders[b]-remainders[a]);
  for (let i = 0; i < leftover; i++) floors[order[i]]++;
  const map = {};
  asgn.forEach((p,i) => { map[p.id] = floors[i]; });
  return map;
}

// ── Preview builders (특정 행 배열 기준) ──
function buildJusuPrev(f){
  return f.map(r=>{
    const asgn=ap().filter(p=>r.products.includes(p.id));
    const alloc=allocate(asgn, r.dailyTarget);
    const pc={}; ap().forEach(p=>{pc[p.name]=r.products.includes(p.id)?(alloc[p.id]??0):'';});
    const kwCount=r.searchKeywords?r.searchKeywords.split(',').map(k=>k.trim()).filter(k=>k).length:0;
    return {'업체명':r.name,'URL':r.url,'MID':r.mid,'순위키워드':r.keyword,
      '일수':r.days,'시작일':r.startDate,'일 목표':r.dailyTarget,'분류':asgn.length,
      '검색키워드':r.searchKeywords,'키워드 수':kwCount,...pc,'합계':r.dailyTarget*r.days};
  });
}
function buildJumuPrev_(f,filterFn){
  const AP=ap();
  const usedIds=new Set(); f.forEach(r=>r.products.forEach(id=>usedIds.add(id)));
  const pList=AP.filter(p=>filterFn(p)&&usedIds.has(p.id));
  const result=[];
  pList.forEach((prod)=>{
    const pRows=f.filter(r=>r.products.includes(prod.id));
    pRows.forEach(r=>{
      const asgn=ap().filter(p=>r.products.includes(p.id));
      const alloc=allocate(asgn, r.dailyTarget);
      const pp=alloc[prod.id]??0;
      const daysVal=prod.id==='charlie'?pp*r.days:r.days;
      const kw=kwForProd(r.searchKeywords,prod);
      const kwCount=kw?kw.split(',').map(k=>k.trim()).filter(k=>k).length:0;
      result.push({'상품등급명':prod.name,'업체명':r.name,'URL':r.url,'MID':r.mid,
        '순위키워드':r.keyword,'일 목표':pp,'일 수':daysVal,'예약일':r.startDate,'검색키워드':kw,'키워드 수':kwCount});
    });
  });
  return result;
}
function buildJumuPrev(f)       { return buildJumuPrev_(f, ()=>true); }
function buildJumuNormalPrev(f) { return buildJumuPrev_(f, p=>!FIXED_PROD_IDS.has(p.id)); }
function buildJumuFixedPrev(f)  { return buildJumuPrev_(f, p=> FIXED_PROD_IDS.has(p.id)); }
