<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>키워드 실시간 검색 번호부</title>
  <style>
    body {
      font-family: "Noto Sans KR", sans-serif;
      background: #f4f6f9;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { color: #2e7d32; margin-bottom: 20px; }

    .search-container {
      width: 90%;
      max-width: 1000px;
      margin-bottom: 30px;
      position: sticky;
      top: 10px;
      z-index: 100;
    }
    #searchInput {
      width: 100%;
      padding: 15px 20px;
      font-size: 18px;
      border: 2px solid #2e7d32;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      outline: none;
      box-sizing: border-box;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      width: 90%;
      max-width: 1000px;
    }

    .item {
      background: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
      border-left: 4px solid transparent;
    }
    .item:not(.hidden):hover {
      background: #e9f5e9;
      transform: translateY(-2px);
      border-left: 4px solid #2e7d32;
    }
    .hidden { display: none; }
    .num { font-weight: bold; color: #2e7d32; width: 50px; font-size: 14px; }
    .name { flex-grow: 1; text-align: left; padding-left: 10px; color: #333; font-weight: 500; }
    .system { background: #fff3e0; border-left-color: #ff9800; }
  </style>
</head>
<body>
  <h1>키워드 실시간 검색</h1>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="번호, 단어, 또는 초성(예: ㅇㅍ)을 입력하세요...">
  </div>
  <div class="grid-container" id="keywordGrid"></div>

<script>
  const keywords = [
    {n: "11", k: "알파"}, {n: "12", k: "브라보"}, {n: "13", k: "찰리"}, {n: "14", k: "델타"}, {n: "15", k: "에코"},
    {n: "16", k: "폭스트롯"}, {n: "17", k: "골프"}, {n: "18", k: "호텔"}, {n: "19", k: "인디아"}, {n: "20", k: "줄리엣"},
    {n: "21", k: "킬로"}, {n: "22", k: "리마"}, {n: "23", k: "마이크"}, {n: "24", k: "노벰버"}, {n: "25", k: "오스카"},
    {n: "26", k: "파파"}, {n: "27", k: "퀘벡"}, {n: "28", k: "로미오"}, {n: "29", k: "시에라"}, {n: "30", k: "탱고"},
    {n: "51", k: "블랙"}, {n: "52", k: "라임"}, {n: "53", k: "올리브"}, {n: "54", k: "머스타드"}, {n: "55", k: "라벤더"},
    {n: "56", k: "브라운"}, {n: "57", k: "카키"}, {n: "58", k: "탠"}, {n: "59", k: "와인"}, {n: "60", k: "버건디"},
    {n: "71", k: "카멜"}, {n: "72", k: "파스텔"}, {n: "73", k: "에메랄드"}, {n: "74", k: "터키옥"}, {n: "75", k: "스카이"},
    {n: "76", k: "코발트"}, {n: "77", k: "로즈골드"}, {n: "78", k: "페리윙클"}, {n: "79", k: "모브"}, {n: "80", k: "스모키"},
    {n: "31", k: "유니폼"}, {n: "32", k: "빅터"}, {n: "33", k: "위스키"}, {n: "34", k: "엑스레이"}, {n: "35", k: "양키"},
    {n: "36", k: "줄루"}, {n: "37", k: "화이트"}, {n: "38", k: "아이보리"}, {n: "39", k: "베이지"}, {n: "40", k: "옐로우"},
    {n: "41", k: "레몬"}, {n: "42", k: "오렌지"}, {n: "43", k: "핑크"}, {n: "44", k: "블루"}, {n: "45", k: "네이비"},
    {n: "46", k: "민트"}, {n: "47", k: "아쿠아"}, {n: "48", k: "그린"}, {n: "49", k: "그레이"}, {n: "50", k: "골드"},
    {n: "61", k: "모카"}, {n: "62", k: "실버"}, {n: "63", k: "인디고"}, {n: "64", k: "마젠타"}, {n: "65", k: "시안"},
    {n: "66", k: "피치"}, {n: "67", k: "살몬"}, {n: "68", k: "크림"}, {n: "69", k: "차콜"}, {n: "70", k: "퍼플"},
    {n: "81", k: "슬레이트"}, {n: "82", k: "월넛"}, {n: "83", k: "마호가니"}, {n: "84", k: "루비"}, {n: "85", k: "사파이어"},
    {n: "86", k: "코랄핑크"}, {n: "87", k: "더스티"}, {n: "88", k: "토파즈"}, {n: "89", k: "오팔"}, {n: "90", k: "코랄"},
    {n: "1000", k: "AI단독"}, {n: "1001", k: "AI가격비교"}
  ];

  function getChosung(str) {
    const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    let result = "";
    for (let i = 0; i < str.length; i++) {
      let code = str.charCodeAt(i) - 44032;
      if (code > -1 && code < 11172) result += cho[Math.floor(code/588)];
      else result += str.charAt(i);
    }
    return result;
  }

  const grid = document.getElementById('keywordGrid');
  const input = document.getElementById('searchInput');

  // DOM API로 렌더링 (XSS 방지)
  function render() {
    keywords.forEach(item => {
      const div = document.createElement('div');
      div.className = 'item' + (parseInt(item.n) >= 1000 ? ' system' : '');
      div.setAttribute('data-num', item.n);
      div.setAttribute('data-name', item.k);
      div.setAttribute('data-cho', getChosung(item.k));

      const numSpan = document.createElement('span');
      numSpan.className = 'num';
      numSpan.textContent = item.n;   // textContent → XSS 차단

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = item.k;  // textContent → XSS 차단

      div.appendChild(numSpan);
      div.appendChild(nameSpan);
      grid.appendChild(div);
    });
  }

  input.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().replace(/\s/g, "");
    document.querySelectorAll('.item').forEach(item => {
      const num  = item.getAttribute('data-num');
      const name = item.getAttribute('data-name').toLowerCase();
      const cho  = item.getAttribute('data-cho');
      if (num.includes(val) || name.includes(val) || cho.includes(val)) {
        item.classList.remove('hidden');
      } else {
        item.classList.add('hidden');
      }
    });
  });

  render();
</script>
</body>
</html>
