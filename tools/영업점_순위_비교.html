<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Ad | 실시간 순위 변동 대시보드</title>
    <style>
        :root { --primary-color: #202124; --up-color: #D93025; --down-color: #1967D2; --eq-color: #5F6368; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f5f5; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 헤더 최적화 */
        .header { border-bottom: 2px solid var(--primary-color); padding-bottom: 12px; margin-bottom: 15px; }
        .header h1 { font-size: 18px; color: var(--primary-color); margin: 0 0 5px 0; word-break: keep-all; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        select { flex: 1; min-width: 150px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; }
        button { padding: 8px 15px; background: #eee; border: 1px solid #ccc; cursor: pointer; border-radius: 5px; font-size: 13px; }

        /* 탭 가로 스크롤 강화 */
        .tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 15px; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 5px; padding-bottom: 5px; }
        .tabs::-webkit-scrollbar { height: 4px; }
        .tabs::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .tab-btn { padding: 8px 15px; border: none; background: #f0f0f0; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; white-space: nowrap; border-radius: 5px; font-size: 12px; }
        .tab-btn.active { color: #fff; background: var(--primary-color); }

        /* 리스트 항목 모바일 겹침 방지 */
        .status-section { margin-bottom: 20px; }
        .status-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; padding-left: 8px; border-left: 4px solid #ccc; }
        .list-container { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; max-height: 400px; overflow-y: auto; padding: 5px; }
        
        .rank-item { 
            padding: 6px 8px; /* 상하 패딩 최소화 */
            border-bottom: 1px solid #f0f0f0; 
            display: flex; 
            flex-direction: row; /* 다시 가로 배치로 변경 */
            align-items: center; /* 세로 중앙 정렬 */
            gap: 6px; 
            line-height: 1.2;
        }
        .rank-item:last-child { border-bottom: none; }
        
        .rank-top { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex: 1; /* 왼쪽 영역 전체 차지 */
            min-width: 0; /* 글자 생략을 위한 설정 */
        }
        .badge { 
            display: inline-block; 
            padding: 2px 5px; 
            border-radius: 3px; 
            font-size: 10px; 
            font-weight: bold; 
            color: #ffffff !important; /* 글자색을 흰색으로 강제 고정 */
            white-space: nowrap;
            flex-shrink: 0;
            text-shadow: 0px 0px 1px rgba(0,0,0,0.2); /* 흰색 글자가 더 잘 보이도록 미세한 그림자 추가 */
        }
        .company-info { 
            font-size: 11px; 
            white-space: nowrap; /* 줄바꿈 방지 */
            overflow: hidden; 
            text-overflow: ellipsis; /* 길면 ... 처리 */
        }

        .company-info b { font-size: 12px; }

        /* 순위 수치를 오른쪽 끝에 콤팩트하게 배치 */
        .rank-status { 
            display: flex; 
            gap: 4px;
            font-size: 11px; 
            white-space: nowrap;
            flex-shrink: 0;
            background: #f1f3f4;
            padding: 2px 5px;
            border-radius: 4px;
        }
        
        .up { color: var(--up-color); font-weight: bold; }
        .down { color: var(--down-color); font-weight: bold; }
        .eq { color: var(--eq-color); font-weight: bold; }
        
        .loading { text-align: center; padding: 50px; font-weight: bold; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="mainTitle">Higher Ad | 📊 순위 변동 분석 센터</h1>
        <div id="lastUpdated" style="font-size: 11px; color: #888; margin-top: 5px;">데이터 불러오는 중...</div>
    </div>

    <div class="controls">
        <select id="branchFilter" onchange="renderData()">
            <option value="all">전체 영업점 보기</option>
        </select>
        <button onclick="fetchData()">새로고침</button>
    </div>

    <div class="tabs" id="tabsArea"></div>

    <div id="contentArea">
        <div class="loading">스프레드시트 데이터를 분석하고 있습니다...</div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxyFuM-npYQ_Rkgezgl6LqfhUCCdc3mff07ESh88VxE2nTqYeR5j1JriyY8mTRdSH_a/exec";
    
    let rawData = { branchNames: [], results: [] };
    let currentBucket = "전체";

    const buckets = ["전체", "1-10위", "11-20위", "21-50위", "51-100위", "101-200위", "201-300위", "300위 밖"];

    async function fetchData() {
        document.getElementById('contentArea').innerHTML = '<div class="loading">데이터 동기화 중...</div>';
        try {
            const response = await fetch(`${GAS_URL}?action=getRankData`);
            rawData = await response.json();
            
            if (rawData.dateTitle) {
                document.getElementById('mainTitle').innerText = "Higher Ad | 📊 " + rawData.dateTitle;
            }

            const filter = document.getElementById('branchFilter');
            filter.innerHTML = '<option value="all">전체 영업점 보기</option>';
            rawData.branchNames.forEach(name => {
                filter.innerHTML += `<option value="${name}">${name}</option>`;
            });

            document.getElementById('lastUpdated').innerText = "최근 업데이트: " + new Date().toLocaleTimeString();
            renderTabs();
            renderData();
        } catch (e) {
            document.getElementById('contentArea').innerHTML = '<div class="loading" style="color:red">데이터 연동 실패</div>';
        }
    }

    function renderTabs() {
        const tabsArea = document.getElementById('tabsArea');
        tabsArea.innerHTML = buckets.map(b => 
            `<button class="tab-btn ${currentBucket === b ? 'active' : ''}" onclick="setBucket('${b}')">${b}</button>`
        ).join('');
    }

    function setBucket(b) {
        currentBucket = b;
        renderTabs();
        renderData();
    }

    function renderData() {
        const selectedBranch = document.getElementById('branchFilter').value;
        const contentArea = document.getElementById('contentArea');
        
        let filtered = rawData.results.filter(item => {
            const branchMatch = (selectedBranch === "all" || item.branch === selectedBranch);
            let bucketMatch = false;
            
            if (currentBucket === "전체") bucketMatch = true;
            else {
                const r = item.rankNum;
                if (currentBucket === "1-10위") bucketMatch = (r <= 10);
                else if (currentBucket === "11-20위") bucketMatch = (r > 10 && r <= 20);
                else if (currentBucket === "21-50위") bucketMatch = (r > 20 && r <= 50);
                else if (currentBucket === "51-100위") bucketMatch = (r > 50 && r <= 100);
                else if (currentBucket === "101-200위") bucketMatch = (r > 100 && r <= 200);
                else if (currentBucket === "201-300위") bucketMatch = (r > 200 && r <= 300);
                else if (currentBucket === "300위 밖") bucketMatch = (r > 300);
            }
            return branchMatch && bucketMatch;
        });

        const upList = filtered.filter(i => i.diff > 0);
        const downList = filtered.filter(i => i.diff < 0);
        const eqList = filtered.filter(i => i.diff === 0);

        contentArea.innerHTML = `
            ${renderSection("🚀 순위 상승", upList, "up")}
            ${renderSection("🔻 순위 하락", downList, "down")}
            ${renderSection("🔹 보합", eqList, "eq")}
        `;
    }

    function renderSection(title, list, type) {
        return `
            <div class="status-section">
                <div class="status-title" style="border-color: var(--${type}-color)">${title} (${list.length})</div>
                <div class="list-container">
                    ${list.length === 0 ? '<div style="font-size:11px; color:#999; text-align:center; padding:10px;">데이터 없음</div>' : 
                        list.map(i => `
                            <div class="rank-item">
                                <div class="rank-top">
                                    <span class="badge" style="background: var(--${type}-color)">${i.branch.replace("(단독)","")}</span>
                                    <div class="company-info">
                                        <b>${i.company}</b> <span style="color:#888; font-size:10px;">${i.keyword}</span>
                                    </div>
                                </div>
                                <div class="rank-status">
                                    <span>${i.rank}</span>
                                    <span class="${type}">${i.diff > 0 ? '↑'+i.diff : (i.diff < 0 ? '↓'+Math.abs(i.diff) : '-')}</span>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
            </div>
        `;
    }

    window.onload = fetchData;
</script>

</body>
</html>
