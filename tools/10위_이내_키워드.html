<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최신 순위 TOP 10 필터</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --primary-hover: #1557b0;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .header-container {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle { 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-top: 15px;
            margin-bottom: 15px; 
        }

        textarea {
            width: 100%; height: 180px; padding: 16px; border: 1px solid var(--border-color);
            border-radius: 12px; font-size: 14px; box-sizing: border-box; outline: none; background-color: #fcfcfd;
        }

        button {
            width: 100%; background-color: var(--primary-color); color: white; border: none;
            padding: 16px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; margin-top: 16px;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-top: 30px; }
        th { background-color: #f8fafc; padding: 12px 16px; font-size: 13px; color: var(--text-muted); text-align: left; border-bottom: 1px solid var(--border-color); }
        td { padding: 16px; font-size: 15px; border-bottom: 1px solid var(--border-color); }

        .keyword-name {
            font-weight: 600; color: var(--primary-color); cursor: pointer; text-decoration: none; /* 밑줄 제거 */
        }
        .keyword-name:hover { color: var(--primary-hover); }
        .rank-badge { background-color: var(--success-bg); color: var(--success-text); padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 13px; }
        
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px;
            display: none; z-index: 100; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <h1 class="main-title">🚀 최신 순위 TOP 10 필터</h1>
    </div>
    
    <div class="subtitle">키워드를 클릭하면 복사됩니다. 결과는 조회수 높은 순으로 자동 정렬됩니다.</div>
    
    <textarea id="rawData" placeholder="데이터 전체를 복사해서 여기에 붙여넣으세요..."></textarea>
    <button onclick="processData()">지금 바로 분석하기</button>

    <div id="resultArea">
        <table id="topTable">
            <thead>
                <tr>
                    <th>키워드</th>
                    <th>조회수</th>
                    <th>오늘 순위</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="3" style="text-align:center; padding:40px; color:#ccc;">데이터를 입력해주세요.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="toast">✅ 키워드가 클립보드에 복사되었습니다!</div>

<script>
function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    });
}

function processData() {
    const text = document.getElementById('rawData').value;
    const lines = text.split('\n');
    const tbody = document.querySelector('#topTable tbody');
    tbody.innerHTML = '';

    let results = [];
    
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        
        if (line && !line.includes('위') && isNaN(parseInt(line.charAt(0)))) {
            let keyword = line;
            let nextLine = lines[i + 1] ? lines[i + 1].trim() : "";
            
            if (nextLine.includes('위') || nextLine.includes('건')) {
                let countMatch = nextLine.match(/([0-9,]+)건/);
                let rawCount = countMatch ? parseInt(countMatch[1].replace(/,/g, '')) : 0;
                let displayCount = countMatch ? countMatch[0] : "0건";
                
                let ranks = nextLine.replace(/[0-9,]+건/, '').split('위').filter(r => r.trim() !== "");
                let currentRank = ranks.length > 0 ? parseInt(ranks[0]) : 999;

                if (currentRank <= 10) {
                    results.push({ keyword, displayCount, rawCount, rank: currentRank });
                }
            }
        }
    }

    // 조회수 내림차순 정렬 (높은 순 -> 낮은 순)
    results.sort((a, b) => b.rawCount - a.rawCount);

    if (results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:40px; color:#999;">분석 결과 10위권 이내 키워드가 없습니다.</td></tr>';
    } else {
        results.forEach(item => {
            const row = `<tr>
                <td class="keyword-name" onclick="copyToClipboard('${item.keyword}')">${item.keyword}</td>
                <td style="color: var(--text-muted);">${item.displayCount}</td>
                <td><span class="rank-badge">${item.rank}위</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
}
</script>

</body>
</html>
